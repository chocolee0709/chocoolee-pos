<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>本機圖片同步工具</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:"Noto Sans TC",sans-serif; background:#f5f4f0; padding:24px; }
.card { background:#fff; border-radius:12px; padding:20px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
button { background:#b8910a; color:#fff; border:none; border-radius:8px; padding:12px 28px; font-size:14px; font-weight:700; cursor:pointer; }
button:disabled { background:#d8d4cc; cursor:default; }
.log { background:#f8f8f8; border:1px solid #e8e4de; border-radius:8px; padding:12px; font-size:12px; line-height:1.8; max-height:500px; overflow-y:auto; margin-top:12px; white-space:pre-wrap; font-family:monospace; }
.progress { background:#e8e4de; border-radius:20px; height:14px; margin-top:8px; overflow:hidden; }
.progress-bar { background:#b8910a; height:100%; transition:width 0.3s; }
.warn { background:#fff8f0; border:1px solid #f0d0a0; border-radius:8px; padding:12px; font-size:13px; color:#a06000; margin-bottom:12px; line-height:1.7; font-weight:600; }
</style>
</head>
<body>
<h2 style="color:#b8910a;margin-bottom:8px;">🔄 本機圖片同步工具</h2>
<p style="font-size:12px;color:#9a968e;margin-bottom:16px;">從本機 localStorage 撈所有圖片推送到 Firebase</p>

<div class="card">
  <div class="warn">
    ⚠️ 必須在 <strong>chocolee0709.github.io/chocoolee-pos</strong> 網域下開啟才能讀到正確的 localStorage！<br><br>
    請把此檔上傳到 GitHub repo，然後開啟：<br>
    <code style="background:#fff;padding:4px 8px;border-radius:4px;font-size:12px;">chocolee0709.github.io/chocoolee-pos/sync-local-to-firebase.html</code>
  </div>
  <button id="scanBtn" onclick="scan()">1️⃣ 先掃描本機圖片</button>
  <button id="syncBtn" onclick="sync()" disabled style="background:#4a8ec0;margin-left:8px;">2️⃣ 同步到 Firebase</button>
  <div class="progress" style="display:none;" id="progressWrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div id="progressText" style="font-size:13px;color:#7a7068;margin-top:8px;font-weight:600;"></div>
  <div class="log" id="log" style="display:none;"></div>
</div>

<script>
var FB = "https://chocoolee-pos-default-rtdb.firebaseio.com";
var FB_KEY = "AIzaSyDqJZiwefGVMiTVusd-Z1jTuQByaMS_i2w";
var FB_USER = "chocolee0709@gmail.com";
var FB_PASS = "love0501";
var fbToken = null;
var localImages = null;

function log(msg) {
  var el = document.getElementById("log");
  el.style.display = "block";
  el.textContent += msg + "\n";
  el.scrollTop = el.scrollHeight;
}

function setProgress(cur, total) {
  document.getElementById("progressWrap").style.display = "block";
  var pct = total > 0 ? Math.round(cur/total*100) : 0;
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressText").textContent = cur + " / " + total + "（" + pct + "%）";
}

function sleep(ms) { return new Promise(function(r){setTimeout(r,ms);}); }

async function getToken() {
  var r = await fetch("https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=" + FB_KEY, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({email:FB_USER, password:FB_PASS, returnSecureToken:true})
  });
  var d = await r.json();
  if (!d.idToken) throw new Error("登入失敗");
  fbToken = d.idToken;
}

function scan() {
  document.getElementById("log").textContent = "";
  log("🔍 掃描本機 localStorage 所有圖片...");

  var images = {};

  // 1. 從 product-images（整包）
  try {
    var oldMap = JSON.parse(localStorage.getItem("chocoolee-product-images") || "{}");
    Object.keys(oldMap).forEach(function(k){
      if (oldMap[k] && typeof oldMap[k] === "string" && oldMap[k].startsWith("data:")) {
        images[k] = oldMap[k];
      }
    });
    log("📂 chocoolee-product-images：" + Object.keys(oldMap).length + " 筆");
  } catch(e) {}

  // 2. 從 product-images/{id}（獨立節點）
  var indCount = 0;
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    if (k && k.indexOf("chocoolee-product-images/") === 0) {
      var imgId = k.replace("chocoolee-product-images/", "");
      var v = localStorage.getItem(k);
      if (v && v.startsWith("data:")) {
        images[imgId] = v;
        indCount++;
      }
    }
  }
  log("📂 chocoolee-product-images/{id}：" + indCount + " 筆");

  // 3. 從 products 裡有 Base64 的
  var inProdCount = 0;
  try {
    var prods = JSON.parse(localStorage.getItem("chocoolee-products") || "[]");
    prods.forEach(function(p){
      if (p && p.image && p.image.startsWith("data:")) {
        images[String(p.id)] = p.image;
        inProdCount++;
      }
    });
  } catch(e) {}
  log("📂 chocoolee-products 內嵌圖：" + inProdCount + " 筆");

  log("\n=========================");
  log("🎯 總共找到 " + Object.keys(images).length + " 張獨立圖片");

  // 顯示明細
  var ids = Object.keys(images);
  var totalSize = 0;
  ids.forEach(function(id){
    totalSize += images[id].length;
  });
  log("📊 總大小：" + Math.round(totalSize*0.75/1024) + " KB");

  if (ids.length > 0) {
    log("\n圖片清單：");
    ids.slice(0, 50).forEach(function(id){
      var size = Math.round(images[id].length*0.75/1024);
      log("  id:" + id + " → " + size + "KB");
    });
    if (ids.length > 50) log("  ... 還有 " + (ids.length-50) + " 張");

    localImages = images;
    document.getElementById("syncBtn").disabled = false;
    log("\n✅ 掃描完成！按「2️⃣ 同步到 Firebase」開始上傳");
  } else {
    log("\n⚠️ 本機沒有圖片資料");
    log("可能原因：你不是在 chocolee0709.github.io/chocoolee-pos 網域下開啟");
  }
}

async function sync() {
  if (!localImages) { log("請先按 1️⃣ 掃描"); return; }
  document.getElementById("syncBtn").disabled = true;

  log("\n🔐 登入 Firebase...");
  try {
    await getToken();
    log("✅ 登入成功\n");

    var ids = Object.keys(localImages);
    log("🚀 開始逐張推送 " + ids.length + " 張圖片...");
    setProgress(0, ids.length);

    var ok = 0, fail = 0;

    for (var i = 0; i < ids.length; i++) {
      var imgId = ids[i];
      var imgData = localImages[imgId];

      var success = false;
      // 最多 3 次嘗試
      for (var attempt = 1; attempt <= 3; attempt++) {
        try {
          var r = await fetch(FB + "/chocoolee/product-images/" + imgId + ".json?auth=" + fbToken, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(imgData)
          });
          if (r.ok) {
            // 驗證
            await sleep(200);
            var vr = await fetch(FB + "/chocoolee/product-images/" + imgId + ".json?auth=" + fbToken);
            if (vr.ok) {
              var v = await vr.json();
              if (v && typeof v === "string" && v.startsWith("data:")) {
                success = true;
                break;
              }
            }
          }
          await sleep(500);
        } catch(e) { await sleep(500); }
      }

      if (success) {
        ok++;
        log("[" + (i+1) + "/" + ids.length + "] id:" + imgId + " ✅");
      } else {
        fail++;
        log("[" + (i+1) + "/" + ids.length + "] id:" + imgId + " ❌");
      }

      setProgress(i+1, ids.length);
    }

    log("\n========================================");
    log("🎉 同步完成！成功 " + ok + " 張，失敗 " + fail + " 張");
    log("📱 請到所有 iPad 上重新整理 POS 系統");
  } catch(e) {
    log("❌ 錯誤：" + e.message);
  }

  document.getElementById("syncBtn").disabled = false;
}
</script>
</body>
</html>
