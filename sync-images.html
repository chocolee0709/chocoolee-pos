<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>圖片遷移工具 - 巧克莉莉</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:"Noto Sans TC",sans-serif; background:#f5f4f0; padding:24px; color:#2a2520; }
h2 { font-size:18px; margin-bottom:8px; color:#b8910a; }
.sub { font-size:12px; color:#9a968e; margin-bottom:16px; }
.card { background:#fff; border-radius:12px; padding:20px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
button { background:#b8910a; color:#fff; border:none; border-radius:8px; padding:10px 24px; font-size:14px; font-weight:700; cursor:pointer; margin-right:8px; }
button:disabled { background:#d8d4cc; cursor:default; }
.log { background:#f8f8f8; border:1px solid #e8e4de; border-radius:8px; padding:12px; font-size:12px; line-height:1.8; max-height:400px; overflow-y:auto; margin-top:12px; white-space:pre-wrap; font-family:monospace; }
.warn { background:#fff8f0; border:1px solid #f0d0a0; border-radius:8px; padding:12px; font-size:12px; color:#a06000; margin-bottom:12px; }
</style>
</head>
<body>
<h2>🖼 圖片遷移工具</h2>
<p class="sub">將舊版本圖片從 products 搬移到獨立的 product-images 節點</p>

<div class="card">
  <div class="warn">
    ⚠️ 請在 <strong>chocolee0709.github.io/chocoolee-pos</strong> 網域下開啟此工具，才能讀取正確的 localStorage。
  </div>
  <button onclick="migrate()">🚀 開始遷移</button>
  <div class="log" id="log" style="display:none;"></div>
</div>

<script>
var FB     = "https://chocoolee-pos-default-rtdb.firebaseio.com";
var FB_KEY = "AIzaSyDqJZiwefGVMiTVusd-Z1jTuQByaMS_i2w";
var FB_USER = "chocolee0709@gmail.com";
var FB_PASS = "love0501";
var fbToken = null;

function log(msg) {
  var el = document.getElementById("log");
  el.style.display = "block";
  el.textContent += msg + "\n";
  el.scrollTop = el.scrollHeight;
}

function getToken() {
  return fetch("https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=" + FB_KEY, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: FB_USER, password: FB_PASS, returnSecureToken: true })
  }).then(function(r){ return r.json(); }).then(function(d){
    if (d.idToken) { fbToken = d.idToken; return d.idToken; }
    throw new Error(d.error ? d.error.message : "登入失敗");
  });
}

async function migrate() {
  document.getElementById("log").textContent = "";
  log("🔍 讀取本機商品資料...");

  // 讀取 localStorage 的 products
  var raw = localStorage.getItem("chocoolee-products");
  if (!raw) { log("❌ 找不到本機商品資料"); return; }

  var products;
  try {
    products = JSON.parse(raw);
    if (typeof products === "string") products = JSON.parse(products);
  } catch(e) { log("❌ 解析失敗：" + e.message); return; }

  log("📦 共 " + products.length + " 件商品");

  // 找出有圖片的商品
  var imgMap = {};
  var count = 0;
  products.forEach(function(p) {
    if (p && p.image && p.image.startsWith("data:")) {
      imgMap[String(p.id)] = p.image;
      count++;
      log("  ✅ " + (p.name||p.sku) + "（" + Math.round(p.image.length*0.75/1024) + " KB）");
    }
  });

  if (count === 0) {
    log("⚠️ 本機沒有找到圖片（可能已遷移過或從未上傳）");
    return;
  }

  log("\n共找到 " + count + " 張圖片，開始遷移...");

  // 登入 Firebase
  log("🔐 登入 Firebase...");
  try { await getToken(); } catch(e) { log("❌ 登入失敗：" + e.message); return; }
  log("✅ 登入成功");

  // 把圖片推送到 product-images 節點
  log("💾 推送圖片到 Firebase product-images...");
  var r1 = await fetch(FB + "/chocoolee/product-images.json?auth=" + fbToken, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(imgMap)
  });

  if (!r1.ok) {
    log("❌ 推送失敗 " + r1.status);
    return;
  }
  log("✅ 圖片推送成功！");

  // 同時更新 localStorage
  localStorage.setItem("chocoolee-product-images", JSON.stringify(imgMap));

  // 把 products 裡的圖片換成 __img__ 標記
  var prodsNoImg = products.map(function(p) {
    if (p && p.image && p.image.startsWith("data:")) {
      return Object.assign({}, p, {image: "__img__"});
    }
    return p;
  });

  log("💾 更新 products（移除內嵌圖片）...");
  var r2 = await fetch(FB + "/chocoolee/products.json?auth=" + fbToken, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(prodsNoImg)
  });

  if (!r2.ok) {
    log("❌ products 更新失敗 " + r2.status);
    return;
  }

  // 更新本機 localStorage
  localStorage.setItem("chocoolee-products", JSON.stringify(prodsNoImg));
  log("✅ products 更新成功！");

  log("\n🎉 遷移完成！");
  log("重新整理所有裝置上的 POS 系統，圖片就會正常顯示了！");
}
</script>
</body>
</html>
