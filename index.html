                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
                      <span style={{fontSize:12,color:"#9a968e",fontFamily:"monospace"}}>{o.no}</span>
                      {o.time && <span style={{fontSize:12,color:"#c8c4bc"}}>{o.time}</span>}
                      <span style={{fontSize:12,fontWeight:700,padding:"1px 7px",borderRadius:20,background:statusBg,color:statusColor}}>
                        {statusLabel}
                      </span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:12,color:"#2a2520"}}>{o.member}</span>
                      {renderPayBadge(o.payment)}
                      {o.discount>0 && <span style={{fontSize:10,color:"#d0552f"}}>-{o.discount}%</span>}
                      <span style={{fontSize:10,color:"#9a968e"}}>{o.items||0}種 {o.qty||0}件</span>
                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:16,fontWeight:700,color:isPaid?"#b8910a":"#9a968e",textDecoration:isPaid?"none":"line-through"}}>${o.total.toLocaleString()}</div>
                  </div>
                  <span style={{fontSize:12,color:"#c8c4bc",flexShrink:0}}>{isOpen?"▲":"▼"}</span>
                </div>
                {isOpen && (
                  <div style={{borderTop:"1px solid #2e2a22",padding:"8px 12px",background:"#eeece8"}}>
                    {o.subtotal !== undefined && (
                      <div style={{display:"flex",gap:16,marginBottom:6,flexWrap:"wrap"}}>
                        <span style={{fontSize:12,color:"#9a968e"}}>小計 <b style={{color:"#2a2520"}}>${o.subtotal.toLocaleString()}</b></span>
                        {o.discAmt>0 && <span style={{fontSize:12,color:"#d0552f"}}>折扣 -${o.discAmt.toLocaleString()}</span>}
                        <span style={{fontSize:12,color:"#9a968e"}}>實收 <b style={{color:"#b8910a"}}>${o.total.toLocaleString()}</b></span>
                      </div>
                    )}
                    {o.detail && (
                      <div style={{fontSize:12,color:"#7a7068",lineHeight:1.7}}>
                        {o.detail.split("、").map(function(item,idx){
                          return <div key={idx} style={{paddingLeft:8,borderLeft:"2px solid #2e2a22",marginBottom:2}}>　{item}</div>;
                        })}
                      </div>
                    )}
                    {o.phone && o.member!=="—" && (
                      <div style={{marginTop:4,fontSize:12,color:"#aaA69e"}}>{o.phone}</div>
                    )}
                    {/* 取消/退貨按鈕 */}
                    {(canCancel || canReturn) && (
                      <div style={{marginTop:8,display:"flex",gap:6,justifyContent:"flex-end"}}>
                        {canCancel && (
                          <button onClick={function(e){e.stopPropagation();setConfirmOp({no:o.no,type:"cancel",total:o.total});}}
                            style={{padding:"5px 12px",borderRadius:6,border:"1px solid #d8d4cc",background:"#f8f7f4",color:"#9a968e",fontSize:13,cursor:"pointer",fontWeight:600}}>
                            ✕ 取消訂單
                          </button>
                        )}
                        {canReturn && (
                          <button onClick={function(e){e.stopPropagation();setConfirmOp({no:o.no,type:"return",total:o.total});}}
                            style={{padding:"5px 12px",borderRadius:6,border:"1px solid #e8c4c4",background:"#fdf4f4",color:"#d0552f",fontSize:13,cursor:"pointer",fontWeight:600}}>
                            ↩ 退貨
                          </button>
                        )}
                      </div>
                    )}
                    {(isCancelled||isRefunded) && o.cancelDate && (
                      <div style={{marginTop:6,fontSize:12,color:"#9a968e",textAlign:"right"}}>
                        {isCancelled?"取消":"退貨"}日期：{o.cancelDate}
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>

      </div>

      {/* 取消/退貨確認 Modal */}
      {confirmOp && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:800,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#ffffff",borderRadius:14,padding:24,width:320,maxWidth:"92vw",boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}}>
            <div style={{fontSize:18,marginBottom:8,textAlign:"center"}}>{confirmOp.type==="cancel"?"✕":"↩"}</div>
            <div style={{fontSize:14,fontWeight:700,color:"#2a2520",marginBottom:6,textAlign:"center"}}>
              確認{confirmOp.type==="cancel"?"取消訂單":"退貨"}？
            </div>
            <div style={{fontSize:12,color:"#9a968e",marginBottom:4,textAlign:"center"}}>{confirmOp.no}</div>
            <div style={{fontSize:13,fontWeight:700,color:"#d0552f",marginBottom:6,textAlign:"center"}}>
              -${confirmOp.total.toLocaleString()} 從今日營業額扣除
            </div>
            <div style={{fontSize:11,color:"#c8c4bc",marginBottom:16,textAlign:"center",lineHeight:1.5}}>
              {confirmOp.type==="cancel"?"當日訂單取消":"跨日退貨，不追溯原始日期"}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={function(){setConfirmOp(null);}}
                style={{flex:1,padding:"9px 0",borderRadius:8,border:"1px solid #d8d4cc",background:"#f5f4f0",color:"#9a968e",fontSize:13,cursor:"pointer",fontWeight:600}}>
                返回
              </button>
              <button onClick={function(){doCancel(confirmOp.no, confirmOp.type);}}
                style={{flex:1,padding:"9px 0",borderRadius:8,border:"none",background:confirmOp.type==="cancel"?"#9a968e":"#d0552f",color:"#ffffff",fontSize:13,cursor:"pointer",fontWeight:700}}>
                確認{confirmOp.type==="cancel"?"取消":"退貨"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Members Drawer ──
var INIT_MEMBERS = [
  {id:1,name:"陳小美",phone:"0912-345-678",email:"mei@example.com",spent:18640,highCount:1,note:"",joinDate:"2024-03-15"},
  {id:2,name:"王大明",phone:"0987-654-321",email:"ming@example.com",spent:7200,highCount:0,note:"",joinDate:"2024-08-20"},
  {id:3,name:"林雅琪",phone:"0935-111-222",email:"yachi@example.com",spent:62500,highCount:3,note:"常買帽子",joinDate:"2023-11-01"}
];
var EMPTY_FORM = {name:"",phone:"",email:"",spent:0,highCount:0,note:""};

function MembersDrawer(props) {

  var members = props.members, setMembers = props.setMembers;

  var qs = useState(""); var q = qs[0], setQ = qs[1];
  var es = useState(null); var editId = es[0], setEditId = es[1];
  var fs = useState(EMPTY_FORM); var form = fs[0], setForm = fs[1];
  var rls = useState(false); var showRules = rls[0], setShowRules = rls[1];


  var data = members.filter(function(m){ return m.name.indexOf(q)>=0 || m.phone.indexOf(q)>=0; });
  function setF(k,v){ setForm(function(f){ var n=Object.assign({},f); n[k]=v; return n; }); }

  function openEdit(m) {
    setForm({name:m.name,phone:m.phone,email:m.email||"",spent:m.spent,highCount:m.highCount||0,note:m.note||""});
    setEditId(m.id);
  }
  function openNew() { setForm(Object.assign({},EMPTY_FORM)); setEditId("new"); }
  function closeEdit() { setEditId(null); }

  // 匯出會員資料為 JSON 檔
  function exportMembers() {
    var json = JSON.stringify(members, null, 2);
    var blob = new Blob([json], {type: "application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    var today = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = "巧克莉莉會員備份_" + today + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // 匯入會員資料（合併，不覆蓋既有）
  function importMembers(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var imported = JSON.parse(ev.target.result);
        if (!Array.isArray(imported)) { alert("檔案格式錯誤：不是會員清單"); return; }
        // 以手機號碼為識別，合併（既有的保留消費紀錄較高者）
        var byPhone = {};
        members.forEach(function(m){ if(m && m.phone) byPhone[m.phone] = m; });
        var added = 0, updated = 0;
        imported.forEach(function(m){
          if (!m || !m.phone) return;
          var ex = byPhone[m.phone];
          if (!ex) {
            byPhone[m.phone] = m;
            added++;
          } else {
            // 消費金額取較高者，避免覆蓋掉新的消費紀錄
            if ((m.spent||0) > (ex.spent||0)) {
              byPhone[m.phone] = Object.assign({}, ex, m, {id: ex.id});
              updated++;
            }
          }
        });
        var merged = Object.keys(byPhone).map(function(k){ return byPhone[k]; });
        setMembers(merged);
        saveData("members", JSON.stringify(merged));
        alert("匯入完成！\n新增 " + added + " 位\n更新 " + updated + " 位\n目前共 " + merged.length + " 位會員");
      } catch(err) {
        alert("匯入失敗：" + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = ""; // 清空，允許重複選同一檔
  }

  function saveMember() {
    var spent = Number(form.spent)||0;
    var highCount = Number(form.highCount)||0;
    var level = calcLevel(spent, highCount);
    var points = calcPoints(spent);
    var now = new Date().toISOString();
    if (editId === "new") {
      setMembers(function(prev){ return prev.concat([{id:Date.now(),name:form.name,phone:form.phone,email:form.email,spent:spent,highCount:highCount,level:level,points:points,note:form.note,joinDate:new Date().toISOString().slice(0,10),updatedAt:now}]); });
    } else {
      setMembers(function(prev){ return prev.map(function(m){ return m.id===editId ? Object.assign({},m,{name:form.name,phone:form.phone,email:form.email,spent:spent,highCount:highCount,level:level,points:points,note:form.note,updatedAt:now}) : m; }); });
    }
    closeEdit();
  }

  var inp = {background:"#ffffff",border:"1px solid #2e2a22",borderRadius:6,padding:"6px 9px",color:"#2a2520",fontSize:12,outline:"none",width:"100%",boxSizing:"border-box"};
  var lbl = {fontSize:10,color:"#7a7068",display:"block",marginBottom:3};

  // Level preview
  var prevSp = Number(form.spent)||0;
  var prevHc = Number(form.highCount)||0;
  var prevLv = calcLevel(prevSp, prevHc);
  var prevPts = calcPoints(prevSp);
  var prevNext = nextLevelInfo(prevLv, prevSp, prevHc);
  var showPreview = editId !== null && (prevSp > 0 || prevHc > 0);

  // ── 會員總覽計算 ──────────────────────────────────────────────────
  var today = new Date();
  var todayStr = today.toISOString().slice(0,10);

  // 等級分佈
  var lvlCount = {general:0, silver:0, gold:0, vip:0};
  members.forEach(function(m){
    var lv = m.level || calcLevel(m.spent, m.highCount||0);
    if (lvlCount[lv] !== undefined) lvlCount[lv]++;
  });

  // 近 6 個月：每月新增 & 活動會員（有 joinDate 或有消費記錄）
  var months = [];
  for (var i=5; i>=0; i--) {
    var d = new Date(today.getFullYear(), today.getMonth()-i, 1);
    months.push({
      label: (d.getMonth()+1)+"月",
      year:  d.getFullYear(),
      month: d.getMonth()+1,
      key:   d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"),
    });
  }

  // 每月新增（依 joinDate）
  var monthlyNew = {};
  months.forEach(function(m){ monthlyNew[m.key]=0; });
  members.forEach(function(m){
    if (!m.joinDate) return;
    var k = m.joinDate.slice(0,7);
    if (monthlyNew[k] !== undefined) monthlyNew[k]++;
  });

  // 每月活動率：以最近 6 個月內有消費（lastVisit 在該月）為活動會員
  // 用 lastVisit 近似；無資料時以 spent>0 估算
  var totalMembers = members.length;
  var activeMembers = members.filter(function(m){
    if (!m.lastVisit) return false;
    // 近 6 個月內有來店
    var sixMonthsAgo = new Date(today.getFullYear(), today.getMonth()-5, 1);
    return m.lastVisit >= sixMonthsAgo.toISOString().slice(0,10);
  }).length;
  // 活動率（近半年有來店的會員 / 總會員）
  var activeRate = totalMembers > 0 ? Math.round(activeMembers/totalMembers*100) : 0;

  // 每月活動率（依 lastVisit 月份分組）
  var monthlyActive = {};
  months.forEach(function(m){ monthlyActive[m.key]=new Set(); });
  members.forEach(function(m){
    if (!m.lastVisit) return;
    var k = m.lastVisit.slice(0,7);
    if (monthlyActive[k]) monthlyActive[k].add(m.id);
  });

  // 新增會員趨勢：本月 vs 上月
  var thisMonthKey = todayStr.slice(0,7);
  var lastMonthD   = new Date(today.getFullYear(), today.getMonth()-1, 1);
  var lastMonthKey = lastMonthD.getFullYear()+"-"+String(lastMonthD.getMonth()+1).padStart(2,"0");
  var thisMonthNew = monthlyNew[thisMonthKey]||0;
  var lastMonthNew = monthlyNew[lastMonthKey]||0;
  var newTrend     = thisMonthNew - lastMonthNew;

  // 折線/柱圖最大值
  var maxNew    = Math.max(1, Math.max.apply(null, months.map(function(m){return monthlyNew[m.key]||0;})));
  var maxActive = Math.max(1, Math.max.apply(null, months.map(function(m){return monthlyActive[m.key]?monthlyActive[m.key].size:0;})));

  return (
    <div style={{display:"flex",flexDirection:"column",gap:8,height:"100%",overflow:"hidden"}}>

      {/* ════ 會員總覽區 ════ */}
      <div style={{flexShrink:0,display:"flex",flexDirection:"column",gap:8,
        background:"#ffffff",border:"1px solid #e8e4de",borderRadius:12,padding:"12px 14px",
        boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>

        {/* 第一列：核心指標 */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}}>
          {/* 總會員數 */}
          <div style={{background:"#f8f7f4",borderRadius:9,padding:"9px 10px",textAlign:"center"}}>
            <div style={{fontSize:9,color:"#9a968e",marginBottom:3}}>總會員數</div>
            <div style={{fontSize:22,fontWeight:800,color:"#2a2520"}}>{totalMembers}</div>
            <div style={{fontSize:9,color:"#9a968e"}}>位</div>
          </div>
          {/* 等級分佈 */}
          {[
            {lv:"silver",label:"銀卡",color:LVL_COLOR.silver},
            {lv:"gold",  label:"金卡",color:LVL_COLOR.gold},
            {lv:"vip",   label:"VIP", color:LVL_COLOR.vip},
          ].map(function(x){
            return (
              <div key={x.lv} style={{background:"#f8f7f4",borderRadius:9,padding:"9px 10px",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#9a968e",marginBottom:3}}>{x.label}</div>
                <div style={{fontSize:22,fontWeight:800,color:x.color}}>{lvlCount[x.lv]}</div>
                <div style={{fontSize:9,color:"#9a968e"}}>位</div>
              </div>
            );
          })}
          {/* 半年活動率 */}
          <div style={{background:"#f8f7f4",borderRadius:9,padding:"9px 10px",textAlign:"center"}}>
            <div style={{fontSize:9,color:"#9a968e",marginBottom:3}}>半年活動率</div>
            <div style={{fontSize:22,fontWeight:800,color:activeRate>=50?"#3d9e32":"#d0552f"}}>{activeRate}%</div>
            <div style={{fontSize:9,color:"#9a968e"}}>{activeMembers}/{totalMembers}</div>
          </div>
        </div>

        {/* 第二列：每月新增 + 活動人數 圖表 */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

          {/* 每月新增會員 */}
          <div>
            <div style={{fontSize:10,color:"#7a7068",fontWeight:600,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>每月新增會員</span>
              <span style={{fontSize:10,color:newTrend>0?"#3d9e32":newTrend<0?"#d0552f":"#9a968e",fontWeight:700}}>
                本月 {thisMonthNew}人
                {newTrend!==0 && <span> ({newTrend>0?"+":""}{newTrend})</span>}
              </span>
            </div>
            <div style={{display:"flex",alignItems:"flex-end",gap:3,height:52}}>
              {months.map(function(m){
                var v = monthlyNew[m.key]||0;
                var pct = v/maxNew;
                var barH = Math.max(2, Math.round(pct*44));
                var isThis = m.key===thisMonthKey;
                return (
                  <div key={m.key} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    <div style={{fontSize:8,color:"#b8910a",fontWeight:700,height:12,lineHeight:"12px"}}>
                      {v>0?v:""}
                    </div>
                    <div style={{width:"100%",height:barH,
                      background:isThis?"#b8910a":"#e0d8c8",
                      borderRadius:"3px 3px 0 0",transition:"height 0.3s"}}/>
                    <div style={{fontSize:8,color:isThis?"#b8910a":"#aaA69e",fontWeight:isThis?700:400}}>{m.label}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* 每月活動人次 */}
          <div>
            <div style={{fontSize:10,color:"#7a7068",fontWeight:600,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>每月活動會員</span>
              <span style={{fontSize:10,color:"#4a8ec0",fontWeight:700}}>
                近6月共 {activeMembers}人
              </span>
            </div>
            <div style={{display:"flex",alignItems:"flex-end",gap:3,height:52}}>
              {months.map(function(m){
                var v = monthlyActive[m.key] ? monthlyActive[m.key].size : 0;
                var pct = v/maxActive;
                var barH = Math.max(2, Math.round(pct*44));
                var isThis = m.key===thisMonthKey;
                return (
                  <div key={m.key} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    <div style={{fontSize:8,color:"#4a8ec0",fontWeight:700,height:12,lineHeight:"12px"}}>
                      {v>0?v:""}
                    </div>
                    <div style={{width:"100%",height:barH,
                      background:isThis?"#4a8ec0":"#c0d8f0",
                      borderRadius:"3px 3px 0 0",transition:"height 0.3s"}}/>
                    <div style={{fontSize:8,color:isThis?"#4a8ec0":"#aaA69e",fontWeight:isThis?700:400}}>{m.label}</div>
                  </div>
                );
              })}
            </div>
          </div>

        </div>
      </div>

      {/* 搜尋列 - 固定 */}
      <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
        <input value={q} onChange={function(e){setQ(e.target.value);}} placeholder="搜尋姓名 / 手機..."
          style={Object.assign({},inp,{flex:1,width:"auto"})}/>
        <button onClick={openNew}
          style={{background:"#b8910a",border:"none",borderRadius:6,padding:"7px 13px",color:"#ffffff",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
          + 新增會員
        </button>
        <button onClick={function(){setShowRules(function(r){return !r;});}}
          style={{background:"none",border:"1px solid #2e2a22",borderRadius:6,padding:"7px 10px",color:"#7a7068",fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>
          等級規則
        </button>
        <button onClick={exportMembers}
          style={{background:"none",border:"1px solid #3d9e32",borderRadius:6,padding:"7px 10px",color:"#3d9e32",fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>
          ⬇ 匯出
        </button>
        <label style={{background:"none",border:"1px solid #2a7080",borderRadius:6,padding:"7px 10px",color:"#2a7080",fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>
          ⬆ 匯入
          <input type="file" accept=".json" style={{display:"none"}} onChange={importMembers}/>
        </label>
      </div>

      {/* 可捲動區：規則 + 表單 + 列表 */}
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:8}}>

        {/* 等級規則 */}
        {showRules && (
          <div style={{background:"#e8e6e2",border:"1px solid #2e2a22",borderRadius:8,padding:"10px 14px",fontSize:11,color:"#6a6258",lineHeight:1.9}}>
            <div style={{fontWeight:700,color:"#b8910a",marginBottom:4,fontSize:12}}>◈ 會員等級制度</div>
            <div><b style={{color:"#3870a8"}}>銀卡</b>：累積消費滿 <b style={{color:"#2a2520"}}>$3,800</b> 即可加入</div>
            <div><b style={{color:"#b8910a"}}>金卡</b>：年度累積消費滿 <b style={{color:"#2a2520"}}>$30,000</b></div>
            <div><b style={{color:"#7055c0"}}>VIP</b>：一年內單筆滿 <b style={{color:"#2a2520"}}>$10,000</b> 達 <b style={{color:"#2a2520"}}>2 次</b></div>
            <div><b style={{color:"#2a2520"}}>集點</b>：每消費滿 <b style={{color:"#2a2520"}}>$79</b> 集 1 點</div>
          </div>
        )}

        {/* 新增 / 編輯表單 */}
        {editId !== null && (
          <div style={{background:"#ffffff",border:"1px solid #c9a84c",borderRadius:10,padding:"12px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontSize:13,fontWeight:700,color:"#2a2520"}}>{editId==="new"?"+ 新增會員":"編輯會員"}</span>
              <button onClick={closeEdit} style={{background:"none",border:"none",color:"#9a968e",cursor:"pointer",fontSize:18}}>×</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div><label style={lbl}>姓名 *</label><input value={form.name} onChange={function(e){setF("name",e.target.value);}} placeholder="會員姓名" style={inp}/></div>
              <div><label style={lbl}>手機 *</label><input value={form.phone} onChange={function(e){setF("phone",e.target.value);}} placeholder="0912-345-678" style={inp}/></div>
              <div><label style={lbl}>Email</label><input value={form.email} onChange={function(e){setF("email",e.target.value);}} placeholder="選填" style={inp}/></div>
              <div><label style={lbl}>備註</label><input value={form.note} onChange={function(e){setF("note",e.target.value);}} placeholder="選填" style={inp}/></div>
              <div><label style={lbl}>累積消費金額 (NT$)</label><input type="number" value={form.spent} onChange={function(e){setF("spent",e.target.value);}} style={inp}/></div>
              <div><label style={lbl}>年度單筆>=萬 次數</label><input type="number" min="0" value={form.highCount} onChange={function(e){setF("highCount",e.target.value);}} style={inp}/></div>
            </div>
            {showPreview && (
              <div style={{background:"#eeece8",borderRadius:7,padding:"7px 10px",marginBottom:10,display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{fontSize:10,color:"#9a968e"}}>預覽等級</span>
                <span style={{fontSize:12,fontWeight:700,color:LVL_COLOR[prevLv],padding:"1px 10px",borderRadius:20,background:"#f0ede8"}}>{LVL_LABEL[prevLv]}</span>
                <span style={{fontSize:11,color:"#7a7068"}}>⭐ {prevPts.toLocaleString()} 點</span>
                {prevNext && <span style={{fontSize:10,color:"#aaA69e",marginLeft:"auto"}}>{prevNext}</span>}
              </div>
            )}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={closeEdit} style={{background:"none",border:"1px solid #2e2a22",borderRadius:6,padding:"7px 16px",color:"#7a7068",fontSize:12,cursor:"pointer"}}>取消</button>
              <button onClick={saveMember} disabled={!form.name||!form.phone}
                style={{background:(form.name&&form.phone)?"#b8910a":"#d8d4cc",border:"none",borderRadius:6,padding:"7px 20px",
                  color:(form.name&&form.phone)?"#f5f4f0":"#aaA69e",fontSize:12,fontWeight:700,
                  cursor:(form.name&&form.phone)?"pointer":"default"}}>
                儲存
              </button>
            </div>
          </div>
        )}

        {/* 會員列表 */}
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {data.map(function(m) {
            var level = m.level || calcLevel(m.spent, m.highCount||0);
            var points = m.points || calcPoints(m.spent);
            var next = nextLevelInfo(level, m.spent, m.highCount||0);
            return (
              <div key={m.id} style={{background:"#ffffff",borderRadius:8,padding:"10px 12px",border:"1px solid #2e2a22"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <span style={{fontSize:13,fontWeight:700,color:"#2a2520"}}>{m.name}</span>
                    <span style={{fontSize:10,fontWeight:700,padding:"2px 9px",borderRadius:20,background:"#f0ede8",color:LVL_COLOR[level]}}>{LVL_LABEL[level]}</span>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:11,color:"#9a968e"}}>{m.phone}</span>
                    <button onClick={function(){openEdit(m);}}
                      style={{background:"none",border:"1px solid #2e2a22",borderRadius:5,padding:"2px 9px",color:"#b8910a",fontSize:10,cursor:"pointer"}}>編輯</button>
                  </div>
                </div>
                <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
                  <div><div style={{fontSize:10,color:"#9a968e"}}>點數</div><div style={{fontSize:13,color:"#b8910a",fontWeight:700}}>{points.toLocaleString()}</div></div>
                  <div><div style={{fontSize:10,color:"#9a968e"}}>累積消費</div><div style={{fontSize:13,color:"#2a2520",fontWeight:700}}>${m.spent.toLocaleString()}</div></div>
                  <div><div style={{fontSize:10,color:"#9a968e"}}>大額次數</div><div style={{fontSize:13,color:"#2a2520",fontWeight:600}}>{m.highCount||0} 次</div></div>
                </div>
                {next && <div style={{marginTop:6,fontSize:10,color:"#aaA69e"}}>{next}</div>}
                {m.note && <div style={{marginTop:4,fontSize:10,color:"#9a968e",fontStyle:"italic"}}>備註：{m.note}</div>}
              </div>
            );
          })}
          {data.length === 0 && (
            <div style={{textAlign:"center",color:"#c8c4bc",marginTop:30,fontSize:12}}>
              <div style={{fontSize:24,marginBottom:6}}>❋</div>
              {members.length===0 ? "尚無會員資料，點「+ 新增會員」開始建立" : "查無此會員"}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── 採購單頁面 ─────────────────────────────────────────────────────
function PurchasePanel(props) {
  var purchases = props.purchases || [];
  var setPurchases = props.setPurchases;
  var products = props.products || [];
  var currentStaff = props.currentStaff;
  var isManager = currentStaff && currentStaff.role === "店長";
  var setSharedStocks = props.setSharedStocks;
  var setSharedProducts = props.setSharedProducts;
  var sharedAddLog = props.sharedAddLog;

  var sm = useState("list"); var mode = sm[0], setMode = sm[1]; // list / create / edit / receive / verify
  var ep = useState(null); var expandedPo = ep[0], setExpandedPo = ep[1];
  var sel = useState(null);  var selPo = sel[0], setSelPo = sel[1];
  var sf  = useState("all"); var filter = sf[0], setFilter = sf[1];

  // 店長視角：列出全部；店員：待收貨 + 待確認
  var visiblePurchases = purchases.filter(function(p){
    if (!isManager && p.status === "completed") return false;
    if (filter === "pending"  && p.status !== "pending") return false;
    if (filter === "review"   && p.status !== "review")  return false;
    if (filter === "completed"&& p.status !== "completed")return false;
    return true;
  }).sort(function(a,b){ return (b.date||"").localeCompare(a.date||""); });

  function newPurchase() {
    setSelPo({
      no: "PO-" + new Date().toISOString().slice(0,10).split("-").join("") + "-" + String(purchases.length+1).padStart(3,"0"),
      date: new Date().toISOString().slice(0,10),
      eta: "",
      items: [],
      note: "",
      status: "draft",
      createdBy: currentStaff ? currentStaff.name : "—"
    });
    setMode("create");
  }

  function savePurchase() {
    if (!selPo.items || selPo.items.length === 0) { alert("請新增至少一筆商品"); return; }
    var po = Object.assign({}, selPo, {status: "pending", updatedAt: new Date().toISOString()});
    setPurchases(function(prev){
      var ex = prev.find(function(p){ return p.no === po.no; });
      if (ex) return prev.map(function(p){ return p.no === po.no ? po : p; });
      return [po].concat(prev);
    });
    setMode("list"); setSelPo(null);
  }

  function delPurchase() {
    if (!confirm("確定刪除此採購單？")) return;
    setPurchases(function(prev){ return prev.filter(function(p){ return p.no !== selPo.no; }); });
    setMode("list"); setSelPo(null);
  }

  // 店員初驗完成
  function submitReceive() {
    var po = Object.assign({}, selPo, {
      status: "review",
      receivedBy: currentStaff ? currentStaff.name : "—",
      receivedAt: new Date().toISOString().slice(0,16).replace("T", " "),
      updatedAt: new Date().toISOString()
    });
    setPurchases(function(prev){ return prev.map(function(p){ return p.no === po.no ? po : p; }); });
    setMode("list"); setSelPo(null);
    alert("✓ 已送出驗收結果，等待店長覆驗");
  }

  // 店長覆驗：確認入庫
  function confirmPurchase() {
    if (!confirm("確認完成？將自動入庫並建立新品")) return;
    var po = Object.assign({}, selPo, {
      status: "completed",
      confirmedBy: currentStaff ? currentStaff.name : "—",
      confirmedAt: new Date().toISOString().slice(0,16).replace("T", " "),
      updatedAt: new Date().toISOString()
    });

    // 自動處理：新品加入商品庫存頁、庫存增加
    var newProducts = [];
    var stockAdds = {};
    var logs = [];
    var now = new Date();
    var dateStr = now.toISOString().slice(0,10);
    var timeStr = now.toTimeString().slice(0,5);

    po.items.forEach(function(item) {
      var goodQty = (item.receivedQty || 0) - (item.damagedQty || 0);
      if (goodQty <= 0) return;

      if (item.isNew) {
        // 新品：建立商品 + 入庫
        var newId = Date.now() + Math.floor(Math.random()*1000);
        var newProd = {
          id: newId, sku: item.sku, name: item.name,
          price: item.price || 0, cost: item.cost || 0,
          main: item.main || "生活選物", sub: item.sub || "生活小物",
          barcode: item.barcode || String(newId).slice(-9),
          image: item.image || "", stock: 0,
          mainEdited: true,  // 防止 mergeProducts 覆蓋分類
          updatedAt: new Date().toISOString()
        };
        // 從黑名單 map 移除此貨號（新品 updatedAt 也會自動處理）
        try {
          var dsk = readDeletedMap();
          if (dsk[item.sku]) { delete dsk[item.sku]; saveData("deletedskus", JSON.stringify(dsk)); }
        } catch(e) {}
        newProducts.push(newProd);
        stockAdds[newId] = goodQty;
        logs.push({
          id: Date.now()+Math.random(), date: dateStr, time: timeStr,
          productId: newId, sku: item.sku, name: item.name,
          main: newProd.main, sub: newProd.sub,
          reason: "採購入庫（新品）", change: goodQty, before: 0, after: goodQty,
          operator: currentStaff ? currentStaff.name : "—"
        });
      } else {
        // 既有商品：庫存增加
        stockAdds[item.productId] = (stockAdds[item.productId] || 0) + goodQty;
        logs.push({
          id: Date.now()+Math.random(), date: dateStr, time: timeStr,
          productId: item.productId, sku: item.sku, name: item.name,
          main: item.main, sub: item.sub,
          reason: "採購入庫" + (item.damagedQty>0 ? "（含破損"+item.damagedQty+"）" : ""),
          change: goodQty, before: 0, after: 0,
          operator: currentStaff ? currentStaff.name : "—"
        });
      }
    });

    // 套用變更
    if (newProducts.length > 0 && setSharedProducts) {
      setSharedProducts(function(prev){ return prev.concat(newProducts); });
    }
    if (Object.keys(stockAdds).length > 0 && setSharedStocks) {
      setSharedStocks(function(prev){
        var n = Object.assign({}, prev);
        Object.keys(stockAdds).forEach(function(id){
          n[id] = (n[id] || 0) + stockAdds[id];
        });
        return n;
      });
    }
    if (logs.length > 0 && sharedAddLog) sharedAddLog(logs);

    setPurchases(function(prev){ return prev.map(function(p){ return p.no === po.no ? po : p; }); });
    setMode("list"); setSelPo(null);
    alert("✓ 採購單已完成，庫存已更新");
  }

  function rejectPurchase() {
    if (!confirm("退回讓店員重新驗收？")) return;
    var po = Object.assign({}, selPo, {status: "pending"});
    setPurchases(function(prev){ return prev.map(function(p){ return p.no === po.no ? po : p; }); });
    setMode("list"); setSelPo(null);
  }

  // 狀態顯示
  function statusBadge(s) {
    var map = {
      "draft":     {bg:"#e8e4de", color:"#7a7068", text:"📝 草稿"},
      "pending":   {bg:"#fff4e0", color:"#b8910a", text:"📋 待收貨"},
      "review":    {bg:"#fff0e0", color:"#d0552f", text:"⏳ 待店長確認"},
      "completed": {bg:"#e8f5e0", color:"#3d9e32", text:"✅ 已完成"},
    };
    var st = map[s] || map.draft;
    return (
      <span style={{display:"inline-block",padding:"3px 9px",borderRadius:12,background:st.bg,color:st.color,fontSize:10,fontWeight:700}}>
        {st.text}
      </span>
    );
  }

  // ====== 列表模式 ======
  if (mode === "list") {
    return (
      <div style={{display:"flex",flexDirection:"column",gap:10,height:"100%",overflow:"hidden"}}>
        <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
          <div style={{fontSize:16,fontWeight:700,color:"#2a2520"}}>📋 採購單管理</div>
          {isManager && (
            <button onClick={newPurchase}
              style={{marginLeft:"auto",background:"#b8910a",border:"none",borderRadius:6,padding:"6px 14px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>
              ＋ 新增採購單
            </button>
          )}
        </div>

        <div style={{display:"flex",gap:6,flexShrink:0}}>
          {[
            {k:"all", label:"全部"},
            {k:"pending", label:"📋 待收貨"},
            {k:"review", label:"⏳ 待確認"},
            {k:"completed", label:"✅ 已完成"},
          ].map(function(f){
            return (
              <button key={f.k} onClick={function(){setFilter(f.k);}}
                style={{padding:"4px 12px",borderRadius:14,border:filter===f.k?"none":"1px solid #d8d4cc",
                  background:filter===f.k?"#2a2520":"transparent",color:filter===f.k?"#fff":"#7a7068",
                  cursor:"pointer",fontSize:12,fontWeight:600}}>
                {f.label}
              </button>
            );
          })}
        </div>

        <div style={{flex:1,overflowY:"auto",background:"#fff",borderRadius:8,padding:8}}>
          {visiblePurchases.length === 0 ? (
            <div style={{padding:40,textAlign:"center",color:"#9a968e",fontSize:12}}>
              目前沒有採購單
            </div>
          ) : visiblePurchases.map(function(po){
            var itemCount = (po.items||[]).length;
            var totalQty = (po.items||[]).reduce(function(s,i){return s+(Number(i.qty)||0);},0);
            var totalCost = (po.items||[]).reduce(function(s,i){return s+(Number(i.cost)||0)*(Number(i.qty)||0);},0);
            var isExpanded = expandedPo === po.no;
            return (
              <div key={po.no} style={{borderBottom:"1px solid #f0ede8"}}>
                <div style={{padding:"10px 14px",display:"flex",alignItems:"center",gap:12}}>
                  <div onClick={function(){setExpandedPo(isExpanded?null:po.no);}}
                    style={{flex:1,cursor:"pointer"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                      <span style={{fontSize:11,color:"#9a968e",transform:isExpanded?"rotate(90deg)":"none",transition:"transform 0.15s",display:"inline-block"}}>▶</span>
                      <span style={{fontSize:13,fontWeight:700,color:"#2a2520"}}>{po.no}</span>
                      {statusBadge(po.status)}
                    </div>
                    <div style={{fontSize:11,color:"#7a7068",paddingLeft:18}}>
                      {po.date} · {itemCount} 項 / {totalQty} 件
                      {isManager && " · 成本 $" + totalCost.toLocaleString()}
                    </div>
                  </div>
                  <button onClick={function(e){
                    e.stopPropagation();
                    setSelPo(po);
                    if (po.status === "pending") setMode("receive");
                    else if (po.status === "review") setMode(isManager ? "verify" : "receive");
                    else setMode("view");
                  }}
                    style={{background:"#b8910a",border:"none",borderRadius:6,padding:"5px 12px",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                    開啟
                  </button>
                </div>

                {/* 展開：商品明細 */}
                {isExpanded && (
                  <div style={{padding:"4px 14px 12px 32px",background:"#faf9f7"}}>
                    {itemCount === 0 ? (
                      <div style={{fontSize:11,color:"#9a968e",padding:"6px 0"}}>無商品</div>
                    ) : (
                      <table style={{width:"100%",fontSize:11,borderCollapse:"collapse"}}>
                        <thead>
                          <tr style={{color:"#9a968e",fontSize:10,borderBottom:"1px solid #e8e4de"}}>
                            <th style={{padding:"4px 6px",textAlign:"left",width:40}}>圖</th>
                            <th style={{padding:"4px 6px",textAlign:"left"}}>商品</th>
                            <th style={{padding:"4px 6px",textAlign:"left",width:70}}>貨號</th>
                            <th style={{padding:"4px 6px",textAlign:"center",width:50}}>數量</th>
                            {isManager && <th style={{padding:"4px 6px",textAlign:"right",width:65}}>單價</th>}
                            {isManager && <th style={{padding:"4px 6px",textAlign:"right",width:75}}>小計</th>}
                          </tr>
                        </thead>
                        <tbody>
                          {(po.items||[]).map(function(item,ii){
                            var subtotal = (Number(item.qty)||0) * (Number(item.cost)||0);
                            return (
                              <tr key={ii} style={{borderBottom:"1px solid #f0ede8"}}>
                                <td style={{padding:"4px 6px"}}>
                                  {item.image ? (
                                    <img src={item.image} alt="" style={{width:30,height:30,objectFit:"cover",borderRadius:4}}/>
                                  ) : (
                                    <div style={{width:30,height:30,borderRadius:4,background:"#f0ede8",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#c8c4bc"}}>📦</div>
                                  )}
                                </td>
                                <td style={{padding:"4px 6px",color:"#2a2520"}}>
                                  {item.isNew && <span style={{background:"#7055c0",color:"#fff",padding:"1px 4px",borderRadius:3,fontSize:9,marginRight:4}}>新</span>}
                                  {item.name}
                                </td>
                                <td style={{padding:"4px 6px",color:"#7a7068",fontSize:10}}>{item.sku}</td>
                                <td style={{padding:"4px 6px",textAlign:"center",color:"#2a2520",fontWeight:600}}>{item.qty}</td>
                                {isManager && <td style={{padding:"4px 6px",textAlign:"right",color:"#7a7068"}}>${(item.cost||0).toLocaleString()}</td>}
                                {isManager && <td style={{padding:"4px 6px",textAlign:"right",color:"#b8910a",fontWeight:600}}>${subtotal.toLocaleString()}</td>}
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ====== 建立/編輯模式 ======
  if (mode === "create") {
    return <PurchaseEditor po={selPo} setPo={setSelPo} products={products}
      onSave={savePurchase} onCancel={function(){setMode("list");setSelPo(null);}}
      onDelete={selPo && purchases.find(function(p){return p.no===selPo.no;}) ? delPurchase : null}/>;
  }

  // ====== 店員初驗模式 ======
  if (mode === "receive") {
    return <PurchaseReceiver po={selPo} setPo={setSelPo}
      readOnly={selPo.status === "review" && !isManager}
      onSubmit={submitReceive}
      onEdit={isManager && selPo.status === "pending" ? function(){setMode("create");} : null}
      onCancel={function(){setMode("list");setSelPo(null);}}/>;
  }

  // ====== 店長覆驗模式 ======
  if (mode === "verify") {
    return <PurchaseVerifier po={selPo}
      onConfirm={confirmPurchase}
      onReject={rejectPurchase}
      onCancel={function(){setMode("list");setSelPo(null);}}/>;
  }

  // ====== 查看模式（已完成） ======
  if (mode === "view") {
    return <PurchaseViewer po={selPo} onClose={function(){setMode("list");setSelPo(null);}}/>;
  }

  return null;
}

// 採購單編輯器
function PurchaseEditor(props) {
  var po = props.po;
  var setPo = props.setPo;
  var products = props.products || [];
  var sa = useState(false); var showAddItem = sa[0], setShowAddItem = sa[1];
  var sn = useState(false); var addingNew = sn[0], setAddingNew = sn[1];
  var eim = useState(-1); var editingIdx = eim[0], setEditingIdx = eim[1];

  function updatePo(field, value) {
    setPo(Object.assign({}, po, {[field]: value}));
  }

  function addItem(item) {
    setPo(Object.assign({}, po, {items: (po.items || []).concat([item])}));
    // 新品加入後關閉視窗（單筆），既有商品保留視窗讓使用者繼續選
    if (item.isNew) {
      setShowAddItem(false);
      setAddingNew(false);
    }
  }

  function closePicker() {
    setShowAddItem(false);
    setAddingNew(false);
  }

  function removeItem(idx) {
    var next = (po.items || []).filter(function(_, i){return i !== idx;});
    setPo(Object.assign({}, po, {items: next}));
  }

  function updateItem(idx, field, value) {
    var next = (po.items || []).map(function(item, i){
      return i === idx ? Object.assign({}, item, {[field]: value}) : item;
    });
    setPo(Object.assign({}, po, {items: next}));
  }

  var lbl = {fontSize:10,color:"#7a7068",marginBottom:3,display:"block"};
  var inp = {width:"100%",padding:"6px 8px",border:"1px solid #d8d4cc",borderRadius:5,fontSize:12,outline:"none",color:"#2a2520",background:"#fff"};

  return (
    <div style={{display:"flex",flexDirection:"column",gap:10,height:"100%",overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <button onClick={props.onCancel} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#7a7068"}}>‹</button>
        <div style={{fontSize:15,fontWeight:700,color:"#2a2520"}}>📝 採購單 {po.no}</div>
        {props.onDelete && (
          <button onClick={props.onDelete} style={{marginLeft:"auto",background:"none",border:"1px solid #d0552f",borderRadius:5,padding:"4px 10px",color:"#d0552f",fontSize:11,cursor:"pointer"}}>
            🗑 刪除
          </button>
        )}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,flexShrink:0}}>
        <div><label style={lbl}>建立日期</label>
          <input type="date" value={po.date||""} onChange={function(e){updatePo("date",e.target.value);}} style={inp}/></div>
        <div><label style={lbl}>預計到貨日</label>
          <input type="date" value={po.eta||""} onChange={function(e){updatePo("eta",e.target.value);}} style={inp}/></div>
      </div>
      <div style={{flexShrink:0}}>

// 商品選擇器（既有 or 新品）
function ItemPicker(props) {
  var addingNew = props.addingNew;
  var products = props.products || [];
  var existingSkus = props.existingSkus || [];
  var q = useState(""); var query = q[0], setQuery = q[1];
  var fm = useState("");  var fMain = fm[0], setFMain = fm[1];
  var fs2 = useState(""); var fSub = fs2[0], setFSub = fs2[1];

  var defaultMain = Object.keys(CAT_STRUCT)[0];
  var newItem = useState({sku:"",name:"",main:defaultMain,sub:CAT_STRUCT[defaultMain][0],cost:0,price:0,qty:1,image:""});
  var nf = newItem[0], setNf = newItem[1];

  // 圖片上傳處理（縮成 250x250 + 65% 品質）
  function handleNewImageUpload(e) {
    var file = e.target.files[0];
    if (!file) return;
    if (!file.type.startsWith("image/")) { alert("請選擇圖片檔"); return; }
    var reader = new FileReader();
    reader.onload = function(ev) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement("canvas");
        var max = 250;
        var w = img.width, h = img.height;
        if (w > h) { if (w>max){ h=Math.round(h*(max/w)); w=max; } }
        else { if (h>max){ w=Math.round(w*(max/h)); h=max; } }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        setNfField("image", canvas.toDataURL("image/jpeg", 0.65));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function setNfField(k,v){
    var n = Object.assign({},nf,{[k]:v});
    // 切換大分類時自動帶入小分類第一個
    if (k === "main") {
      var subs = CAT_STRUCT[v] || [];
      n.sub = subs[0] || "";
      // 大分類變更時清空貨號讓使用者重新自動產生
      n.sku = "";
    }
    setNf(n);
  }

  // 自動產生貨號（同分類下找空缺號碼）
  function autoGenerateSku() {
    // 全店所有貨號（最終唯一性檢查）
    var allSkuGlobal = {};
    products.forEach(function(p){ if(p && p.sku) allSkuGlobal[p.sku] = true; });
    existingSkus.forEach(function(s){ if(s) allSkuGlobal[s] = true; });

    // 同分類貨號（找格式與號碼）
    var sameCat = products.filter(function(p){
      return p.main === nf.main && p.sub === nf.sub;
    }).map(function(p){ return p.sku; });

    function parseSku(s) {
      s = String(s);
      var startNum = -1, endNum = -1;
      for (var i = 0; i < s.length; i++) {
        var ch = s.charCodeAt(i);
        var isDigit = ch >= 48 && ch <= 57;
        if (isDigit && startNum === -1) startNum = i;
        if (isDigit) endNum = i;
        else if (startNum !== -1) break;
      }
      if (startNum === -1) return null;
      var numLen = endNum - startNum + 1;
      return {
        prefix: s.slice(0, startNum),
        num: parseInt(s.slice(startNum, endNum+1)),
        width: numLen,
        suffix: s.slice(endNum+1)
      };
    }

    // 統計同分類格式，取最常見的
    var formatGroups = {};
    sameCat.forEach(function(s){
      var p = parseSku(s);
      if (!p) return;
      var fkey = p.prefix + "|" + p.suffix + "|" + p.width;
      if (!formatGroups[fkey]) formatGroups[fkey] = {prefix:p.prefix, suffix:p.suffix, width:p.width, nums:[]};
      formatGroups[fkey].nums.push(p.num);
    });
    var bestFmt = null, bestCount = 0;
    Object.keys(formatGroups).forEach(function(k){
      if (formatGroups[k].nums.length > bestCount) {
        bestCount = formatGroups[k].nums.length;
        bestFmt = formatGroups[k];
      }
    });

    function makeSku(fmt, n) {
      var s = String(n);
      while (s.length < fmt.width) s = "0" + s;
      return fmt.prefix + s + fmt.suffix;
    }

    var newSku = "";
    if (bestFmt) {
      bestFmt.nums.sort(function(a,b){ return a-b; });
      var candidate = bestFmt.nums[0];
      var safety = 0;
      while (safety < 9999) {
        var trySku = makeSku(bestFmt, candidate);
        if (bestFmt.nums.indexOf(candidate) === -1 && !allSkuGlobal[trySku]) {
          newSku = trySku;
          break;
        }
        candidate++;
        safety++;
      }
    }
    if (!newSku) {
      do {
        newSku = "NEW" + String(Date.now()).slice(-6) + Math.floor(Math.random()*10);
      } while (allSkuGlobal[newSku]);
    }
    setNfField("sku", newSku);
  }

  // 既有商品篩選
  var subOptions = fMain ? (CAT_STRUCT[fMain] || []) : [];
  var filtered = products.filter(function(p){
    if (existingSkus.indexOf(p.sku) !== -1) return false;
    if (fMain && p.main !== fMain) return false;
    if (fSub && p.sub !== fSub) return false;
    if (!query) return true;
    var qq = query.toLowerCase();
    return (p.name||"").toLowerCase().indexOf(qq) !== -1 || (p.sku||"").toLowerCase().indexOf(qq) !== -1;
  }).slice(0, 50);

  // 檢查貨號重複
  var skuDup = nf.sku && products.some(function(p){ return p.sku === nf.sku.trim(); });

  var lbl = {fontSize:10,color:"#7a7068",marginBottom:3,display:"block"};
  var inp = {width:"100%",padding:"6px 8px",border:"1px solid #d8d4cc",borderRadius:5,fontSize:12,outline:"none",color:"#2a2520",background:"#fff"};
  var sel = Object.assign({},inp,{cursor:"pointer"});

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:12,padding:20,width:580,maxWidth:"92vw",maxHeight:"86vh",display:"flex",flexDirection:"column"}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:12,color:"#2a2520"}}>
          {addingNew ? "➕ 新品" : "🔍 選擇商品"}
        </div>

        {addingNew ? (
          <div style={{display:"flex",gap:12}}>
            {/* 圖片區 */}
            <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
              <label style={{cursor:"pointer"}}>
                {nf.image ? (
                  <img src={nf.image} alt="預覽" style={{width:90,height:90,objectFit:"cover",borderRadius:8,border:"2px solid #7055c0"}}/>
                ) : (
                  <div style={{width:90,height:90,borderRadius:8,border:"2px dashed #d8d4cc",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:2,background:"#fff"}}>
                    <span style={{fontSize:22}}>📷</span>
                    <span style={{fontSize:9,color:"#9a968e"}}>點此選圖</span>
                  </div>
                )}
                <input type="file" accept="image/*" onChange={handleNewImageUpload} style={{display:"none"}}/>
              </label>
              <label style={{cursor:"pointer"}}>
                <span style={{fontSize:10,color:"#3d9e32",padding:"3px 8px",border:"1px solid #3d9e32",borderRadius:5,whiteSpace:"nowrap"}}>📷 拍照</span>
                <input type="file" accept="image/*" capture="environment" onChange={handleNewImageUpload} style={{display:"none"}}/>
              </label>
              {nf.image && (
                <button onClick={function(){setNfField("image","");}}
                  style={{background:"none",border:"none",color:"#d0552f",fontSize:9,cursor:"pointer"}}>移除</button>
              )}
            </div>

            {/* 表單區 */}
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div><label style={lbl}>大分類 *</label>
                  <select value={nf.main} onChange={function(e){setNfField("main",e.target.value);}} style={sel}>
                    {Object.keys(CAT_STRUCT).map(function(m){return <option key={m} value={m}>{m}</option>;})}
                  </select>
                </div>
                <div><label style={lbl}>小分類 *</label>
                  <select value={nf.sub} onChange={function(e){setNfField("sub",e.target.value);}} style={sel}>
                    {(CAT_STRUCT[nf.main]||[]).map(function(s){return <option key={s} value={s}>{s}</option>;})}
                  </select>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div><label style={lbl}>商品名稱 *</label>
                  <input value={nf.name} onChange={function(e){setNfField("name",e.target.value);}} style={inp}/></div>
                <div>
                  <label style={lbl}>貨號 * {skuDup && <span style={{color:"#d0552f"}}>⚠️ 重複</span>}</label>
                  <div style={{display:"flex",gap:4}}>
                    <input value={nf.sku} onChange={function(e){setNfField("sku",e.target.value);}}
                      style={Object.assign({},inp,{borderColor:skuDup?"#d0552f":"#d8d4cc"})}/>
                    <button onClick={autoGenerateSku} title="依分類自動產生空缺號碼"
                      style={{background:"#4a8ec0",border:"none",borderRadius:5,padding:"0 10px",color:"#fff",fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>
                      ⚡ 自動
                    </button>
                  </div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                <div><label style={lbl}>採購數量</label>
                  <input type="number" min="1" value={nf.qty} onChange={function(e){setNfField("qty",Number(e.target.value)||0);}} style={inp}/></div>
                <div><label style={lbl}>成本</label>

  var items = po.items || [];

  function updateItem(idx, field, value) {
    var next = items.map(function(item, i){

    });

// ── 螢幕鎖定畫面 ─────────────────────────────────────────────────────
function LockScreen(props) {
  var onUnlock = props.onUnlock, onlineStaff = props.onlineStaff || [];
  var ss  = useState(onlineStaff.length===1 ? onlineStaff[0] : null); var selStaff = ss[0], setSelStaff = ss[1];
  var ps  = useState(""); var pin = ps[0], setPin = ps[1];
  var ers = useState(""); var err = ers[0], setErr = ers[1];
  var pinKeys = ["1","2","3","4","5","6","7","8","9","←","0","✓"];

  function handleKey(k) {
    if (k==="←") { setPin(function(p){return p.slice(0,-1);}); setErr(""); return; }
    if (k==="✓") {
      if (!selStaff) { setErr("請先選擇人員"); return; }
      if (selStaff.pin !== pin) { setErr("PIN 碼錯誤"); setPin(""); return; }
      onUnlock(selStaff); return;
    }
    if (pin.length >= 4) return;
    setPin(function(p){return p+k;}); setErr("");
  }

  return (
    <div style={{position:"fixed",inset:0,zIndex:950,display:"flex",alignItems:"center",justifyContent:"center",
      background:"linear-gradient(135deg,#1a1208 0%,#2a2010 50%,#1a1208 100%)"}}>
      {/* blurred bg pattern */}
      <div style={{position:"absolute",inset:0,opacity:0.04,backgroundImage:"repeating-linear-gradient(45deg,#b8910a 0,#b8910a 1px,transparent 0,transparent 50%)",backgroundSize:"20px 20px"}}/>
      <div style={{position:"relative",textAlign:"center",width:340,maxWidth:"92vw"}}>
        {/* 店名 */}
        <div style={{marginBottom:28}}>
          <div style={{fontSize:22,color:"#b8910a",marginBottom:6}}>✦</div>
          <div style={{fontSize:16,fontWeight:700,color:"#f5f0e8",letterSpacing:"0.1em"}}>巧克莉莉選物店</div>
          <div style={{fontSize:11,color:"#7a6e50",marginTop:2}}>員林店 · 螢幕已鎖定</div>
        </div>

        <div style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(184,145,10,0.2)",borderRadius:16,padding:24}}>
          {/* 人員選擇（多人在班時才顯示） */}
          {onlineStaff.length > 1 && (
            <div style={{marginBottom:16}}>
              <div style={{fontSize:10,color:"#7a6e50",marginBottom:8,letterSpacing:"0.06em"}}>選擇人員解鎖</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                {onlineStaff.map(function(s) {
                  var isA = selStaff && selStaff.id===s.id;
                  return (
                    <button key={s.id} onClick={function(){setSelStaff(s);setPin("");setErr("");}}
                      style={{padding:"9px 8px",borderRadius:9,cursor:"pointer",border:isA?"2px solid #b8910a":"1px solid rgba(255,255,255,0.1)",
                        background:isA?"rgba(184,145,10,0.2)":"rgba(255,255,255,0.04)",
                        color:isA?"#e8c84a":"#d0c8b8"}}>
                      <div style={{fontSize:13,fontWeight:700}}>{s.name}</div>
                      <div style={{fontSize:10,opacity:0.7}}>{s.role}</div>
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* 人員姓名（單人時直接顯示） */}
          {onlineStaff.length === 1 && (
            <div style={{marginBottom:14,fontSize:13,color:"#d0c8b8"}}>
              <span style={{fontWeight:700,color:"#e8c84a"}}>{onlineStaff[0].name}</span>　輸入 PIN 解鎖
            </div>
          )}

          {/* PIN 點點 */}
          <div style={{display:"flex",justifyContent:"center",gap:12,marginBottom:14}}>
            {[0,1,2,3].map(function(i){
              return <div key={i} style={{width:14,height:14,borderRadius:"50%",
                background:i<pin.length?"#b8910a":"rgba(255,255,255,0.15)",
                border:"2px solid "+(i<pin.length?"#b8910a":"rgba(255,255,255,0.2)"),
                transition:"all 0.1s"}}/>;
            })}
          </div>

          {/* 數字鍵盤 */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
            {pinKeys.map(function(k){
              var isC = k==="✓", isD = k==="←";
              return (
                <button key={k} onClick={function(){handleKey(k);}}
                  style={{padding:"12px 0",borderRadius:9,border:"1px solid rgba(255,255,255,0.12)",cursor:"pointer",
                    fontSize:isC?18:isD?16:15,fontWeight:600,transition:"all 0.1s",
                    background:isC?"#b8910a":isD?"rgba(255,255,255,0.08)":"rgba(255,255,255,0.06)",
                    color:isC?"#1a1208":"#e8dcc8",
                    boxShadow:isC?"0 2px 12px rgba(184,145,10,0.3)":"none"}}>
                  {k}
                </button>
              );
            })}
          </div>
          {err && <div style={{marginTop:10,fontSize:11,color:"#e07a5f"}}>{err}</div>}
        </div>

        {/* 無在班人員時提示 */}
        {onlineStaff.length === 0 && (
          <div style={{marginTop:16,fontSize:11,color:"#5a5040"}}>尚無在班人員，請聯絡店長</div>
        )}
      </div>
    </div>
  );
}

// ── 換班登入 Modal ──────────────────────────────────────────────────

  // onLogin: 打上班卡（加入在班）

  var onLogin = props.onLogin;

  var onClose = props.onClose;
  var onlineStaff = props.onlineStaff || [];
  var orders = props.orders || [];

  var ss  = useState(null); var selStaff = ss[0], setSelStaff = ss[1];
  var ps  = useState(""); var pin = ps[0], setPin = ps[1];
  var ers = useState(""); var err = ers[0], setErr = ers[1];
  var tab = useState("clockin"); var activeTab = tab[0], setActiveTab = tab[1]; // "clockin" | "clockout"

  var today = new Date().toISOString().slice(0,10);

  // 已在班的人員 ID set
  var onlineIds = {};
  onlineStaff.forEach(function(s){ onlineIds[s.id]=true; });

  // 待登入的人員（尚未在班的）
  var offlineStaff = STAFF_LIST.filter(function(s){ return !onlineIds[s.id]; });

  function handleLogin() {
    if (!selStaff) { setErr("請選擇人員"); return; }
    if (selStaff.pin !== pin) { setErr("PIN 碼錯誤，請重試"); setPin(""); return; }
    onLogin(selStaff);
  }
  function handleClockOut() {
    if (!selStaff) { setErr("請選擇人員"); return; }
    if (selStaff.pin !== pin) { setErr("PIN 碼錯誤，請重試"); setPin(""); return; }
    onClockOut(selStaff);
  }
  function handlePinKey(v) {
    if (v==="←") { setPin(function(p){return p.slice(0,-1);}); setErr(""); return; }
    if (v==="✓") { activeTab==="clockin" ? handleLogin() : handleClockOut(); return; }
    if (pin.length>=4) return;
    setPin(function(p){return p+v;}); setErr("");
  }
  var pinKeys = ["1","2","3","4","5","6","7","8","9","←","0","✓"];

  // 人員當班業績
  function getShiftStats(name) {
    var sOrds = orders.filter(function(o){ return o.status==="paid" && o.date===today && o.cashier===name; });
    return { cnt: sOrds.length, rev: sOrds.reduce(function(s,o){return s+o.total;},0) };
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(42,37,32,0.85)",zIndex:900,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#ffffff",borderRadius:16,padding:24,width:440,maxWidth:"95vw",boxShadow:"0 12px 48px rgba(0,0,0,0.25)",maxHeight:"90vh",overflowY:"auto"}}>

        {/* 標題列 */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontSize:15,fontWeight:700,color:"#2a2520"}}>🔑 登入</div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,color:"#9a968e",cursor:"pointer"}}>×</button>
        </div>

        {/* 隱藏打卡 tab，員工登入即可 */}
        <div style={{display:"none"}}>
          <button onClick={function(){setActiveTab("clockin");setSelStaff(null);setPin("");setErr("");}}
            style={{flex:1,padding:"7px 0",borderRadius:7,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",
              background:activeTab==="clockin"?"#ffffff":"transparent",
              color:activeTab==="clockin"?"#2a2520":"#9a968e",
              boxShadow:activeTab==="clockin"?"0 1px 4px rgba(0,0,0,0.08)":"none"}}>
            🟢 打上班卡
          </button>
          <button onClick={function(){setActiveTab("clockout");setSelStaff(null);setPin("");setErr("");}}
            style={{flex:1,padding:"7px 0",borderRadius:7,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",
              background:activeTab==="clockout"?"#ffffff":"transparent",
              color:activeTab==="clockout"?"#2a2520":"#9a968e",
              boxShadow:activeTab==="clockout"?"0 1px 4px rgba(0,0,0,0.08)":"none"}}>
            🔴 打下班卡
          </button>
        </div>

        {/* 目前在班人員一覽（已停用打卡，隱藏） */}
        {false && onlineStaff.length > 0 && (
          <div style={{background:"#f0f9f0",border:"1px solid #c8e8c8",borderRadius:9,padding:"10px 12px",marginBottom:14}}>
            <div style={{fontSize:10,color:"#4a8a4a",fontWeight:700,marginBottom:6,letterSpacing:"0.05em"}}>目前在班</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {onlineStaff.map(function(s){
                var st = getShiftStats(s.name);
                return (
                  <div key={s.id} style={{background:"#ffffff",borderRadius:7,padding:"6px 10px",border:"1px solid #b8e0b8"}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#2a2520"}}>{s.name}</div>
                    <div style={{fontSize:10,color:"#9a968e"}}>{s.role}</div>
                    <div style={{fontSize:10,color:"#4a8a4a",marginTop:2}}>{st.cnt}筆 · ${st.rev.toLocaleString()}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* 歡迎語 */}
        <div style={{textAlign:"center",marginBottom:12,padding:"10px 12px",background:"linear-gradient(135deg,#fff8e0,#fff4d0)",borderRadius:9,border:"1px solid #f0e0a0"}}>
          <div style={{fontSize:13,fontWeight:600,color:"#a87c00"}}>🌷 嗨～準備好開始上班了嗎？</div>
        </div>

        {/* 人員選擇 */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,color:"#9a968e",marginBottom:8}}>
            {activeTab==="clockin" ? "選擇要上班的人員" : "選擇要下班的人員"}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {(activeTab==="clockin" ? offlineStaff : onlineStaff).map(function(s){
              var isA = selStaff && selStaff.id===s.id;
              return (
                <button key={s.id} onClick={function(){setSelStaff(s);setPin("");setErr("");}}
                  style={{padding:"10px 8px",borderRadius:9,cursor:"pointer",textAlign:"center",
                    border:isA?"2px solid #b8910a":"1px solid #d8d4cc",
                    background:isA?"#fffef0":"#f8f7f4",
                    boxShadow:isA?"0 2px 8px rgba(184,145,10,0.15)":"none"}}>
                  <div style={{fontSize:13,fontWeight:700,color:isA?"#b8910a":"#2a2520"}}>{s.name}</div>
                  <div style={{fontSize:10,color:"#9a968e",marginTop:2}}>{s.role}</div>
                </button>
              );
            })}
            {activeTab==="clockin" && offlineStaff.length===0 && (
              <div style={{gridColumn:"1/-1",textAlign:"center",padding:"12px",fontSize:12,color:"#9a968e"}}>所有人員已在班</div>
            )}
            {activeTab==="clockout" && onlineStaff.length===0 && (
              <div style={{gridColumn:"1/-1",textAlign:"center",padding:"12px",fontSize:12,color:"#9a968e"}}>目前無在班人員</div>
            )}
          </div>
        </div>

        {/* PIN 輸入 */}
        {selStaff && (
          <div>
            <div style={{fontSize:11,color:"#9a968e",marginBottom:8,textAlign:"center"}}>輸入 PIN 碼</div>
            <div style={{display:"flex",justifyContent:"center",gap:10,marginBottom:12}}>
              {[0,1,2,3].map(function(i){
                return <div key={i} style={{width:14,height:14,borderRadius:"50%",
                  background:i<pin.length?"#b8910a":"#e0dcd6",
                  border:"2px solid "+(i<pin.length?"#b8910a":"#c8c4bc"),transition:"all 0.1s"}}/>;
              })}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
              {pinKeys.map(function(k){
                var isC=k==="✓", isD=k==="←";
                return (
                  <button key={k} onClick={function(){handlePinKey(k);}}
                    style={{padding:"11px 0",borderRadius:8,border:"1px solid #d8d4cc",cursor:"pointer",
                      fontSize:isC?16:isD?16:15,fontWeight:600,
                      background:isC?(activeTab==="clockin"?"#3d9e32":"#d0552f"):isD?"#f0ede8":"#f8f7f4",
                      color:isC?"#ffffff":"#2a2520",
                      boxShadow:isC?"0 2px 8px rgba(0,0,0,0.15)":"none"}}>
                    {k}
                  </button>
                );
              })}
            </div>
            {err && <div style={{marginTop:8,fontSize:11,color:"#d0552f",textAlign:"center"}}>{err}</div>}
          </div>
        )}
        {!selStaff && <div style={{textAlign:"center",fontSize:11,color:"#b8b0a8",padding:"8px 0"}}>↑ 請先選擇人員</div>}
      </div>
    </div>
  );
}

// ── Analytics Drawer ──────────────────────────────────────────────────
function AnalyticsDrawer(props) {

  var orders = props.orders;

  var ps = useState("30"); var period = ps[0], setPeriod = ps[1];


  // Period selector

  var today = new Date();
  var cutoff = new Date(today);
  if (period === "7")  cutoff.setDate(today.getDate()-7);
  else if (period === "30") cutoff.setDate(today.getDate()-30);
  else if (period === "90") cutoff.setDate(today.getDate()-90);
  else cutoff = new Date("2000-01-01"); // all

  var cutoffStr = cutoff.toISOString().slice(0,10);
  var paid = orders.filter(function(o){ return o.status==="paid" && o.date >= cutoffStr; });

  // ── 整體指標 ──
  var totalRev   = paid.reduce(function(s,o){return s+o.total;},0);
  var totalOrders= paid.length;
  var totalQty   = paid.reduce(function(s,o){return s+(o.qty||0);},0);
  var totalDisc  = paid.reduce(function(s,o){return s+(o.discAmt||0);},0);
  var avgOrder   = totalOrders>0 ? Math.round(totalRev/totalOrders) : 0;

  // ── 日期趨勢（每日加總）──
  var dayMap = {};
  paid.forEach(function(o){
    if (!dayMap[o.date]) dayMap[o.date]={date:o.date,rev:0,cnt:0};
    dayMap[o.date].rev += o.total;
    dayMap[o.date].cnt += 1;
  });
  var dailyData = Object.values(dayMap).sort(function(a,b){return a.date>b.date?1:-1;});
  var maxRev = dailyData.reduce(function(s,d){return Math.max(s,d.rev);},1);

  // ── 大分類分析 ──
  var catMap = {};
  MAIN_CATS.forEach(function(m){ catMap[m]={name:m,rev:0,qty:0,orders:0}; });
  paid.forEach(function(o){
    if (!o.cartSnapshot) return;
    o.cartSnapshot.forEach(function(item){
      var cat = item.main||"其他";
      if (!catMap[cat]) catMap[cat]={name:cat,rev:0,qty:0,orders:0};
      catMap[cat].rev += item.price * item.qty;
      catMap[cat].qty += item.qty;
    });
    // count unique orders per cat
    var seen = {};
    if (o.cartSnapshot) o.cartSnapshot.forEach(function(item){
      var cat = item.main||"其他";
      if (!seen[cat]){ seen[cat]=1; if(catMap[cat]) catMap[cat].orders+=1; }
    });
  });
  var catData = Object.values(catMap).filter(function(c){return c.rev>0;})
    .sort(function(a,b){return b.rev-a.rev;});
  var maxCatRev = catData.reduce(function(s,c){return Math.max(s,c.rev);},1);

  // ── 付款方式佔比 ──
  var payMap = {};
  PAYMENTS.forEach(function(m){payMap[m]=0;});
  paid.forEach(function(o){
    if (o.payBreakdown) {
      PAYMENTS.forEach(function(m){ payMap[m]+=(Number(o.payBreakdown[m])||0); });
    } else if (o.payment && payMap[o.payment]!==undefined) {
      payMap[o.payment]+=o.total;
    }
  });
  var totalPayRev = Object.values(payMap).reduce(function(s,v){return s+v;},0)||1;

  // ── 小分類 Top 10 ──
  var subMap = {};
  paid.forEach(function(o){
    if (!o.cartSnapshot) return;
    o.cartSnapshot.forEach(function(item){
      var k = (item.main||"其他")+"／"+(item.sub||"其他");
      if (!subMap[k]) subMap[k]={key:k,main:item.main,sub:item.sub,rev:0,qty:0};
      subMap[k].rev += item.price*item.qty;
      subMap[k].qty += item.qty;
    });
  });
  var subTop = Object.values(subMap).sort(function(a,b){return b.rev-a.rev;}).slice(0,10);

  // ── 最熱賣商品 Top 10 ──
  var prodMap = {};
  paid.forEach(function(o){
    if (!o.cartSnapshot) return;
    o.cartSnapshot.forEach(function(item){
      if (!prodMap[item.sku]) prodMap[item.sku]={name:item.name,sku:item.sku,main:item.main,rev:0,qty:0};
      prodMap[item.sku].rev += item.price*item.qty;
      prodMap[item.sku].qty += item.qty;
    });
  });
  var prodTop = Object.values(prodMap).sort(function(a,b){return b.qty-a.qty;}).slice(0,10);

  var section = {marginBottom:20};
  var sTitle = {fontSize:13,fontWeight:700,color:"#2a2520",marginBottom:10,letterSpacing:"0.06em",
    paddingBottom:6,borderBottom:"2px solid #e0dcd6",display:"flex",alignItems:"center",gap:6};
  var card = {background:"#ffffff",borderRadius:10,padding:"12px 16px",border:"1px solid #e8e4de",
    boxShadow:"0 1px 4px rgba(0,0,0,0.05)"};

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>

      {/* 期間選擇 */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,flexShrink:0}}>
        <span style={{fontSize:12,color:"#7a7068",fontWeight:600}}>分析期間</span>
        {[["7","近 7 天"],["30","近 30 天"],["90","近 90 天"],["all","全部"]].map(function(x){
          var isA = period===x[0];
          return (
            <button key={x[0]} onClick={function(){setPeriod(x[0]);}}
              style={{padding:"4px 12px",borderRadius:20,border:isA?"none":"1px solid #d8d4cc",
                background:isA?"#b8910a":"transparent",color:isA?"#ffffff":"#7a7068",
                fontSize:11,fontWeight:isA?700:500,cursor:"pointer"}}>
              {x[1]}
            </button>
          );
        })}
        <span style={{marginLeft:"auto",fontSize:10,color:"#aaA69e"}}>{totalOrders} 筆訂單</span>
      </div>

      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:0}}>

        {/* ── 整體 KPI 卡片 ── */}
        <div style={Object.assign({},section)}>
          <div style={sTitle}>▲ 整體業績</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            {[
              {label:"總營業額",value:"$"+totalRev.toLocaleString(),color:"#b8910a"},
              {label:"訂單筆數",value:totalOrders+"筆",color:"#2a2520"},
              {label:"售出件數",value:totalQty+"件",color:"#3d9e32"},
              {label:"平均客單價",value:"$"+avgOrder.toLocaleString(),color:"#4a8ec0"},
            ].map(function(k){
              return (
                <div key={k.label} style={Object.assign({},card,{textAlign:"center"})}>
                  <div style={{fontSize:10,color:"#9a968e",marginBottom:4}}>{k.label}</div>
                  <div style={{fontSize:18,fontWeight:800,color:k.color}}>{k.value}</div>
                </div>
              );
            })}
          </div>
          {totalDisc>0 && (
            <div style={{marginTop:6,fontSize:11,color:"#d0552f",textAlign:"right"}}>
              期間折扣合計：-${totalDisc.toLocaleString()}
            </div>
          )}
        </div>

        {/* ── 每日銷售趨勢 ── */}
        <div style={Object.assign({},section)}>
          <div style={sTitle}>▲ 每日銷售趨勢</div>
          {dailyData.length === 0 ? (
            <div style={{textAlign:"center",color:"#c8c4bc",padding:"20px 0",fontSize:12}}>此期間尚無訂單</div>
          ) : (
            <div style={Object.assign({},card,{padding:"14px 16px"})}>
              <div style={{display:"flex",alignItems:"flex-end",gap:3,height:80,overflowX:"auto",paddingBottom:4}}>
                {dailyData.map(function(d){
                  var pct = d.rev/maxRev;
                  var barH = Math.max(4, Math.round(pct*72));
                  return (
                    <div key={d.date} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,flexShrink:0,minWidth:32}}>
                      <div style={{fontSize:9,color:"#b8910a",fontWeight:700,whiteSpace:"nowrap"}}>
                        {d.rev>=1000?"$"+(d.rev/1000).toFixed(1)+"k":"$"+d.rev}
                      </div>
                      <div style={{width:24,height:barH,background:"#b8910a",borderRadius:"3px 3px 0 0",opacity:0.85}}></div>
                      <div style={{fontSize:8,color:"#aaA69e",whiteSpace:"nowrap",transform:"rotate(-40deg)",transformOrigin:"top left",marginTop:4,marginLeft:6}}>
                        {d.date.slice(5)}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>

        {/* ── 大分類銷售佔比 ── */}
        <div style={Object.assign({},section)}>
          <div style={sTitle}>▲ 大分類銷售分析</div>
          {catData.length === 0 ? (
            <div style={{textAlign:"center",color:"#c8c4bc",padding:"20px 0",fontSize:12}}>尚無商品資料</div>
          ) : (
            <div style={Object.assign({},card)}>
              {catData.map(function(c){
                var pct = c.rev/totalRev;
                var barPct = c.rev/maxCatRev;
                var col = CAT_COLORS[c.name]||"#b8910a";
                return (
                  <div key={c.name} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:11,color:col,fontWeight:700}}>{CAT_ICONS[c.name]||"◆"} {c.name}</span>
                        <span style={{fontSize:10,color:"#9a968e"}}>{c.qty}件</span>
                      </div>
                      <div style={{display:"flex",gap:10,alignItems:"center"}}>
                        <span style={{fontSize:10,color:"#9a968e"}}>{(pct*100).toFixed(1)}%</span>
                        <span style={{fontSize:12,fontWeight:700,color:"#2a2520"}}>${c.rev.toLocaleString()}</span>
                      </div>
                    </div>
                    <div style={{background:"#f0ede8",borderRadius:4,height:8,overflow:"hidden"}}>
                      <div style={{height:"100%",width:(barPct*100)+"%",background:col,borderRadius:4,transition:"width 0.4s"}}></div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* ── 付款方式佔比 ── */}
        <div style={Object.assign({},section)}>
          <div style={sTitle}>▲ 付款方式佔比</div>
          <div style={Object.assign({},card)}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {PAYMENTS.map(function(m,i){
                var amt = payMap[m]||0;
                var pct = amt/totalPayRev;
                var colors = ["#b8910a","#4a8ec0","#3d9e32","#c870a8"];
                var col = colors[i%colors.length];
                return (
                  <div key={m} style={{padding:"8px 10px",background:"#f8f7f4",borderRadius:8,border:"1px solid #e8e4de"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{fontSize:11,color:"#7a7068",fontWeight:600}}>{m}</span>
                      <span style={{fontSize:10,color:col,fontWeight:700}}>{(pct*100).toFixed(1)}%</span>
                    </div>
                    <div style={{fontSize:14,fontWeight:800,color:amt>0?col:"#c8c4bc"}}>
                      {amt>0?"$"+amt.toLocaleString():"—"}
                    </div>
                    <div style={{marginTop:4,background:"#e8e4de",borderRadius:3,height:4}}>
                      <div style={{height:"100%",width:(pct*100)+"%",background:col,borderRadius:3}}></div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* ── 小分類 Top 10 ── */}
        <div style={Object.assign({},section)}>
          <div style={sTitle}>▲ 小分類銷售排行 Top 10</div>
          {subTop.length === 0 ? (
            <div style={{textAlign:"center",color:"#c8c4bc",padding:"20px 0",fontSize:12}}>尚無資料</div>
          ) : (
            <div style={Object.assign({},card,{padding:0,overflow:"hidden"})}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr style={{background:"#f5f4f0"}}>
                    {["#","小分類","大分類","件數","銷售額"].map(function(h,i){
                      return <th key={h} style={{padding:"8px 10px",textAlign:i>=3?"right":"left",fontSize:10,color:"#9a968e",fontWeight:600,borderBottom:"1px solid #e8e4de"}}>{h}</th>;
                    })}
                  </tr>
                </thead>
                <tbody>
                  {subTop.map(function(s,idx){
                    return (
                      <tr key={s.key} style={{background:idx%2===0?"#ffffff":"#faf9f7"}}>
                        <td style={{padding:"7px 10px",color:"#aaA69e",fontSize:11}}>{idx+1}</td>
                        <td style={{padding:"7px 10px",fontWeight:600,color:"#2a2520"}}>{s.sub||"—"}</td>
                        <td style={{padding:"7px 10px",fontSize:10,color:CAT_COLORS[s.main]||"#7a7068"}}>{s.main}</td>
                        <td style={{padding:"7px 10px",textAlign:"right",color:"#3d9e32",fontWeight:600}}>{s.qty}</td>
                        <td style={{padding:"7px 10px",textAlign:"right",color:"#b8910a",fontWeight:700}}>${s.rev.toLocaleString()}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>

        {/* ── 熱銷商品 Top 10 ── */}
        <div style={Object.assign({},section)}>
          <div style={sTitle}>▲ 熱銷商品 Top 10</div>
          {prodTop.length === 0 ? (
            <div style={{textAlign:"center",color:"#c8c4bc",padding:"20px 0",fontSize:12}}>尚無資料</div>
          ) : (
            <div style={Object.assign({},card,{padding:0,overflow:"hidden"})}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr style={{background:"#f5f4f0"}}>
                    {["#","商品名稱","貨號","大分類","售出量","銷售額"].map(function(h,i){
                      return <th key={h} style={{padding:"8px 10px",textAlign:i>=4?"right":"left",fontSize:10,color:"#9a968e",fontWeight:600,borderBottom:"1px solid #e8e4de"}}>{h}</th>;
                    })}
                  </tr>
                </thead>
                <tbody>
                  {prodTop.map(function(p,idx){
                    return (
                      <tr key={p.sku} style={{background:idx%2===0?"#ffffff":"#faf9f7"}}>
