<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="巧克莉莉POS">
  <title>巧克莉莉選物店 · 員林店 POS</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html,body { height:100%; overflow:hidden; background:#f5f4f0; }
    #root { height:100%; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }
    * { -webkit-overflow-scrolling:touch; }
    #sync-toast {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
      background:#2a7040; color:white; padding:9px 20px;
      border-radius:24px; font-size:12px; font-family:"Noto Sans TC",sans-serif;
      z-index:9999; opacity:0; transition:opacity 0.3s; pointer-events:none;
      white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,0.15);
    }
    #sync-toast.show { opacity:1; }
    #sync-toast.error { background:#a03020; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="sync-toast">☁️ 已同步</div>

  <!-- 匯入備份浮動按鈕 -->
  <div id="import-btn" style="position:fixed;bottom:20px;right:20px;z-index:8888;display:none;">
    <button onclick="document.getElementById('import-panel').style.display='flex'"
      style="background:#b8910a;color:#fff;border:none;border-radius:24px;padding:10px 18px;
        font-size:13px;font-family:'Noto Sans TC',sans-serif;font-weight:700;cursor:pointer;
        box-shadow:0 4px 16px rgba(0,0,0,0.2);">
      ⬇️ 匯入資料
    </button>
  </div>

  <!-- 匯入備份 Modal -->
  <div id="import-panel" style="position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.5);
    display:none;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:16px;padding:24px;width:340px;max-width:92vw;
      font-family:'Noto Sans TC',sans-serif;box-shadow:0 8px 32px rgba(0,0,0,0.2);">
      <div style="font-size:15px;font-weight:700;color:#2a2520;margin-bottom:8px;">⬇️ 匯入資料備份</div>
      <div style="font-size:12px;color:#9a968e;margin-bottom:12px;line-height:1.6;">
        從 JSX 版「⬇️ 匯出資料備份」下載的 JSON 檔案
      </div>
      <input type="file" id="import-file" accept=".json" style="font-size:12px;width:100%;margin-bottom:12px;"/>
      <div style="display:flex;gap:8px;">
        <button onclick="doImport()"
          style="flex:1;padding:10px;background:#b8910a;border:none;border-radius:8px;
            color:#fff;font-size:13px;font-weight:700;cursor:pointer;">
          匯入並套用
        </button>
        <button onclick="document.getElementById('import-panel').style.display='none'"
          style="padding:10px 14px;background:#f5f4f0;border:1px solid #d8d4cc;border-radius:8px;
            color:#9a968e;font-size:12px;cursor:pointer;">
          取消
        </button>
      </div>
      <div id="import-msg" style="font-size:11px;margin-top:8px;color:#3d9e32;display:none;"></div>
    </div>
  </div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <script>
  var FB      = "https://chocoolee-pos-default-rtdb.firebaseio.com";
  var FB_KEY  = "AIzaSyDqJZiwefGVMiTVusd-Z1jTuQByaMS_i2w";
  var FB_USER = "chocolee0709@gmail.com";
  var FB_PASS = "love0501";
  var fbToken = null;
  var fbTokenExpiry = 0;
  var syncTimers = {};
  var sseSource = null;
  var sseReconnectTimer = null;
  var lastLoadTime = 0;

  function showToast(msg, isError) {
    var t = document.getElementById("sync-toast");
    if (!t) return;
    t.textContent = msg;
    t.className = isError ? "error show" : "show";
    clearTimeout(t._hide);
    t._hide = setTimeout(function(){ t.classList.remove("show","error"); }, 2800);
  }

  // 取得 idToken（有效期 1 小時，快到期自動重新登入）
  function getToken(cb) {
    var now = Date.now();
    if (fbToken && fbTokenExpiry - now > 60000) { cb(fbToken); return; }
    fetch("https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=" + FB_KEY, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({email:FB_USER, password:FB_PASS, returnSecureToken:true})
    }).then(function(r){ return r.json(); }).then(function(d){
      if (d.idToken) {
        fbToken = d.idToken;
        fbTokenExpiry = now + (parseInt(d.expiresIn||3600)*1000);
        cb(fbToken);
      } else {
        console.error("Firebase 登入失敗", d.error);
        showToast("⚠️ 雲端登入失敗", true);
        cb(null);
      }
    }).catch(function(e){
      showToast("⚠️ 無法連線 Firebase", true);
      cb(null);
    });
  }

  // 從 Firebase 載入所有資料 → 寫入 localStorage → 通知 React 更新
  function fetchAllFromFirebase(callback) {
    getToken(function(token){
      if (!token) { if(callback) callback(false); return; }
      fetch(FB + "/chocoolee.json?auth=" + token)
        .then(function(r){
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.json();
        })
        .then(function(data){
          if (data && typeof data === "object") {
            var changed = [];
            Object.keys(data).forEach(function(key){
              try {
                var newVal = typeof data[key] === "string" ? data[key] : JSON.stringify(data[key]);
                var oldVal = localStorage.getItem("chocoolee-" + key);
                if (newVal !== oldVal) {
                  localStorage.setItem("chocoolee-" + key, newVal);
                  changed.push(key);
                }
              } catch(e){}
            });
            if (changed.length > 0 && window.__reactSetters) {
              // 通知 React 更新有變動的 key
              changed.forEach(function(key) {
                var setter = window.__reactSetters[key];
                if (setter) {
                  try {
                    var val = localStorage.getItem("chocoolee-" + key);
                    if (val) setter(JSON.parse(val));
                  } catch(e){}
                }
              });
            }
          }
          if(callback) callback(true);
        })
        .catch(function(e){
          console.warn("Firebase 載入失敗", e.message);
          if(callback) callback(false);
        });
    });
  }

  window.loadFromFirebase = function(callback) {
    showToast("⏳ 正在從雲端載入資料...");
    fetchAllFromFirebase(function(ok){
      if (ok) showToast("☁️ 雲端資料載入完成");
      else { showToast("⚠️ 雲端載入失敗，使用本地資料", true); }
      if(callback) callback(ok);
    });
  };

  // 推送單一 key → Firebase（防抖 2 秒）
  window.pushToFirebase = function(key, value) {
    clearTimeout(syncTimers[key]);
    syncTimers[key] = setTimeout(function(){
      getToken(function(token){
        if (!token) return;
        fetch(FB + "/chocoolee/" + key + ".json?auth=" + token, {
          method:"PUT",
          headers:{"Content-Type":"application/json"},
          body: typeof value === "string" ? value : JSON.stringify(value)
        }).then(function(r){
          if (r.ok) showToast("☁️ 已同步");
          else showToast("⚠️ 同步失敗", true);
        }).catch(function(){ showToast("⚠️ 推送失敗", true); });
      });
    }, 2000);
  };

  // ── Firebase 即時監聽（SSE）──
  // Firebase Realtime Database 支援 SSE，有變動時自動通知
  function startSSE() {
    if (sseSource) { sseSource.close(); sseSource = null; }
    clearTimeout(sseReconnectTimer);

    getToken(function(token){
      if (!token) {
        // token 取不到，60 秒後重試
        sseReconnectTimer = setTimeout(startSSE, 60000);
        return;
      }
      var url = FB + "/chocoolee.json?auth=" + token + "&timeout=55s";
      try {
        sseSource = new EventSource(url);

        sseSource.addEventListener("put", function(e) {
          // Firebase 資料有變動
          var now = Date.now();
          if (now - lastLoadTime < 3000) return; // 自己剛推送的，忽略
          lastLoadTime = now;
          showToast("🔄 偵測到資料更新，同步中...");
          fetchAllFromFirebase(function(ok){
            if (ok) showToast("✅ 資料已同步最新");
          });
        });

        sseSource.addEventListener("patch", function(e) {
          var now = Date.now();
          if (now - lastLoadTime < 3000) return;
          lastLoadTime = now;
          fetchAllFromFirebase(null);
        });

        sseSource.onerror = function() {
          sseSource.close();
          sseSource = null;
          // 30 秒後重新連線
          sseReconnectTimer = setTimeout(startSSE, 30000);
        };

      } catch(e) {
        console.warn("SSE 不支援，改用輪詢", e);
        startPolling();
      }
    });
  }

  // 備用：每 30 秒輪詢一次（SSE 不支援時）
  var pollingTimer = null;
  function startPolling() {
    clearInterval(pollingTimer);
    pollingTimer = setInterval(function(){
      var now = Date.now();
      if (now - lastLoadTime < 5000) return; // 剛推送過，跳過
      fetchAllFromFirebase(null);
    }, 30000);
  }

  // 覆蓋 pushToFirebase，記錄推送時間避免自己觸發 SSE
  var origPush = window.pushToFirebase;
  window.pushToFirebase = function(key, value) {
    clearTimeout(syncTimers[key]);
    syncTimers[key] = setTimeout(function(){
      getToken(function(token){
        if (!token) return;
        lastLoadTime = Date.now(); // 標記自己推送，避免 SSE 誤觸發
        fetch(FB + "/chocoolee/" + key + ".json?auth=" + token, {
          method:"PUT",
          headers:{"Content-Type":"application/json"},
          body: typeof value === "string" ? value : JSON.stringify(value)
        }).then(function(r){
          if (r.ok) showToast("☁️ 已同步");
          else showToast("⚠️ 同步失敗", true);
        }).catch(function(){ showToast("⚠️ 推送失敗", true); });
      });
    }, 2000);
  };

  // 啟動：先載入資料，再開始即時監聽
  window.firebaseReady = false;
  loadFromFirebase(function(ok){
    window.firebaseReady = true;
    window.__firebaseLoaded = ok;
    if (ok) {
      // 載入成功後啟動即時監聽
      startSSE();
    } else {
      document.getElementById("import-btn").style.display = "block";
      startPolling(); // 降級為輪詢
    }
  });

  // 手動匯入 JSON 備份
  function doImport() {
    var file = document.getElementById("import-file").files[0];
    if (!file) { alert("請先選擇 JSON 檔案"); return; }
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = JSON.parse(e.target.result);
        var count = 0;
        Object.keys(data).forEach(function(key) {
          var val = typeof data[key] === 'string' ? data[key] : JSON.stringify(data[key]);
          localStorage.setItem('chocoolee-' + key, val);
          if (window.pushToFirebase) window.pushToFirebase(key, val);
          count++;
        });
        var msg = document.getElementById("import-msg");
        msg.textContent = "✓ 成功匯入 " + count + " 筆資料，重新整理頁面後生效";
        msg.style.display = "block";
        setTimeout(function(){ location.reload(); }, 1800);
      } catch(err) {
        alert("JSON 格式錯誤：" + err.message);
      }
    };
    reader.readAsText(file);
  }

  // SSE token 每 50 分鐘自動更新（token 1小時過期）
  setInterval(function(){
    fbToken = null; // 清掉舊 token，下次 getToken 自動取新的
    if (sseSource) startSSE(); // 重啟 SSE 連線用新 token
  }, 50 * 60 * 1000);
  </script>

// ── Barcode visual ──
function BarcodeViz(props) {
  var code = props.code, w = props.w || 130, h = props.h || 36;
  var d = String(code).split("").filter(function(c){return c>="0"&&c<="9";}).join("").padStart(9,"0");
  var bars = [];
  for (var i=0; i<d.length; i++) {
    var n = parseInt(d[i]);
    bars.push({w:1.5, black: n%2===0});
    bars.push({w:2.5, black: (n+1)%2===0});
    bars.push({w:1,   black: (n+2)%2===0});
  }
  bars.push({w:2,black:true},{w:1,black:false},{w:2,black:true});
  var total = bars.reduce(function(s,b){return s+b.w;}, 0);
  var sc = w / total;
  var x = 0;
  var rects = bars.map(function(b, i) {
    var bx = x; x += b.w * sc;
    if (!b.black) return null;
    return <rect key={i} x={bx} y={0} width={b.w*sc} height={h-10} fill="#111"/>;
  });
  return (
    <svg width={w} height={h} style={{display:"block",background:"white"}}>
      {rects}
      <text x={w/2} y={h-1} textAnchor="middle" fontSize={8} fill="#333" fontFamily="monospace">{code}</text>
    </svg>
  );
}

// ── Print Modal ──
function PrintModal(props) {
  var items = props.items, onClose = props.onClose;
  var initCopies = {};
  items.forEach(function(p){ initCopies[p.id] = 1; });
  var s = useState(initCopies);
  var copies = s[0], setCopies = s[1];

  function handlePrint() {
    var win = window.open("","_blank");
    var rows = "";
    items.forEach(function(p) {
      var n = copies[p.id] || 1;
      for (var i=0; i<n; i++) {
        rows += '<div class="c">'
          + '<div class="n">'+p.name.substring(0,20)+'</div>'
          + '<div class="p">NT$ '+p.price.toLocaleString()+'</div>'
          + '<div class="b">'+p.barcode+'</div>'
          + '<div class="s">'+p.sku+'</div>'
          + '</div>';
      }
    });
    win.document.write('<html><head><title>條碼列印</title><style>'
      + 'body{margin:0;font-family:sans-serif}'
      + '.g{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px}'
      + '.c{border:1px solid #ccc;border-radius:4px;padding:8px 6px;text-align:center;display:flex;flex-direction:column;gap:3px;align-items:center;justify-content:center}'
      + '.n{font-size:11px;font-weight:bold;color:#222;line-height:1.2;min-height:26px;display:flex;align-items:center;text-align:center}'
      + '.p{font-size:13px;font-weight:800;color:#b8910a;margin:2px 0}'
      + '.b{font-size:9px;font-family:"Libre Barcode 128",monospace;letter-spacing:1px;border:1px solid #333;border-radius:3px;padding:3px 6px;background:#ffffff;color:#000;margin-top:2px;width:90%}'
      + '.s{font-size:8px;color:#888;letter-spacing:1px;margin-top:1px}'
      + '@media print{body{margin:0}.c{break-inside:avoid}}'
      + '</style></head><body><div class="g">'+rows+'</div></body></html>');
    win.document.close();
    setTimeout(function(){ win.print(); }, 300);
  }

  // ── 匯出標籤檔（給精臣/微打等藍牙標籤機 App 匯入用）──
  function exportLabelCSV() {
    var rows = [];
    // 表頭（精臣雲打印 App 支援的欄位名稱）
    rows.push(["商品名稱","貨號","售價","條碼","份數"]);
    items.forEach(function(p) {
      var n = copies[p.id] || 1;
      rows.push([
        p.name,
        p.sku,
        "NT$ "+p.price.toLocaleString(),
        p.barcode,
        n
      ]);
    });
    // 加上 BOM 讓 Excel/App 正確識別 UTF-8
    var csv = "\uFEFF" + rows.map(function(r){
      return r.map(function(c){
        var s = String(c);
        // 含有逗號、雙引號或換行的欄位要加雙引號
        var hasComma = s.indexOf(",")>=0;
        var hasQuote = s.indexOf('"')>=0;
        var hasNewline = s.indexOf("\n")>=0;
        if (hasComma || hasQuote || hasNewline) {
          return '"' + s.split('"').join('""') + '"';
        }
        return s;
      }).join(",");
    }).join("\r\n");

    var blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement("a");
    a.href = url;
    a.download = "標籤檔_"+new Date().toISOString().slice(0,10)+".csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  var total = items.reduce(function(s,p){ return s+(copies[p.id]||1); }, 0);

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center"}}
      onClick={function(e){ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{background:"#ffffff",border:"1px solid #3a3530",borderRadius:14,padding:20,width:500,maxWidth:"95vw",maxHeight:"80vh",display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:14,fontWeight:700,color:"#2a2520"}}>批次列印條碼</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#9a968e",cursor:"pointer",fontSize:20}}>×</button>
        </div>
        <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
          {items.map(function(p) {
            return (
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #2e2a22"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:"#2a2520",fontWeight:600}}>{p.name}</div>
                  <div style={{fontSize:10,color:"#9a968e",fontFamily:"monospace"}}>{p.sku} · NT${p.price}</div>
                </div>
                <BarcodeViz code={p.barcode} w={90} h={30}/>
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  <button onClick={function(){ setCopies(function(c){ var n={}; Object.assign(n,c); n[p.id]=Math.max(1,(c[p.id]||1)-1); return n; }); }}
                    style={{width:20,height:20,borderRadius:"50%",background:"#d8d4cc",border:"none",color:"#2a2520",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>−</button>
                  <span style={{fontSize:12,fontWeight:700,minWidth:22,textAlign:"center",color:"#b8910a"}}>{copies[p.id]||1}</span>
                  <button onClick={function(){ setCopies(function(c){ var n={}; Object.assign(n,c); n[p.id]=(c[p.id]||1)+1; return n; }); }}
                    style={{width:20,height:20,borderRadius:"50%",background:"#d8d4cc",border:"none",color:"#b8910a",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>+</button>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:10,color:"#9a968e"}}>
            💡 匯出 CSV 可上傳到精臣/微打 App 用藍牙列印
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onClose} style={{background:"none",border:"1px solid #2e2a22",borderRadius:7,padding:"8px 16px",color:"#7a7068",fontSize:12,cursor:"pointer"}}>取消</button>
            <button onClick={exportLabelCSV} style={{background:"#4a8ec0",border:"none",borderRadius:7,padding:"8px 18px",color:"#ffffff",fontSize:12,fontWeight:700,cursor:"pointer"}}>📋 匯出標籤檔</button>
            <button onClick={handlePrint} style={{background:"#b8910a",border:"none",borderRadius:7,padding:"8px 20px",color:"#f5f4f0",fontSize:12,fontWeight:700,cursor:"pointer"}}>🖨 列印 {total} 張</button>
          </div>
        </div>
      </div>
    </div>
  );
}

        for(var ri=hIdx+1;ri<rows.length;ri++){
          var row=rows[ri];
          var sku=String(row[skuCol]||"").trim();
          var actual=row[actualCol];
          if(!sku||actual===""||actual===null||actual===undefined)continue;
          var an=Number(actual);if(isNaN(an)||an<0)continue;
          var prod=skuMap[sku];if(!prod)continue;
          var sysSt=stocks[prod.id]!==undefined?stocks[prod.id]:prod.stock;
          if(an===sysSt)continue;
          if(results.find(function(r){return r.sku===sku;}))return;
          results.push({id:prod.id,sku:prod.sku,name:prod.name,main:prod.main,sub:prod.sub,sysSt:sysSt,actualSt:an,diff:an-sysSt});
        }
      });
      if(results.length===0){alert("找不到有差異的盤點資料");return;}
      setImportPreview(results);
    };
    reader.readAsArrayBuffer(file);
    e.target.value="";
  }

  function handleBatchImport(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var wb=XLSX.read(ev.target.result,{type:"array"});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      var hIdx=-1,cols={};
      rows.forEach(function(row,ri){
        var cs=row.map(function(c){return String(c).trim();});
        if(cs.indexOf("商品名稱")>=0||cs.indexOf("貨號")>=0){
          hIdx=ri;
          cs.forEach(function(c,i){cols[c]=i;});
        }
      });
      if(hIdx<0){alert("找不到表頭（需含「貨號」或「商品名稱」欄）");return;}
      var items=[];
      for(var ri=hIdx+1;ri<rows.length;ri++){
        var row=rows[ri];
        var name=String(row[cols["商品名稱"]||0]||"").trim();
        var sku=String(row[cols["貨號"]||1]||"").trim();
        if(!name&&!sku)continue;
        items.push({
          sku:sku||"NEW-"+ri,
          name:name||"新商品"+ri,
          price:Number(row[cols["售價"]||cols["台幣售價"]||cols["零售價"]])||0,
          cost:Number(row[cols["成本"]||cols["成本2"]||cols["cost"]])||0,
          main:String(row[cols["大分類"]]||"生活選物").trim(),
          sub:String(row[cols["小分類"]]||"").trim(),
          stock:Number(row[cols["庫存"]||cols["系統庫存"]||cols["實際盤點"]])||0,
        });
      }
      if(items.length===0){alert("無法解析商品資料");return;}
      setBatchPreview(items);
      setShowBatchNew(true);
    };
    reader.readAsArrayBuffer(file);
    e.target.value="";
  }
  function applyBatchNew(){
    var now = new Date();
    var dateStr = now.toISOString().slice(0,10);
    var timeStr = now.toTimeString().slice(0,5);
    var operator = currentStaff ? currentStaff.name : "—";
    var newProds = batchPreview.map(function(p,i){
      return Object.assign({},EMPTY_PRODUCT,p,{id:Date.now()+i,barcode:String(products.length+1001+i).padStart(9,"0")});
    });
    var entries = newProds.filter(function(p){return (p.stock||0)>0;}).map(function(p){
      return {
        id:Date.now()+p.id, date:dateStr, time:timeStr,
        productId:p.id, sku:p.sku, name:p.name,
        main:p.main, sub:p.sub,
        reason:"批次新增", change:p.stock||0, before:0, after:p.stock||0,
        operator:operator
      };
    });
    setProducts(function(prev){return prev.concat(newProds);});
    setStocks(function(prev){
      var n=Object.assign({},prev);
      newProds.forEach(function(p){n[p.id]=p.stock||0;});
      return n;
    });
    if(entries.length>0) addLog(entries);
    setBatchPreview([]);
    setShowBatchNew(false);
  }

            </div>

          <div style={{display:"flex",gap:8,justifyContent:"flex-end",alignItems:"center"}}>
            {(!newForm.name||!newForm.sku) && (
              <span style={{fontSize:10,color:"#9a968e"}}>* 商品名稱與貨號為必填</span>
            )}
            <button onClick={function(){setShowAdd(false);setNewForm(Object.assign({},EMPTY_PRODUCT));}}
              style={{background:"none",border:"1px solid #d8d4cc",borderRadius:6,padding:"6px 14px",color:"#7a7068",fontSize:12,cursor:"pointer"}}>取消</button>
            <button onClick={addProduct} disabled={!newForm.name||!newForm.sku}
              style={{background:(newForm.name&&newForm.sku)?"#b8910a":"#e0dcd6",border:"none",borderRadius:6,padding:"6px 20px",
                color:(newForm.name&&newForm.sku)?"#ffffff":"#b8b0a4",fontSize:12,fontWeight:700,
                cursor:(newForm.name&&newForm.sku)?"pointer":"default",
                boxShadow:(newForm.name&&newForm.sku)?"0 2px 6px rgba(184,145,10,0.2)":"none"}}>
              新增
            </button>
          </div>
        </div>
      )}

      {/* ── 商品編輯 inline 框 ── */}
      {editId !== null && editForm && (
        <div style={{background:"#f0f8ff",border:"1px solid #4a8ec0",borderRadius:8,padding:"10px 14px",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:12,fontWeight:700,color:"#2a2520"}}>✎ 編輯商品</span>
            <button onClick={function(){setEditId(null);setEditForm(null);}} style={{background:"none",border:"none",color:"#9a968e",cursor:"pointer",fontSize:18}}>×</button>
          </div>
          <div style={{display:"flex",gap:12,marginBottom:8}}>
            {/* 圖片上傳區 */}
            <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <label style={{cursor:"pointer",display:"block"}}>
                {editForm.image ? (
                  <img src={editForm.image} alt="預覽" style={{width:90,height:90,objectFit:"cover",borderRadius:8,border:"2px solid #4a8ec0"}}/>
                ) : (
                  <div style={{width:90,height:90,borderRadius:8,border:"2px dashed #d8d4cc",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:2,background:"#ffffff"}}>
                    <span style={{fontSize:22}}>📷</span>
                    <span style={{fontSize:9,color:"#9a968e"}}>點此上傳</span>
                  </div>
                )}
                <input type="file" accept="image/*" onChange={function(e){handleImageUpload(e,setEF);}} style={{display:"none"}}/>
              </label>
              {editForm.image && (
                <button onClick={function(){setEF("image","");}}
                  style={{background:"none",border:"none",color:"#d0552f",fontSize:9,cursor:"pointer"}}>移除圖片</button>
              )}
            </div>
            {/* 欄位區 */}
            <div style={{flex:1,display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
              <div><label style={lbl}>商品名稱</label><input value={editForm.name} onChange={function(e){setEF("name",e.target.value);}} style={inp}/></div>
              <div><label style={lbl}>貨號</label><input value={editForm.sku} onChange={function(e){setEF("sku",e.target.value);}} style={inp}/></div>
              <div><label style={lbl}>售價 (NT$)</label><input type="number" value={editForm.price} onChange={function(e){setEF("price",e.target.value);}} style={inp}/></div>
              {isManager && <div><label style={lbl}>成本 (NT$) 🔒</label><input type="number" value={editForm.cost||""} onChange={function(e){setEF("cost",e.target.value);}} style={inp}/></div>}
              <div><label style={lbl}>大分類</label>
                <select value={editForm.main} onChange={function(e){setEF("main",e.target.value);setEF("sub","");}} style={inp}>
                  {MAIN_CATS.map(function(m){return <option key={m} value={m}>{m}</option>;})}
                </select>
              </div>
              <div><label style={lbl}>小分類</label>
                <select value={editForm.sub||""} onChange={function(e){setEF("sub",e.target.value);}} style={inp}>
                  <option value="">—</option>
                  {editSubOpts.map(function(s){return <option key={s} value={s}>{s}</option>;})}
                </select>
              </div>
              <div><label style={lbl}>條碼</label><input value={editForm.barcode||""} onChange={function(e){setEF("barcode",e.target.value);}} style={inp}/></div>
            </div>
          </div>
          <div style={{display:"flex",gap:6,justifyContent:"space-between",alignItems:"center"}}>
            {isManager ? (
              <button onClick={deleteProduct}
                style={{background:"none",border:"1px solid #d0552f",borderRadius:6,padding:"5px 12px",color:"#d0552f",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                🗑 刪除商品
              </button>
            ) : <div style={{fontSize:10,color:"#aaA69e"}}>🔒 刪除需店長權限</div>}
            <div style={{display:"flex",gap:6}}>
              <button onClick={function(){setEditId(null);setEditForm(null);}} style={{background:"none",border:"1px solid #d8d4cc",borderRadius:6,padding:"5px 14px",color:"#7a7068",fontSize:12,cursor:"pointer"}}>取消</button>
              <button onClick={saveEdit} style={{background:"#4a8ec0",border:"none",borderRadius:6,padding:"5px 18px",color:"#ffffff",fontSize:12,fontWeight:700,cursor:"pointer"}}>儲存</button>
            </div>
          </div>
        </div>
      )}

      {/* ── 商品庫存表格 ── */}
      <div style={{flex:1,overflowY:"auto",overflowX:"auto",minHeight:0}}>
        <table style={{width:"100%",minWidth:680,borderCollapse:"collapse",fontSize:12}}>
          <thead style={{position:"sticky",top:0,background:"#f5f4f0",zIndex:1}}>
            <tr style={{fontSize:10,color:"#9a968e"}}>
              <th style={{padding:"7px 8px 7px 4px",borderBottom:"2px solid #d8d4cc",textAlign:"center",width:32}}>
                <input type="checkbox"
                  style={{accentColor:"#b8910a",cursor:"pointer",width:14,height:14}}
                  checked={pageData.length>0 && pageData.every(function(p){return selected.has(p.id);})}
                  onChange={function(e){
                    if(e.target.checked){
                      setSelected(function(prev){
                        var s=new Set(prev);
                        pageData.forEach(function(p){s.add(p.id);});
                        return s;
                      });
                    } else {
                      setSelected(function(prev){
                        var s=new Set(prev);
                        pageData.forEach(function(p){s.delete(p.id);});
                        return s;
                      });
                    }
                  }}
                />
              </th>
              <th style={{padding:"7px 8px 7px 0",borderBottom:"2px solid #d8d4cc",textAlign:"left"}}>貨號</th>
              <th style={{padding:"7px 8px 7px 0",borderBottom:"2px solid #d8d4cc",textAlign:"left"}}>商品名稱</th>
              <th style={{padding:"7px 8px 7px 0",borderBottom:"2px solid #d8d4cc",textAlign:"left"}}>分類</th>
              <th style={{padding:"7px 8px 7px 0",borderBottom:"2px solid #d8d4cc",textAlign:"right"}}>售價</th>
              {isManager && <th style={{padding:"7px 8px 7px 0",borderBottom:"2px solid #d8d4cc",textAlign:"right",color:"#b8910a"}}>成本</th>}
              {isManager && <th style={{padding:"7px 8px 7px 0",borderBottom:"2px solid #d8d4cc",textAlign:"right",color:"#3d9e32"}}>毛利</th>}
              {isManager && <th style={{padding:"7px 8px 7px 0",borderBottom:"2px solid #d8d4cc",textAlign:"right",color:"#3d9e32"}}>毛利率</th>}
              <th style={{padding:"7px 8px 7px 0",borderBottom:"2px solid #d8d4cc",textAlign:"center"}}>庫存量</th>
              <th style={{padding:"7px 0",borderBottom:"2px solid #d8d4cc"}}></th>
            </tr>
          </thead>
          <tbody>
            {pageData.map(function(p,idx){
              var st     = stocks[p.id]!==undefined ? stocks[p.id] : p.stock;
              var cost   = Number(p.cost)||Math.round(p.price*0.6);
              var margin = p.price - cost;
              var mRate  = p.price>0 ? (margin/p.price*100) : 0;
              var mColor = mRate>=40?"#3d9e32":mRate>=25?"#b8910a":"#d0552f";
              var low    = st<=5;
              var isEditing  = editId===p.id;
              var isAdjusting= adjustId===p.id;
              return (
                <tr key={p.id} style={{
                  background:selected.has(p.id)?"#fffef0":isEditing?"#f0f8ff":isAdjusting?"#fffef8":idx%2===0?"#ffffff":"#faf9f7",
                  borderLeft:low?"3px solid #d0552f":"3px solid transparent"
                }}>
                  <td style={{padding:"7px 6px",textAlign:"center",borderBottom:"1px solid #f0ede8"}}>
                    <input type="checkbox" checked={selected.has(p.id)} onChange={function(){toggleSel(p.id);}} style={{accentColor:"#b8910a",cursor:"pointer"}}/>
                  </td>
                  <td style={{padding:"7px 8px 7px 0",fontFamily:"monospace",fontSize:10,color:"#9a968e",borderBottom:"1px solid #f0ede8"}}>{p.sku}</td>
                  <td style={{padding:"7px 8px 7px 0",borderBottom:"1px solid #f0ede8",maxWidth:200}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      {p.image ? (
                        <img src={p.image} alt="" onClick={function(){openEdit(p);}} title="點擊編輯商品"
                          style={{width:32,height:32,objectFit:"cover",borderRadius:4,flexShrink:0,border:"1px solid #e8e4de",cursor:"pointer"}}/>
                      ) : (
                        <div onClick={function(){openEdit(p);}} title="點擊編輯商品"
                          style={{width:32,height:32,borderRadius:4,background:"#f5f4f0",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:14,color:"#c8c4bc",cursor:"pointer",transition:"all 0.15s"}}
                          onMouseEnter={function(e){e.currentTarget.style.background="#e8e4de";e.currentTarget.style.color="#b8910a";}}
                          onMouseLeave={function(e){e.currentTarget.style.background="#f5f4f0";e.currentTarget.style.color="#c8c4bc";}}>📦</div>
                      )}
                      <span style={{color:"#2a2520",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span>
                    </div>
                  </td>
                  <td style={{padding:"7px 8px 7px 0",fontSize:10,borderBottom:"1px solid #f0ede8"}}>
                    <span style={{color:CAT_COLORS[p.main]||"#b8910a",fontWeight:600}}>{p.main}</span>
                    {p.sub&&<span style={{color:"#aaA69e"}}> / {p.sub}</span>}
                  </td>
                  <td style={{padding:"7px 8px 7px 0",textAlign:"right",color:"#b8910a",fontWeight:700,borderBottom:"1px solid #f0ede8"}}>${p.price.toLocaleString()}</td>
                  {isManager && <td style={{padding:"7px 8px 7px 0",textAlign:"right",color:"#7a7068",borderBottom:"1px solid #f0ede8"}}>${cost.toLocaleString()}</td>}
                  {isManager && <td style={{padding:"7px 8px 7px 0",textAlign:"right",color:mColor,fontWeight:600,borderBottom:"1px solid #f0ede8"}}>${margin.toLocaleString()}</td>}
                  {isManager && (
                    <td style={{padding:"7px 8px 7px 0",textAlign:"right",borderBottom:"1px solid #f0ede8"}}>
                      <span style={{fontSize:11,fontWeight:700,padding:"1px 7px",borderRadius:20,
                        background:mRate>=40?"#e8f8e8":mRate>=25?"#fffbeb":"#fdecea",color:mColor}}>
                        {mRate.toFixed(0)}%
                      </span>
                    </td>
                  )}
                  <td style={{padding:"7px 8px 7px 0",textAlign:"center",borderBottom:"1px solid #f0ede8"}}>
                    <span style={{fontSize:13,fontWeight:800,color:low?"#d0552f":"#3d9e32"}}>{st}</span>
                    {low&&<span style={{fontSize:9,color:"#d0552f",display:"block"}}>低庫存</span>}
                    <button onClick={function(){openAdjust(p);}}
                      style={{display:"block",margin:"2px auto 0",background:"none",border:"1px solid #d8d4cc",borderRadius:4,padding:"1px 7px",color:"#b8910a",fontSize:9,cursor:"pointer"}}>
                      調整
                    </button>
                  </td>
                  <td style={{padding:"7px 4px",textAlign:"center",borderBottom:"1px solid #f0ede8"}}>
                    <span style={{fontSize:10,color:"#c8c4bc",fontFamily:"monospace"}}>{p.barcode}</span>
                  </td>
                </tr>
              );
            })}
          </tbody>
          {filtered.length>0 && (
            <tfoot>
              <tr style={{background:"#f0ede8"}}>
                <td colSpan={isManager?6:3} style={{padding:"8px 8px 8px 0",fontSize:11,fontWeight:700,color:"#7a7068"}}>
                  合計（{filtered.length} 項）
                </td>
                {isManager && <td style={{padding:"8px 8px",textAlign:"right",fontSize:12,fontWeight:800,color:"#b8910a"}}>${kpiRetail.toLocaleString()}</td>}
                {isManager && <td></td>}
                <td style={{padding:"8px",textAlign:"center",fontSize:12,fontWeight:800,color:"#2a2520"}}>{kpiStock.toLocaleString()} 件</td>
                <td></td>
              </tr>
            </tfoot>
          )}
        </table>
      </div>

      {/* ── 條碼列印 Modal ── */}
      {showPrint && printItems.length>0 && (
        <PrintModal items={printItems} onClose={function(){setShowPrint(false);setSelected(new Set());}}/>
      )}

      {/* ── 匯入盤點預覽 Modal ── */}
      {importPreview && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center"}}
          onClick={function(e){if(e.target===e.currentTarget)setImportPreview(null);}}>
          <div style={{background:"#ffffff",borderRadius:14,padding:20,width:680,maxWidth:"95vw",maxHeight:"85vh",display:"flex",flexDirection:"column",gap:12,boxShadow:"0 8px 40px rgba(0,0,0,0.18)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:"#2a2520"}}>↑ 盤點匯入預覽</div>
                <div style={{fontSize:11,color:"#9a968e",marginTop:2}}>共 <b>{importPreview.length}</b> 筆差異</div>
              </div>
              <button onClick={function(){setImportPreview(null);}} style={{background:"none",border:"none",color:"#9a968e",cursor:"pointer",fontSize:22}}>×</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[
                {label:"盤盈",value:importPreview.filter(function(r){return r.diff>0;}).length+"項",color:"#3d9e32"},
                {label:"盤虧",value:importPreview.filter(function(r){return r.diff<0;}).length+"項",color:"#d0552f"},
                {label:"總差異",value:(importPreview.reduce(function(s,r){return s+r.diff;},0)>0?"+":"")+importPreview.reduce(function(s,r){return s+r.diff;},0)+"件",color:"#4a8ec0"},
              ].map(function(k){return(
                <div key={k.label} style={{background:"#f8f7f4",borderRadius:8,padding:"8px 12px",border:"1px solid #e8e4de"}}>
                  <div style={{fontSize:9,color:"#9a968e",marginBottom:2}}>{k.label}</div>
                  <div style={{fontSize:18,fontWeight:800,color:k.color}}>{k.value}</div>
                </div>
              );})}
            </div>
            <div style={{flex:1,overflowY:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr style={{background:"#f5f4f0",fontSize:10,color:"#9a968e"}}>
                    {["貨號","商品名稱","分類","系統庫存","實際盤點","差異"].map(function(h,i){
                      return <th key={h} style={{padding:"7px 10px",textAlign:i>=3?"center":"left",borderBottom:"2px solid #e0dcd6",fontWeight:600}}>{h}</th>;
                    })}
                  </tr>
                </thead>
                <tbody>
                  {importPreview.map(function(r,idx){return(
                    <tr key={r.sku} style={{background:idx%2===0?"#ffffff":"#faf9f7"}}>
                      <td style={{padding:"7px 10px",fontFamily:"monospace",fontSize:10,color:"#9a968e",borderBottom:"1px solid #f0ede8"}}>{r.sku}</td>
                      <td style={{padding:"7px 10px",fontWeight:600,color:"#2a2520",borderBottom:"1px solid #f0ede8"}}>{r.name}</td>
                      <td style={{padding:"7px 10px",fontSize:10,color:CAT_COLORS[r.main]||"#b8910a",borderBottom:"1px solid #f0ede8"}}>{r.main}</td>
                      <td style={{padding:"7px 10px",textAlign:"center",color:"#7a7068",borderBottom:"1px solid #f0ede8"}}>{r.sysSt}</td>
                      <td style={{padding:"7px 10px",textAlign:"center",fontWeight:700,color:"#2a2520",borderBottom:"1px solid #f0ede8"}}>{r.actualSt}</td>
                      <td style={{padding:"7px 10px",textAlign:"center",borderBottom:"1px solid #f0ede8"}}>
                        <span style={{display:"inline-block",padding:"2px 10px",borderRadius:20,fontSize:12,fontWeight:800,background:r.diff>0?"#e8f8e8":"#fdecea",color:r.diff>0?"#2a7a2a":"#c0302a"}}>
                          {r.diff>0?"+":""}{r.diff}
                        </span>
                      </td>
                    </tr>
                  );})}
                </tbody>
              </table>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end",borderTop:"1px solid #e8e4de",paddingTop:4}}>
              <button onClick={function(){setImportPreview(null);}} style={{background:"none",border:"1px solid #d8d4cc",borderRadius:7,padding:"8px 18px",color:"#7a7068",fontSize:12,cursor:"pointer"}}>取消</button>
              <button onClick={applyImport} style={{background:"#4a8ec0",border:"none",borderRadius:7,padding:"8px 24px",color:"#ffffff",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                確認更新 {importPreview.length} 筆庫存
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── 批次新增預覽 Modal ── */}
      {showBatchNew && batchPreview.length>0 && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center"}}
          onClick={function(e){if(e.target===e.currentTarget){setShowBatchNew(false);setBatchPreview([]);}}}>
          <div style={{background:"#ffffff",borderRadius:14,padding:20,width:720,maxWidth:"95vw",maxHeight:"85vh",display:"flex",flexDirection:"column",gap:12,boxShadow:"0 8px 40px rgba(0,0,0,0.18)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:"#2a2520"}}>＋ 批次新增商品預覽</div>
                <div style={{fontSize:11,color:"#9a968e",marginTop:2}}>共解析到 <b style={{color:"#2a2520"}}>{batchPreview.length}</b> 筆新商品，確認後加入系統</div>
              </div>
              <button onClick={function(){setShowBatchNew(false);setBatchPreview([]);}} style={{background:"none",border:"none",color:"#9a968e",cursor:"pointer",fontSize:22}}>×</button>
            </div>
            <div style={{flex:1,overflowY:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr style={{background:"#f5f4f0",fontSize:10,color:"#9a968e"}}>
                    {["貨號","商品名稱","大分類","小分類","售價","初始庫存"].map(function(h,i){
                      return <th key={h} style={{padding:"7px 10px",textAlign:i>=4?"right":"left",borderBottom:"2px solid #e0dcd6",fontWeight:600}}>{h}</th>;
                    })}
                  </tr>
                </thead>
                <tbody>
                  {batchPreview.map(function(p,idx){return(
                    <tr key={idx} style={{background:idx%2===0?"#ffffff":"#faf9f7"}}>
                      <td style={{padding:"7px 10px",fontFamily:"monospace",fontSize:10,color:"#9a968e",borderBottom:"1px solid #f0ede8"}}>{p.sku}</td>
                      <td style={{padding:"7px 10px",fontWeight:600,color:"#2a2520",borderBottom:"1px solid #f0ede8"}}>{p.name}</td>
                      <td style={{padding:"7px 10px",fontSize:10,color:CAT_COLORS[p.main]||"#b8910a",borderBottom:"1px solid #f0ede8"}}>{p.main}</td>
                      <td style={{padding:"7px 10px",fontSize:10,color:"#9a968e",borderBottom:"1px solid #f0ede8"}}>{p.sub||"—"}</td>
                      <td style={{padding:"7px 10px",textAlign:"right",color:"#b8910a",fontWeight:700,borderBottom:"1px solid #f0ede8"}}>${p.price.toLocaleString()}</td>
                      <td style={{padding:"7px 10px",textAlign:"right",color:"#3d9e32",fontWeight:600,borderBottom:"1px solid #f0ede8"}}>{p.stock}</td>
                    </tr>
                  );})}
                </tbody>
              </table>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end",borderTop:"1px solid #e8e4de",paddingTop:4}}>
              <button onClick={function(){setShowBatchNew(false);setBatchPreview([]);}} style={{background:"none",border:"1px solid #d8d4cc",borderRadius:7,padding:"8px 18px",color:"#7a7068",fontSize:12,cursor:"pointer"}}>取消</button>
              <button onClick={applyBatchNew} style={{background:"#7055c0",border:"none",borderRadius:7,padding:"8px 24px",color:"#ffffff",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                確認新增 {batchPreview.length} 筆商品
              </button>
            </div>
          </div>
        </div>
      )}


      {/* ── 庫存異動明細帳 Modal ── */}
      {showLedger && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center"}}
          onClick={function(e){if(e.target===e.currentTarget)setShowLedger(false);}}>
          <div style={{background:"#ffffff",borderRadius:14,width:860,maxWidth:"96vw",height:"88vh",maxHeight:"88vh",display:"flex",flexDirection:"column",boxShadow:"0 8px 40px rgba(0,0,0,0.18)",overflow:"hidden"}}>

            {/* 標題列 */}
            <div style={{padding:"14px 20px",borderBottom:"1px solid #f0ede8",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:"#2a2520"}}>📋 庫存異動明細帳</div>
                <div style={{fontSize:11,color:"#9a968e",marginTop:2}}>查閱指定時間與分類的庫存增減明細與結餘</div>
              </div>
              <button onClick={function(){setShowLedger(false);}} style={{background:"none",border:"none",color:"#9a968e",cursor:"pointer",fontSize:22}}>×</button>
            </div>

            {/* 篩選條件 */}

function LedgerContent(props) {
  var stockLog = props.stockLog;
  var ledgerFilter = props.ledgerFilter;
  var logs = stockLog.filter(function(l){
    var mD = (!ledgerFilter.dateFrom || l.date>=ledgerFilter.dateFrom) && (!ledgerFilter.dateTo || l.date<=ledgerFilter.dateTo);
    var mM = !ledgerFilter.main || l.main===ledgerFilter.main;
    var mS = !ledgerFilter.sub  || l.sub===ledgerFilter.sub;
    return mD && mM && mS;
  }).sort(function(a,b){ return (a.date+a.time)<(b.date+b.time)?1:-1; });

  if (logs.length===0) {
    return (
      <div style={{textAlign:"center",color:"#c8c4bc",padding:"40px 0",fontSize:13}}>
        <div style={{fontSize:28,marginBottom:8}}>📋</div>
        {stockLog.length===0 ? "尚無庫存異動記錄" : "此條件查無異動記錄"}
        {stockLog.length===0 && <div style={{fontSize:11,marginTop:4}}>透過「調整」按鈕或「匯入盤點」後記錄將自動寫入</div>}
      </div>
    );
  }

  var totalIn  = logs.filter(function(l){return l.change>0;}).reduce(function(s,l){return s+l.change;},0);
  var totalOut = logs.filter(function(l){return l.change<0;}).reduce(function(s,l){return s+l.change;},0);

  function exportExcel() {
    var wb = XLSX.utils.book_new();
    var rows = [["日期","時間","貨號","商品名稱","分類","原因","操作人員","異動前","異動量","結餘"]];
    logs.forEach(function(l){
      rows.push([l.date,l.time||"",l.sku,l.name,(l.main||"")+(l.sub?"/"+l.sub:""),l.reason||"",l.operator||"",l.before,l.change,l.after]);
    });
    var ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"]=[{wch:12},{wch:8},{wch:8},{wch:24},{wch:16},{wch:10},{wch:10},{wch:8},{wch:8},{wch:8}];
    XLSX.utils.book_append_sheet(wb, ws, "庫存異動");
    XLSX.writeFile(wb, "庫存異動明細_"+new Date().toISOString().slice(0,10)+".xlsx");
  }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      {/* 摘要 + 匯出 */}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"8px 16px",borderBottom:"1px solid #f0ede8",flexShrink:0,background:"#faf9f7",flexWrap:"wrap"}}>
        <span style={{fontSize:12,color:"#9a968e"}}>共 <b style={{color:"#2a2520"}}>{logs.length}</b> 筆</span>
        <span style={{fontSize:12,color:"#3d9e32",fontWeight:700}}>入庫 +{totalIn} 件</span>
        <span style={{fontSize:12,color:"#d0552f",fontWeight:700}}>出庫 {totalOut} 件</span>
        <div style={{marginLeft:"auto"}}>
          <button onClick={exportExcel}
            style={{background:"#1a7a3a",border:"none",borderRadius:7,padding:"6px 14px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>
            ↓ 匯出 Excel
          </button>
        </div>
      </div>
      {/* 表格 — 獨立捲動 */}
      <div style={{overflowY:"auto",overflowX:"auto",flexShrink:1,flexGrow:1}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:680}}>
          <thead>
            <tr style={{background:"#f5f4f0",position:"sticky",top:0,zIndex:1}}>
              {["日期","時間","貨號","商品名稱","分類","原因","異動前","異動量","結餘","操作人員"].map(function(h,i){
                return <th key={h} style={{padding:"8px 10px",textAlign:i>=6?"center":"left",borderBottom:"2px solid #e8e4de",fontSize:11,color:"#9a968e",fontWeight:700,whiteSpace:"nowrap"}}>{h}</th>;
              })}
            </tr>
          </thead>
          <tbody>
            {logs.map(function(l,i){
              var isIn = l.change>0;
              var cc = CAT_COLORS[l.main]||"#b8910a";
              return (
                <tr key={l.id||i} style={{background:i%2===0?"#ffffff":"#faf9f7"}}>
                  <td style={{padding:"7px 10px",color:"#7a7068",borderBottom:"1px solid #f0ede8",whiteSpace:"nowrap"}}>{l.date}</td>
                  <td style={{padding:"7px 10px",color:"#aaa69e",borderBottom:"1px solid #f0ede8",whiteSpace:"nowrap"}}>{l.time||"—"}</td>
                  <td style={{padding:"7px 10px",fontFamily:"monospace",fontSize:11,color:"#9a968e",borderBottom:"1px solid #f0ede8"}}>{l.sku}</td>
                  <td style={{padding:"7px 10px",color:"#2a2520",fontWeight:500,borderBottom:"1px solid #f0ede8",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.name}</td>
                  <td style={{padding:"7px 10px",borderBottom:"1px solid #f0ede8",whiteSpace:"nowrap"}}>
                    <span style={{color:cc,fontSize:11}}>{l.main}</span>
                    {l.sub && <span style={{color:"#aaa69e",fontSize:10}}> / {l.sub}</span>}
                  </td>
                  <td style={{padding:"7px 10px",borderBottom:"1px solid #f0ede8"}}>
                    <span style={{padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:600,
                      background:isIn?"#e8f8e8":l.change===0?"#f5f4f0":"#fdecea",
                      color:isIn?"#2a7a2a":l.change===0?"#9a968e":"#c0302a",whiteSpace:"nowrap"}}>
                      {l.reason||"—"}
                    </span>
                  </td>
                  <td style={{padding:"7px 10px",textAlign:"center",color:"#9a968e",borderBottom:"1px solid #f0ede8"}}>{l.before}</td>
                  <td style={{padding:"7px 10px",textAlign:"center",fontWeight:800,fontSize:13,
                    color:isIn?"#3d9e32":l.change===0?"#9a968e":"#d0552f",borderBottom:"1px solid #f0ede8"}}>
                    {l.change>0?"+":""}{l.change}
                  </td>
                  <td style={{padding:"7px 10px",textAlign:"center",fontWeight:700,color:"#b8910a",borderBottom:"1px solid #f0ede8"}}>{l.after}</td>
                  <td style={{padding:"7px 10px",color:"#aaa69e",fontSize:11,borderBottom:"1px solid #f0ede8",whiteSpace:"nowrap"}}>{l.operator||"—"}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function CatSalesBreakdown(props) {
  var dayPaid = props.dayPaid;
  var catRevMap = {};
  MAIN_CATS.forEach(function(m){ catRevMap[m] = 0; });
  dayPaid.forEach(function(o){
    if (!o.cartSnapshot) return;
    o.cartSnapshot.forEach(function(item){
      var cat = item.main||"其他";
      if (catRevMap[cat]===undefined) catRevMap[cat]=0;
      catRevMap[cat] += item.price * item.qty;
    });
  });
  var catEntries = MAIN_CATS
    .map(function(m){ return {main:m, rev:catRevMap[m]||0}; })
    .filter(function(c){ return c.rev>0; })
    .sort(function(a,b){ return b.rev-a.rev; });
  if (catEntries.length===0) return null;
  var catTotal = catEntries.reduce(function(s,c){return s+c.rev;},0);
  var maxRev   = catEntries[0].rev;
  return (
    <div style={{background:"#ffffff",border:"1px solid #e8e4de",borderRadius:9,padding:"10px 13px"}}>
      <div style={{fontSize:10,color:"#9a968e",marginBottom:8,letterSpacing:"0.06em",fontWeight:600}}>大分類銷售金額與佔比</div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {catEntries.map(function(c){
          var pct    = catTotal>0 ? c.rev/catTotal : 0;
          var barPct = maxRev>0   ? c.rev/maxRev   : 0;
          var col    = CAT_COLORS[c.main]||"#b8910a";
          return (
            <div key={c.main}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <span style={{fontSize:12,color:col,fontWeight:700}}>{CAT_ICONS[c.main]||"◆"} {c.main}</span>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:10,color:"#9a968e",minWidth:34,textAlign:"right"}}>{(pct*100).toFixed(1)}%</span>
                  <span style={{fontSize:13,fontWeight:700,color:"#2a2520",minWidth:72,textAlign:"right"}}>${c.rev.toLocaleString()}</span>
                </div>
              </div>
              <div style={{background:"#f0ede8",borderRadius:4,height:7,overflow:"hidden"}}>
                <div style={{height:"100%",width:(barPct*100)+"%",background:col,borderRadius:4}}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function OrdersDrawer(props) {

  var orders = props.orders;
  var setOrders = props.setOrders;
  var today = new Date().toISOString().slice(0,10);

  var ds = useState(today); var viewDate = ds[0], setViewDate = ds[1];
  var exs = useState(null); var expandNo = exs[0], setExpandNo = exs[1];
  var cms = useState(null); var confirmOp = cms[0], setConfirmOp = cms[1];
  // confirmOp = { no, type: "cancel"|"return" }

  var inp = {background:"#ffffff",border:"1px solid #2e2a22",borderRadius:6,padding:"6px 9px",color:"#2a2520",fontSize:12,outline:"none"};

  function doCancel(no, type) {
    // 取消或退貨：把該訂單 status 改為 cancelled/refunded，並在今日新增一筆負數抵銷記錄
    if (!setOrders) return;
    setOrders(function(prev){
      return prev.map(function(o){
        if (o.no !== no) return o;
        return Object.assign({},o,{
          status: type==="cancel" ? "cancelled" : "refunded",
          cancelDate: today,
          cancelType: type
        });
      });
    });
    setConfirmOp(null);
    setExpandNo(null);
  }

  // All unique dates in orders (for history picker)
  var allDates = [];
  var seen = {};
  orders.forEach(function(o){ if (!seen[o.date]){ seen[o.date]=1; allDates.push(o.date); } });
  if (allDates.indexOf(today) < 0) allDates.unshift(today);
  allDates.sort(function(a,b){ return b>a?1:-1; });

  var dayOrders = orders.filter(function(o){ return o.date === viewDate; });
  // 取消/退貨計入今日（以 cancelDate 為準）
  var dayCancelOrders = orders.filter(function(o){
    return o.cancelDate === viewDate && (o.status==="cancelled" || o.status==="refunded");
  });
  var cancelTotal = dayCancelOrders.reduce(function(s,o){return s+o.total;},0);
  var dayPaid   = dayOrders.filter(function(o){ return o.status==="paid"; });
  var dayTotal  = dayPaid.reduce(function(s,o){return s+o.total;},0) - cancelTotal;
  var dayDisc   = dayPaid.reduce(function(s,o){return s+o.discAmt;},0);
  var dayQty    = dayPaid.reduce(function(s,o){return s+(o.qty||0);},0);
  var isToday   = viewDate === today;

  // 各付款別合計（從每筆訂單的 payBreakdown 物件加總）
  var payBreakdown = {};
  PAYMENTS.forEach(function(m){ payBreakdown[m] = 0; });
  dayPaid.forEach(function(o) {
    if (o.payBreakdown) {
      PAYMENTS.forEach(function(m) {
        payBreakdown[m] += Number(o.payBreakdown[m]) || 0;
      });
    } else if (o.payment) {
      PAYMENTS.forEach(function(m) {
        if (o.payment === m) payBreakdown[m] += o.total;
      });
    }
  });

  // ── 列印當日對帳單 ──
  function printDailyReport() {
    var win = window.open("", "_blank", "width=620,height=800");
    if (!win) { alert("無法開啟列印視窗，請允許瀏覽器彈出視窗"); return; }
    var dateLabel = viewDate + (isToday ? " (今日)" : "");
    var printTime = new Date().toLocaleString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});

    var payRows = PAYMENTS.map(function(m){
      var amt = payBreakdown[m]||0;
      var pct = dayTotal>0 ? (amt/dayTotal*100).toFixed(1) : "0.0";
      return '<tr>'
        +'<td style="padding:6px 8px;border-bottom:1px solid #e0e0e0">'+m+'</td>'
        +'<td style="padding:6px 8px;text-align:right;border-bottom:1px solid #e0e0e0">'+(amt>0?"$"+amt.toLocaleString():"—")+'</td>'
        +'<td style="padding:6px 8px;text-align:right;border-bottom:1px solid #e0e0e0;color:#888">'+pct+'%</td>'
        +'</tr>';
    }).join("");

    var orderRows = dayPaid.map(function(o,i){
      var pays = [];
      if (o.payBreakdown) {
        PAYMENTS.forEach(function(m){ if(o.payBreakdown[m]>0) pays.push(m+"$"+o.payBreakdown[m]); });
      } else if (o.payment) {
        pays.push(o.payment);
      }
      return '<tr>'
        +'<td style="padding:4px 6px;border-bottom:1px solid #f0f0f0;font-size:10px;color:#666">'+(i+1)+'</td>'
        +'<td style="padding:4px 6px;border-bottom:1px solid #f0f0f0;font-size:10px;font-family:monospace">'+o.no+'</td>'
        +'<td style="padding:4px 6px;border-bottom:1px solid #f0f0f0;font-size:10px">'+o.time+'</td>'
        +'<td style="padding:4px 6px;border-bottom:1px solid #f0f0f0;font-size:10px">'+(o.cashier||"—")+'</td>'
        +'<td style="padding:4px 6px;border-bottom:1px solid #f0f0f0;font-size:10px">'+pays.join(", ")+'</td>'
        +'<td style="padding:4px 6px;border-bottom:1px solid #f0f0f0;font-size:11px;text-align:right;font-weight:700">$'+o.total.toLocaleString()+'</td>'

      +'.section-title{font-size:12px;font-weight:700;margin:14px 0 6px;letter-spacing:0.06em;color:#444;border-left:3px solid #b8910a;padding-left:8px}'
      +'table{width:100%;border-collapse:collapse;font-size:11px}'

      +'.total-row{background:#fffbeb;font-weight:700}'

      +'<div class="sig-box">店長確認</div>'
      +'</div>'

      +'<div class="footer">CHOCOOLEE POS · 巧克莉莉選物店．員林店</div>'
      +'</body></html>';

    win.document.write(html);
    win.document.close();
    setTimeout(function(){ win.print(); }, 400);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:8,height:"100%",overflow:"hidden"}}>

      {/* ── 日期切換列：固定不捲動 ── */}
      <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
        <span style={{fontSize:11,color:"#7a7068",flexShrink:0}}>查詢日期</span>
        <select value={viewDate} onChange={function(e){setViewDate(e.target.value);setExpandNo(null);}}
          style={Object.assign({},inp,{flex:1,cursor:"pointer"})}>
          {allDates.map(function(d){
            return <option key={d} value={d}>{d}{d===today?" (今日)":""}</option>;
          })}

        {!isToday && (
          <button onClick={function(){setViewDate(today);setExpandNo(null);}}
            style={{background:"none",border:"1px solid #2e2a22",borderRadius:6,padding:"5px 10px",color:"#b8910a",fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>
            回今日
          </button>
        )}
        <button onClick={printDailyReport} disabled={dayPaid.length===0}
          style={{background:dayPaid.length>0?"#2a2520":"#e0dcd6",border:"none",borderRadius:6,padding:"5px 12px",color:"#ffffff",fontSize:11,fontWeight:700,cursor:dayPaid.length>0?"pointer":"default",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:4}}>
          🖨 列印對帳單
        </button>
      </div>

      {/* ── 可捲動區：統計卡 + 付款別 + 訂單列表 ── */}
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:8}}>

        {/* 當日統計卡 */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
          <div style={{background:"#ffffff",borderRadius:8,padding:"8px 10px",border:"1px solid #2e2a22"}}>
            <div style={{fontSize:9,color:"#9a968e",marginBottom:2}}>{isToday?"今日":"當日"}訂單</div>
            <div style={{fontSize:18,fontWeight:700,color:"#b8910a"}}>{dayOrders.length}<span style={{fontSize:10,fontWeight:400,color:"#7a7068"}}> 筆</span></div>
          </div>
          <div style={{background:"#ffffff",borderRadius:8,padding:"8px 10px",border:"1px solid #2e2a22"}}>
            <div style={{fontSize:9,color:"#9a968e",marginBottom:2}}>實收金額</div>
            <div style={{fontSize:15,fontWeight:700,color:"#b8910a"}}>${dayTotal.toLocaleString()}</div>
          </div>
          <div style={{background:"#ffffff",borderRadius:8,padding:"8px 10px",border:"1px solid #2e2a22"}}>
            <div style={{fontSize:9,color:"#9a968e",marginBottom:2}}>折扣合計</div>
            <div style={{fontSize:15,fontWeight:700,color:"#d0552f"}}>{dayDisc>0?"-$"+dayDisc.toLocaleString():"—"}</div>
          </div>
          <div style={{background:"#ffffff",borderRadius:8,padding:"8px 10px",border:"1px solid #2e2a22"}}>
            <div style={{fontSize:9,color:"#9a968e",marginBottom:2}}>售出件數</div>
            <div style={{fontSize:18,fontWeight:700,color:"#5bb84e"}}>{dayQty}<span style={{fontSize:10,fontWeight:400,color:"#7a7068"}}> 件</span></div>
          </div>
        </div>

        {/* 付款別收受金額 */}
        <div style={{background:"#e8e6e2",border:"1px solid #2e2a22",borderRadius:8,padding:"8px 12px"}}>
          <div style={{fontSize:9,color:"#9a968e",marginBottom:6,letterSpacing:"0.08em"}}>付款別收受金額</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
            {PAYMENTS.map(function(m) {
              var amt = payBreakdown[m] || 0;
              return (
                <div key={m} style={{textAlign:"center"}}>
                  <div style={{fontSize:9,color:amt>0?"#6a6258":"#c8c4bc",marginBottom:2}}>{m}</div>
                  <div style={{fontSize:13,fontWeight:700,color:amt>0?"#2a2520":"#c8c4bc"}}>
                    {amt>0 ? "$"+amt.toLocaleString() : "—"}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* ── 大分類銷售金額與佔比 ── */}
        <CatSalesBreakdown dayPaid={dayPaid}/>

        {/* 訂單列表 */}
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {/* 今日取消/退貨記錄 */}
          {dayCancelOrders.filter(function(o){ return o.date !== viewDate; }).map(function(o){
            return (
              <div key={o.no+"-cancel"} style={{background:"#fdf4f4",borderRadius:8,border:"1px solid #e8c4c4",overflow:"hidden",opacity:0.85}}>

                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
                      <span style={{fontSize:10,color:"#9a968e",fontFamily:"monospace"}}>{o.no}</span>
                      <span style={{fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:20,background:"#fde8e0",color:"#d0552f"}}>

                    </div>
                    <div style={{fontSize:12,color:"#7a7068"}}>{o.member} · {o.payment}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:14,fontWeight:700,color:"#d0552f",textDecoration:"line-through"}}>-${o.total.toLocaleString()}</div>
                  </div>
                </div>
              </div>
            );
          })}
          {dayOrders.length === 0 ? (
            <div style={{textAlign:"center",color:"#c8c4bc",marginTop:20,fontSize:12}}>
              <div style={{fontSize:22,marginBottom:6}}>◎</div>

            </div>
          ) : dayOrders.map(function(o) {
            var isPaid      = o.status==="paid";
            var isCancelled = o.status==="cancelled";
            var isRefunded  = o.status==="refunded";
            var isOpen = expandNo===o.no;
            var statusLabel = isPaid?"已付款":isCancelled?"已取消":"已退貨";
            var statusBg    = isPaid?"#d4f0d0":isCancelled?"#f0ede8":"#fde8e0";
            var statusColor = isPaid?"#3d9e32":isCancelled?"#9a968e":"#d0552f";
            var canCancel   = isPaid && o.date===today;
            var canReturn   = isPaid && o.date!==today;
            return (
              <div key={o.no} style={{background:"#ffffff",borderRadius:8,border:"1px solid #2e2a22",overflow:"hidden",opacity:isPaid?1:0.7}}>
                <div onClick={function(){setExpandNo(isOpen?null:o.no);}}
                  style={{padding:"9px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
                      <span style={{fontSize:10,color:"#9a968e",fontFamily:"monospace"}}>{o.no}</span>
                      {o.time && <span style={{fontSize:10,color:"#c8c4bc"}}>{o.time}</span>}

                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:12,color:"#2a2520"}}>{o.member}</span>
                      <span style={{fontSize:10,color:"#9a968e"}}>{o.payment}</span>
                      {o.discount>0 && <span style={{fontSize:10,color:"#d0552f"}}>-{o.discount}%</span>}
                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:14,fontWeight:700,color:isPaid?"#b8910a":"#9a968e",textDecoration:isPaid?"none":"line-through"}}>${o.total.toLocaleString()}</div>

                  </div>
                  <span style={{fontSize:12,color:"#c8c4bc",flexShrink:0}}>{isOpen?"▲":"▼"}</span>
                </div>
                {isOpen && (
                  <div style={{borderTop:"1px solid #2e2a22",padding:"8px 12px",background:"#eeece8"}}>
                    {o.subtotal !== undefined && (
                      <div style={{display:"flex",gap:16,marginBottom:6,flexWrap:"wrap"}}>
                        <span style={{fontSize:10,color:"#9a968e"}}>小計 <b style={{color:"#2a2520"}}>${o.subtotal.toLocaleString()}</b></span>
                        {o.discAmt>0 && <span style={{fontSize:10,color:"#d0552f"}}>折扣 -${o.discAmt.toLocaleString()}</span>}
                        <span style={{fontSize:10,color:"#9a968e"}}>實收 <b style={{color:"#b8910a"}}>${o.total.toLocaleString()}</b></span>
                      </div>
                    )}
                    {o.detail && (
                      <div style={{fontSize:10,color:"#7a7068",lineHeight:1.7}}>
                        {o.detail.split("、").map(function(item,idx){
                          return <div key={idx} style={{paddingLeft:8,borderLeft:"2px solid #2e2a22",marginBottom:2}}>　{item}</div>;
                        })}
                      </div>
                    )}
                    {o.phone && o.member!=="—" && (
                      <div style={{marginTop:4,fontSize:10,color:"#aaA69e"}}>{o.phone}</div>
                    )}
                    {/* 取消/退貨按鈕 */}
                    {(canCancel || canReturn) && (
                      <div style={{marginTop:8,display:"flex",gap:6,justifyContent:"flex-end"}}>
                        {canCancel && (
                          <button onClick={function(e){e.stopPropagation();setConfirmOp({no:o.no,type:"cancel",total:o.total});}}
                            style={{padding:"5px 12px",borderRadius:6,border:"1px solid #d8d4cc",background:"#f8f7f4",color:"#9a968e",fontSize:11,cursor:"pointer",fontWeight:600}}>
                            ✕ 取消訂單
                          </button>
                        )}
                        {canReturn && (
                          <button onClick={function(e){e.stopPropagation();setConfirmOp({no:o.no,type:"return",total:o.total});}}
                            style={{padding:"5px 12px",borderRadius:6,border:"1px solid #e8c4c4",background:"#fdf4f4",color:"#d0552f",fontSize:11,cursor:"pointer",fontWeight:600}}>
                            ↩ 退貨
                          </button>
                        )}
                      </div>
                    )}
                    {(isCancelled||isRefunded) && o.cancelDate && (
                      <div style={{marginTop:6,fontSize:10,color:"#9a968e",textAlign:"right"}}>
                        {isCancelled?"取消":"退貨"}日期：{o.cancelDate}
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>

      </div>

      {/* 取消/退貨確認 Modal */}
      {confirmOp && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:800,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#ffffff",borderRadius:14,padding:24,width:320,maxWidth:"92vw",boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}}>
            <div style={{fontSize:18,marginBottom:8,textAlign:"center"}}>{confirmOp.type==="cancel"?"✕":"↩"}</div>
            <div style={{fontSize:14,fontWeight:700,color:"#2a2520",marginBottom:6,textAlign:"center"}}>
              確認{confirmOp.type==="cancel"?"取消訂單":"退貨"}？
            </div>
            <div style={{fontSize:12,color:"#9a968e",marginBottom:4,textAlign:"center"}}>{confirmOp.no}</div>
            <div style={{fontSize:13,fontWeight:700,color:"#d0552f",marginBottom:6,textAlign:"center"}}>
              -${confirmOp.total.toLocaleString()} 從今日營業額扣除
            </div>
            <div style={{fontSize:11,color:"#c8c4bc",marginBottom:16,textAlign:"center",lineHeight:1.5}}>
              {confirmOp.type==="cancel"?"當日訂單取消":"跨日退貨，不追溯原始日期"}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={function(){setConfirmOp(null);}}
                style={{flex:1,padding:"9px 0",borderRadius:8,border:"1px solid #d8d4cc",background:"#f5f4f0",color:"#9a968e",fontSize:13,cursor:"pointer",fontWeight:600}}>
                返回
              </button>
              <button onClick={function(){doCancel(confirmOp.no, confirmOp.type);}}
                style={{flex:1,padding:"9px 0",borderRadius:8,border:"none",background:confirmOp.type==="cancel"?"#9a968e":"#d0552f",color:"#ffffff",fontSize:13,cursor:"pointer",fontWeight:700}}>
                確認{confirmOp.type==="cancel"?"取消":"退貨"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Members Drawer ──
var INIT_MEMBERS = [
  {id:1,name:"陳小美",phone:"0912-345-678",email:"mei@example.com",spent:18640,highCount:1,note:"",joinDate:"2024-03-15"},
  {id:2,name:"王大明",phone:"0987-654-321",email:"ming@example.com",spent:7200,highCount:0,note:"",joinDate:"2024-08-20"},
  {id:3,name:"林雅琪",phone:"0935-111-222",email:"yachi@example.com",spent:62500,highCount:3,note:"常買帽子",joinDate:"2023-11-01"}
];
var EMPTY_FORM = {name:"",phone:"",email:"",spent:0,highCount:0,note:""};

function MembersDrawer(props) {

  var members = props.members, setMembers = props.setMembers;

  var qs = useState(""); var q = qs[0], setQ = qs[1];
  var es = useState(null); var editId = es[0], setEditId = es[1];
  var fs = useState(EMPTY_FORM); var form = fs[0], setForm = fs[1];
  var rls = useState(false); var showRules = rls[0], setShowRules = rls[1];


  var data = members.filter(function(m){ return m.name.indexOf(q)>=0 || m.phone.indexOf(q)>=0; });
  function setF(k,v){ setForm(function(f){ var n=Object.assign({},f); n[k]=v; return n; }); }

  function openEdit(m) {
    setForm({name:m.name,phone:m.phone,email:m.email||"",spent:m.spent,highCount:m.highCount||0,note:m.note||""});
    setEditId(m.id);
  }
  function openNew() { setForm(Object.assign({},EMPTY_FORM)); setEditId("new"); }
  function closeEdit() { setEditId(null); }

  function saveMember() {
    var spent = Number(form.spent)||0;
    var highCount = Number(form.highCount)||0;
    var level = calcLevel(spent, highCount);
    var points = calcPoints(spent);
    if (editId === "new") {
      setMembers(function(prev){ return prev.concat([{id:Date.now(),name:form.name,phone:form.phone,email:form.email,spent:spent,highCount:highCount,level:level,points:points,note:form.note,joinDate:new Date().toISOString().slice(0,10)}]); });
    } else {
      setMembers(function(prev){ return prev.map(function(m){ return m.id===editId ? Object.assign({},m,{name:form.name,phone:form.phone,email:form.email,spent:spent,highCount:highCount,level:level,points:points,note:form.note}) : m; }); });
    }
    closeEdit();
  }

  var inp = {background:"#ffffff",border:"1px solid #2e2a22",borderRadius:6,padding:"6px 9px",color:"#2a2520",fontSize:12,outline:"none",width:"100%",boxSizing:"border-box"};
  var lbl = {fontSize:10,color:"#7a7068",display:"block",marginBottom:3};

  // Level preview
  var prevSp = Number(form.spent)||0;
  var prevHc = Number(form.highCount)||0;
  var prevLv = calcLevel(prevSp, prevHc);
  var prevPts = calcPoints(prevSp);
  var prevNext = nextLevelInfo(prevLv, prevSp, prevHc);
  var showPreview = editId !== null && (prevSp > 0 || prevHc > 0);

  // ── 會員總覽計算 ──────────────────────────────────────────────────
  var today = new Date();
  var todayStr = today.toISOString().slice(0,10);

  // 等級分佈
  var lvlCount = {general:0, silver:0, gold:0, vip:0};
  members.forEach(function(m){
    var lv = m.level || calcLevel(m.spent, m.highCount||0);
    if (lvlCount[lv] !== undefined) lvlCount[lv]++;
  });

  // 近 6 個月：每月新增 & 活動會員（有 joinDate 或有消費記錄）
  var months = [];
  for (var i=5; i>=0; i--) {
    var d = new Date(today.getFullYear(), today.getMonth()-i, 1);
    months.push({
      label: (d.getMonth()+1)+"月",
      year:  d.getFullYear(),
      month: d.getMonth()+1,
      key:   d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"),
    });
  }

  // 每月新增（依 joinDate）
  var monthlyNew = {};
  months.forEach(function(m){ monthlyNew[m.key]=0; });
  members.forEach(function(m){
    if (!m.joinDate) return;
    var k = m.joinDate.slice(0,7);
    if (monthlyNew[k] !== undefined) monthlyNew[k]++;
  });

  // 每月活動率：以最近 6 個月內有消費（lastVisit 在該月）為活動會員
  // 用 lastVisit 近似；無資料時以 spent>0 估算
  var totalMembers = members.length;
  var activeMembers = members.filter(function(m){
    if (!m.lastVisit) return false;
    // 近 6 個月內有來店
    var sixMonthsAgo = new Date(today.getFullYear(), today.getMonth()-5, 1);
    return m.lastVisit >= sixMonthsAgo.toISOString().slice(0,10);
  }).length;
  // 活動率（近半年有來店的會員 / 總會員）
  var activeRate = totalMembers > 0 ? Math.round(activeMembers/totalMembers*100) : 0;

  // 每月活動率（依 lastVisit 月份分組）
  var monthlyActive = {};
  months.forEach(function(m){ monthlyActive[m.key]=new Set(); });
  members.forEach(function(m){
    if (!m.lastVisit) return;
    var k = m.lastVisit.slice(0,7);
    if (monthlyActive[k]) monthlyActive[k].add(m.id);
  });

  // 新增會員趨勢：本月 vs 上月
  var thisMonthKey = todayStr.slice(0,7);
  var lastMonthD   = new Date(today.getFullYear(), today.getMonth()-1, 1);
  var lastMonthKey = lastMonthD.getFullYear()+"-"+String(lastMonthD.getMonth()+1).padStart(2,"0");
  var thisMonthNew = monthlyNew[thisMonthKey]||0;
  var lastMonthNew = monthlyNew[lastMonthKey]||0;
  var newTrend     = thisMonthNew - lastMonthNew;

  // 折線/柱圖最大值
  var maxNew    = Math.max(1, Math.max.apply(null, months.map(function(m){return monthlyNew[m.key]||0;})));
  var maxActive = Math.max(1, Math.max.apply(null, months.map(function(m){return monthlyActive[m.key]?monthlyActive[m.key].size:0;})));

  return (
    <div style={{display:"flex",flexDirection:"column",gap:8,height:"100%",overflow:"hidden"}}>

      {/* ════ 會員總覽區 ════ */}
      <div style={{flexShrink:0,display:"flex",flexDirection:"column",gap:8,
        background:"#ffffff",border:"1px solid #e8e4de",borderRadius:12,padding:"12px 14px",
        boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>

        {/* 第一列：核心指標 */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}}>
          {/* 總會員數 */}
          <div style={{background:"#f8f7f4",borderRadius:9,padding:"9px 10px",textAlign:"center"}}>
            <div style={{fontSize:9,color:"#9a968e",marginBottom:3}}>總會員數</div>
            <div style={{fontSize:22,fontWeight:800,color:"#2a2520"}}>{totalMembers}</div>
            <div style={{fontSize:9,color:"#9a968e"}}>位</div>
          </div>
          {/* 等級分佈 */}
          {[
            {lv:"silver",label:"銀卡",color:LVL_COLOR.silver},
            {lv:"gold",  label:"金卡",color:LVL_COLOR.gold},
            {lv:"vip",   label:"VIP", color:LVL_COLOR.vip},
          ].map(function(x){
            return (
              <div key={x.lv} style={{background:"#f8f7f4",borderRadius:9,padding:"9px 10px",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#9a968e",marginBottom:3}}>{x.label}</div>
                <div style={{fontSize:22,fontWeight:800,color:x.color}}>{lvlCount[x.lv]}</div>
                <div style={{fontSize:9,color:"#9a968e"}}>位</div>
              </div>
            );
          })}
          {/* 半年活動率 */}
          <div style={{background:"#f8f7f4",borderRadius:9,padding:"9px 10px",textAlign:"center"}}>
            <div style={{fontSize:9,color:"#9a968e",marginBottom:3}}>半年活動率</div>
            <div style={{fontSize:22,fontWeight:800,color:activeRate>=50?"#3d9e32":"#d0552f"}}>{activeRate}%</div>
            <div style={{fontSize:9,color:"#9a968e"}}>{activeMembers}/{totalMembers}</div>
          </div>
        </div>

        {/* 第二列：每月新增 + 活動人數 圖表 */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

          {/* 每月新增會員 */}
          <div>
            <div style={{fontSize:10,color:"#7a7068",fontWeight:600,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>每月新增會員</span>
              <span style={{fontSize:10,color:newTrend>0?"#3d9e32":newTrend<0?"#d0552f":"#9a968e",fontWeight:700}}>
                本月 {thisMonthNew}人
                {newTrend!==0 && <span> ({newTrend>0?"+":""}{newTrend})</span>}
              </span>
            </div>
            <div style={{display:"flex",alignItems:"flex-end",gap:3,height:52}}>
              {months.map(function(m){
                var v = monthlyNew[m.key]||0;
                var pct = v/maxNew;
                var barH = Math.max(2, Math.round(pct*44));
                var isThis = m.key===thisMonthKey;
                return (
                  <div key={m.key} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    <div style={{fontSize:8,color:"#b8910a",fontWeight:700,height:12,lineHeight:"12px"}}>
                      {v>0?v:""}
                    </div>
                    <div style={{width:"100%",height:barH,
                      background:isThis?"#b8910a":"#e0d8c8",
                      borderRadius:"3px 3px 0 0",transition:"height 0.3s"}}/>
                    <div style={{fontSize:8,color:isThis?"#b8910a":"#aaA69e",fontWeight:isThis?700:400}}>{m.label}</div>
                  </div>
                );
