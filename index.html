<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="巧克莉莉POS">
  <title>巧克莉莉選物店 · 員林店 POS</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html,body { height:100%; overflow:hidden; background:#f5f4f0; }
    #root { height:100%; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }
    * { -webkit-overflow-scrolling:touch; }
    #sync-toast {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
      background:#2a7040; color:white; padding:9px 20px;
      border-radius:24px; font-size:12px; font-family:"Noto Sans TC",sans-serif;
      z-index:9999; opacity:0; transition:opacity 0.3s; pointer-events:none;
      white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,0.15);
    }
    #sync-toast.show { opacity:1; }
    #sync-toast.error { background:#a03020; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="sync-toast">☁️ 已同步</div>
  <div id="import-btn" style="position:fixed;bottom:20px;right:20px;z-index:8888;display:none;">
    <button onclick="document.getElementById('import-panel').style.display='flex'"
      style="background:#b8910a;color:#fff;border:none;border-radius:24px;padding:10px 18px;
        font-size:13px;font-family:'Noto Sans TC',sans-serif;font-weight:700;cursor:pointer;
        box-shadow:0 4px 16px rgba(0,0,0,0.2);">
      ⬇️ 匯入資料
    </button>
  </div>
  <div id="import-panel" style="position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.5);
    display:none;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:16px;padding:24px;width:340px;max-width:92vw;
      font-family:'Noto Sans TC',sans-serif;box-shadow:0 8px 32px rgba(0,0,0,0.2);">
      <div style="font-size:15px;font-weight:700;color:#2a2520;margin-bottom:8px;">⬇️ 匯入資料備份</div>
      <div style="font-size:12px;color:#9a968e;margin-bottom:12px;line-height:1.6;">
        從 JSX 版「⬇️ 匯出資料備份」下載的 JSON 檔案
      </div>
      <input type="file" id="import-file" accept=".json" style="font-size:12px;width:100%;margin-bottom:12px;"/>
      <div style="display:flex;gap:8px;">
        <button onclick="doImport()"
          style="flex:1;padding:10px;background:#b8910a;border:none;border-radius:8px;
            color:#fff;font-size:13px;font-weight:700;cursor:pointer;">
          匯入並套用
        </button>
        <button onclick="document.getElementById('import-panel').style.display='none'"
          style="padding:10px 14px;background:#f5f4f0;border:1px solid #d8d4cc;border-radius:8px;
            color:#9a968e;font-size:12px;cursor:pointer;">
          取消
        </button>
      </div>
      <div id="import-msg" style="font-size:11px;margin-top:8px;color:#3d9e32;display:none;"></div>
    </div>
  </div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>

  <script>
  var FB      = "https://chocoolee-pos-default-rtdb.firebaseio.com";
  var FB_KEY  = "AIzaSyDqJZiwefGVMiTVusd-Z1jTuQByaMS_i2w";
  var FB_USER = "chocolee0709@gmail.com";
  var FB_PASS = "love0501";
  var fbToken = null;
  var fbTokenExpiry = 0;
  var syncTimers = {};
  var sseSource = null;
  var sseReconnectTimer = null;
  var lastLoadTime = 0;

  function showToast(msg, isError) {
    var t = document.getElementById("sync-toast");
    if (!t) return;
    t.textContent = msg;
    t.className = isError ? "error show" : "show";
    clearTimeout(t._hide);
    t._hide = setTimeout(function(){ t.classList.remove("show","error"); }, 2800);
  }

  function getToken(cb) {
    var now = Date.now();
    if (fbToken && fbTokenExpiry - now > 60000) { cb(fbToken); return; }
    fetch("https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=" + FB_KEY, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({email:FB_USER, password:FB_PASS, returnSecureToken:true})
    }).then(function(r){ return r.json(); }).then(function(d){
      if (d.idToken) {
        fbToken = d.idToken;
        window._fbToken = d.idToken;
        fbTokenExpiry = now + (parseInt(d.expiresIn||3600)*1000);
        cb(fbToken);
      } else {
        showToast("⚠️ 雲端登入失敗", true);
        cb(null);
      }
    }).catch(function(e){
      showToast("⚠️ 無法連線 Firebase", true);
      cb(null);
    });
  }
  window.getFirebaseToken = getToken;

  function fetchAllFromFirebase(callback) {
    getToken(function(token){
      if (!token) { if(callback) callback(false); return; }
      fetch(FB + "/chocoolee.json?auth=" + token)
        .then(function(r){
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.json();
        })
        .then(function(data){
          if (data && typeof data === "object") {
            var changed = [];
            // 先處理 deletedskus（黑名單），確保過濾 products 時拿到最新刪除時間
            if (data["deletedskus"] !== undefined) {
              try {
                function _toMap(raw) {
                  var m = {};
                  if (!raw) return m;
                  var parsed = typeof raw === "string" ? JSON.parse(raw) : raw;
                  if (Array.isArray(parsed)) { parsed.forEach(function(s){ if(s) m[s]=1; }); }
                  else if (parsed && typeof parsed === "object") { m = parsed; }
                  return m;
                }
                var _fbMap = _toMap(data["deletedskus"]);
                var _localMap = _toMap(localStorage.getItem("chocoolee-deletedskus"));
                var _merged = {};
                Object.keys(_fbMap).forEach(function(s){ _merged[s] = _fbMap[s]; });
                Object.keys(_localMap).forEach(function(s){
                  if (!_merged[s] || _localMap[s] > _merged[s]) _merged[s] = _localMap[s];
                });
                var _mergedStr = JSON.stringify(_merged);
                if (_mergedStr !== localStorage.getItem("chocoolee-deletedskus")) {
                  localStorage.setItem("chocoolee-deletedskus", _mergedStr);
                  changed.push("deletedskus");
                }
              } catch(e) {}
            }
            Object.keys(data).forEach(function(key){
              try {
                if (key === "deletedskus") return; // 已先處理
                // product-images：不存 localStorage（圖片永遠從 Firebase 即時讀取）
                // 這樣 localStorage 永遠不會滿，且圖片一定是最新的
                if (key === "product-images") {
                  // 把 Firebase 圖片暫存到記憶體（不存 localStorage）
                  if (!window.__fbImages) window.__fbImages = {};
                  if (data[key] && typeof data[key] === "object") {
                    var imgs = data[key];
                    Object.keys(imgs).forEach(function(imgId){
                      var fbImg = imgs[imgId];
                      if (fbImg && typeof fbImg === "string" && fbImg.startsWith("data:")) {
                        window.__fbImages[imgId] = fbImg;
                      }
                    });
                    // 觸發 products 重新渲染以顯示新圖
                    if (window.__reactSetters && window.__reactSetters.products) {
                      var pv = localStorage.getItem("chocoolee-products");
                      if (pv) window.__reactSetters.products(pv);
                    }
                  }
                  return;
                }
                var newVal = typeof data[key] === "string" ? data[key] : JSON.stringify(data[key]);
                var oldVal = localStorage.getItem("chocoolee-" + key);
                if (newVal === oldVal) return;

                // 【下載專用】fetchAllFromFirebase 只下載，絕不上傳
                // 上傳只發生在使用者按儲存/送出/刪除時（saveData）
                // 略過殘留的 __lastUpdate_xxx 舊鍵（已棄用）
                if (key.indexOf("__lastUpdate_") === 0) {
                  return;
                }

                // 通用合併函式：以 idField 為 key，updatedAt 較新的優先
                function mergeByUpdatedAt(fbArr, localArr, idField) {
                  var map = {};
                  // 先放 Firebase 的
                  fbArr.forEach(function(item){
                    if (!item || !item[idField]) return;
                    var k = String(item[idField]);
                    map[k] = item;
                  });
                  // 本機的：如果 Firebase 沒有，或本機比較新，就用本機的
                  localArr.forEach(function(item){
                    if (!item || !item[idField]) return;
                    var k = String(item[idField]);
                    var existing = map[k];
                    if (!existing) {
                      map[k] = item;
                    } else {
                      var fbTime = existing.updatedAt || existing.date || "";
                      var localTime = item.updatedAt || item.date || "";
                      if (localTime > fbTime) map[k] = item;
                    }
                  });
                  return Object.keys(map).map(function(k){ return map[k]; });
                }

                // 訂單月份節點
                if (key.indexOf("orders-") === 0) {
                  try {
                    var fbOrders = JSON.parse(newVal) || [];
                    var localOrders = JSON.parse(oldVal || "[]") || [];
                    var merged = mergeByUpdatedAt(fbOrders, localOrders, "no");
                    merged.sort(function(a,b){ return (b.date+b.time).localeCompare(a.date+a.time); });
                    var mergedStr = JSON.stringify(merged);
                    localStorage.setItem("chocoolee-" + key, mergedStr);
                    changed.push(key);
                  } catch(e) {
                    localStorage.setItem("chocoolee-" + key, newVal);
                    changed.push(key);
                  }
                  return;
                }

                // 會員
                if (key === "members") {
                  try {
                    var fbMembers = JSON.parse(newVal) || [];
                    var localMembers = JSON.parse(oldVal || "[]") || [];
                    var mergedM = mergeByUpdatedAt(fbMembers, localMembers, "id");
                    var mergedMStr = JSON.stringify(mergedM);
                    localStorage.setItem("chocoolee-" + key, mergedMStr);
                    changed.push(key);
                  } catch(e) {
                    localStorage.setItem("chocoolee-" + key, newVal);
                    changed.push(key);
                  }
                  return;
                }

                // 採購單
                if (key === "purchases") {
                  try {
                    var fbPurchases = JSON.parse(newVal) || [];
                    var localPurchases = JSON.parse(oldVal || "[]") || [];
                    // 採購單用 "no" 為識別（不是 "id"！）
                    var mergedP = mergeByUpdatedAt(fbPurchases, localPurchases, "no");
                    var mergedPStr = JSON.stringify(mergedP);
                    localStorage.setItem("chocoolee-" + key, mergedPStr);
                    changed.push(key);
                  } catch(e) {
                    localStorage.setItem("chocoolee-" + key, newVal);
                    changed.push(key);
                  }
                  return;
                }

                // products：下載時先過濾掉已刪除的商品（用 deletedskus map 的刪除時間判斷）
                if (key === "products") {
                  try {
                    var fbProds = JSON.parse(newVal) || [];
                    // 讀取黑名單 map
                    var delRaw = localStorage.getItem("chocoolee-deletedskus");
                    var delMapF = {};
                    if (delRaw) {
                      var dp = JSON.parse(delRaw);
                      if (Array.isArray(dp)) { dp.forEach(function(s){ if(s) delMapF[s]=1; }); }
                      else if (dp && typeof dp === "object") { delMapF = dp; }
                    }
                    var filtered = fbProds.filter(function(p){
                      if (!p || !p.sku) return true;
                      var dt = delMapF[p.sku];
                      if (!dt) return true;
                      var pt = 0;
                      if (p.updatedAt) { try { pt = new Date(p.updatedAt).getTime(); } catch(e){} }
                      return pt > dt; // 商品比刪除時間新才保留
                    });
                    var filteredStr = JSON.stringify(filtered);
                    localStorage.setItem("chocoolee-" + key, filteredStr);
                    changed.push(key);
                  } catch(e) {
                    localStorage.setItem("chocoolee-" + key, newVal);
                    changed.push(key);
                  }
                  return;
                }

                // 其他資料：直接用 Firebase 版本
                localStorage.setItem("chocoolee-" + key, newVal);
                changed.push(key);
              } catch(e){}
            });
            if (changed.length > 0 && window.__reactSetters) {
              var needProductRefresh = false;
              changed.forEach(function(key) {
                // 獨立圖片節點 product-images/{id}
                if (key.indexOf("product-images/") === 0) {
                  needProductRefresh = true;
                  return;
                }
                var setter = window.__reactSetters[key];
                if (!setter && key.indexOf("orders-") === 0) {
                  setter = window.__reactSetters["orders"];
                }
                if (setter) {
                  try {
                    var val = localStorage.getItem("chocoolee-" + key);
                    if (val) setter(JSON.parse(val));
                  } catch(e){}
                }
              });
              // 圖片有更新時，重新觸發 products setter 讓畫面更新
              if (needProductRefresh && window.__reactSetters["products"]) {
                try {
                  var pval = localStorage.getItem("chocoolee-products");
                  if (pval) window.__reactSetters["products"](JSON.parse(pval));
                } catch(e) {}
              }
            }
          }
          if(callback) callback(true);
        })
        .catch(function(e){
          console.warn("Firebase 載入失敗", e.message);
          if(callback) callback(false);
        });
    });
  }

  window.loadFromFirebase = function(callback) {
    showToast("⏳ 正在從雲端載入資料...");
    fetchAllFromFirebase(function(ok){
      if (ok) showToast("☁️ 雲端資料載入完成");
      else showToast("⚠️ 雲端載入失敗，使用本地資料", true);
      if(callback) callback(ok);
    });
  };

  window.pushToFirebase = function(key, value) {
    // 所有資料立即推送（0ms）— 確保按下儲存後馬上同步到 Firebase
    // saveData 只在使用者按下儲存/送出時呼叫，不會有 typing 時連續觸發的問題
    var delay = 0;
    clearTimeout(syncTimers[key]);
    var snapshot = typeof value === "string" ? value : JSON.stringify(value);
    syncTimers[key] = setTimeout(function(){
      function doPush(retry) {
        getToken(function(token){
          if (!token) {
            if (retry > 0) setTimeout(function(){ doPush(retry-1); }, 3000);
            else showToast("⚠️ 推送失敗（無法取得 token）", true);
            return;
          }
          fetch(FB + "/chocoolee/" + key + ".json?auth=" + token, {
            method:"PUT",
            headers:{"Content-Type":"application/json"},
            body: snapshot
          }).then(function(r){
            if (r.ok) { showToast("☁️ 已同步"); }
            else if (r.status === 401) {
              // token 過期，清掉後重試
              fbToken = null;
              if (retry > 0) setTimeout(function(){ doPush(retry-1); }, 1000);
            } else {
              showToast("⚠️ 同步失敗 ("+r.status+")", true);
            }
          }).catch(function(){
            if (retry > 0) setTimeout(function(){ doPush(retry-1); }, 3000);
            else showToast("⚠️ 推送失敗", true);
          });
        });
      }
      doPush(3); // 最多重試 3 次
    }, delay);
  };

  function startSSE() {
    if (sseSource) { sseSource.close(); sseSource = null; }
    clearTimeout(sseReconnectTimer);
    getToken(function(token){
      if (!token) { sseReconnectTimer = setTimeout(startSSE, 60000); return; }
      var url = FB + "/chocoolee.json?auth=" + token + "&timeout=55s";
      try {
        sseSource = new EventSource(url);
        sseSource.addEventListener("put", function(e) {
          var now = Date.now();
          if (now - lastLoadTime < 1500) return;
          lastLoadTime = now;
          try {
            var payload = JSON.parse(e.data);
            var path = payload.path || "";
            // 只有圖片更新時不需要重新 fetch 全部
            if (path.indexOf("/product-images/") === 0) return;
          } catch(ex) {}
          showToast("🔄 偵測到資料更新，同步中...");
          fetchAllFromFirebase(function(ok){ if (ok) showToast("✅ 資料已同步最新"); });
        });
        sseSource.addEventListener("patch", function(e) {
          var now = Date.now();
          if (now - lastLoadTime < 1500) return;
          lastLoadTime = now;
          fetchAllFromFirebase(null);
        });
        sseSource.onerror = function() {
          sseSource.close(); sseSource = null;
          sseReconnectTimer = setTimeout(startSSE, 30000);
        };
      } catch(e) { startPolling(); }
    });
  }

  var pollingTimer = null;
  function startPolling() {
    clearInterval(pollingTimer);
    pollingTimer = setInterval(function(){
      if (Date.now() - lastLoadTime < 5000) return;
      fetchAllFromFirebase(null);
    }, 30000);
  }

  // 啟動時清除 localStorage 圖片快取（圖片改為從 Firebase 即時讀取，存記憶體 __fbImages）
  (function cleanupLocalImages(){
    var imgKeys = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && k.indexOf("chocoolee-product-images/") === 0) imgKeys.push(k);
    }
    imgKeys.forEach(function(k){ localStorage.removeItem(k); });
  })();

  window.firebaseReady = false;
  loadFromFirebase(function(ok){
    window.firebaseReady = true;
    window.__firebaseLoaded = ok;
    if (ok) startSSE();
    else { document.getElementById("import-btn").style.display = "block"; startPolling(); }
  });

  function doImport() {
    var file = document.getElementById("import-file").files[0];
    if (!file) { alert("請先選擇 JSON 檔案"); return; }
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = JSON.parse(e.target.result);
        var count = 0;
        Object.keys(data).forEach(function(key) {
          var val = typeof data[key] === "string" ? data[key] : JSON.stringify(data[key]);
          localStorage.setItem("chocoolee-" + key, val);
          if (window.pushToFirebase) window.pushToFirebase(key, val);
          count++;
        });
        var msg = document.getElementById("import-msg");
        msg.textContent = "✓ 成功匯入 " + count + " 筆資料，重新整理頁面後生效";
        msg.style.display = "block";
        setTimeout(function(){ location.reload(); }, 1800);
      } catch(err) { alert("JSON 格式錯誤：" + err.message); }
    };
    reader.readAsText(file);
  }

  setInterval(function(){
    fbToken = null;
    if (sseSource) startSSE();
  }, 50 * 60 * 1000);

  // iPad 螢幕喚醒或切回頁面時：重新整理 token 和 SSE（實際同步由 visibilitychange 處理）

  // 網路重新連線時：只重連 SSE，不主動推送（避免舊資料覆蓋）
  window.addEventListener("online", function(){
    fbToken = null;
    if (sseSource) startSSE();
    fetchAllFromFirebase(null);
  });

  // ── 全域按鍵音（Web Audio 即時產生，不需音檔）──
  (function setupClickSound(){
    var audioCtx = null;
    function ensureCtx(){
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch(e) { audioCtx = null; }
      }
      // iOS 需在使用者互動時 resume
      if (audioCtx && audioCtx.state === "suspended") {
        try { audioCtx.resume(); } catch(e) {}
      }
      return audioCtx;
    }
    function beep(){
      var ctx = ensureCtx();
      if (!ctx) return;
      try {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = 880; // 清脆高音「嗶」
        gain.gain.value = 0.0001;
        osc.connect(gain);
        gain.connect(ctx.destination);
        var t = ctx.currentTime;
        // 快速起音 + 快速衰減（短促清脆）
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(0.12, t + 0.005);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.08);
        osc.start(t);
        osc.stop(t + 0.09);
      } catch(e) {}
    }
    // 捕捉所有點擊：button、role=button、label、可點的 div
    document.addEventListener("click", function(e){
      var el = e.target;
      // 往上找最近的可點擊元素
      var depth = 0;
      while (el && depth < 5) {
        var tag = (el.tagName || "").toLowerCase();
        if (tag === "button" || tag === "label" ||
            (el.getAttribute && el.getAttribute("role") === "button") ||
            (el.style && el.style.cursor === "pointer")) {
          beep();
          return;
        }
        el = el.parentElement;
        depth++;
      }
    }, true);

    // 結帳完成音效（收銀機開錢箱「叮鈴」聲）
    window.playCheckoutSound = function(){
      var ctx = ensureCtx();
      if (!ctx) return;
      try {
        // 兩段式：先「叮」再「鈴」，模擬收銀機開箱
        function tone(freq, startT, dur, vol){
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          osc.type = "triangle";
          osc.frequency.value = freq;
          osc.connect(gain);
          gain.connect(ctx.destination);
          var t = ctx.currentTime + startT;
          gain.gain.setValueAtTime(0.0001, t);
          gain.gain.exponentialRampToValueAtTime(vol, t + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
          osc.start(t);
          osc.stop(t + dur + 0.02);
        }
        // 經典收銀機「叮—鈴」雙音
        tone(1318, 0,    0.12, 0.18); // E6 叮
        tone(1760, 0.08, 0.35, 0.20); // A6 鈴（拖長）
        tone(1318, 0.10, 0.30, 0.12); // 疊一層共鳴
      } catch(e) {}
    };
  })();

  // ── 本機推送到 Firebase（先推再拉）──
  window.syncLocalToFirebase = function(callback) {
    getToken(function(token){
      if (!token) { if (callback) callback(false); return; }
      var pushList = [];
      // 一般資料
      var keys = ["products","stocks","members","purchases","stocklog","addlog"];
      keys.forEach(function(k){
        var val = localStorage.getItem("chocoolee-" + k);
        if (val) pushList.push({key: k, body: val});
      });
      // 訂單月份節點（最近 6 個月）
      for (var i = 0; i < 6; i++) {
        var d = new Date();
        d.setMonth(d.getMonth() - i);
        var mk = "orders-" + d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
        var mv = localStorage.getItem("chocoolee-" + mk);
        if (mv) pushList.push({key: mk, body: mv});
      }
      // 圖片（逐一推送）
      var imgPushList = [];
      for (var si = 0; si < localStorage.length; si++) {
        var sk = localStorage.key(si);
        if (sk && sk.indexOf("chocoolee-product-images/") === 0) {
          var imgId = sk.replace("chocoolee-product-images/","");
          var imgVal = localStorage.getItem(sk);
          if (imgVal && imgVal.startsWith("data:")) imgPushList.push({id: imgId, data: imgVal});
        }
      }

      var total = pushList.length + imgPushList.length;
      if (total === 0) { if (callback) callback(true); return; }
      var done = 0;
      function onDone() { done++; if (done >= total && callback) callback(true); }

      // 推送一般資料
      pushList.forEach(function(item){
        fetch(FB + "/chocoolee/" + item.key + ".json?auth=" + token, {
          method: "PUT", headers: {"Content-Type":"application/json"}, body: item.body
        }).then(onDone).catch(onDone);
      });

      // 推送圖片（只推 pendingImages 或比 Firebase 新的）
      imgPushList.forEach(function(item){
        fetch(FB + "/chocoolee/product-images/" + item.id + ".json?auth=" + token, {
          method: "PUT", headers: {"Content-Type":"application/json"}, body: JSON.stringify(item.data)
        }).then(onDone).catch(onDone);
      });
    });
  };

  // iPad 螢幕喚醒或切回頁面時：只拉取最新資料（不主動推送）
  document.addEventListener("visibilitychange", function(){
    if (document.visibilityState !== "visible") return;
    fbToken = null;
    if (sseSource) startSSE();
    setTimeout(function(){
      fetchAllFromFirebase(null);
    }, 500);
  });

  // ── 下拉更新（Pull to Refresh）──
  var ptrStartY = 0;
  var ptrDist = 0;
  var ptrActive = false;
  var ptrIndicator = document.createElement("div");
  ptrIndicator.id = "ptr-indicator";
  ptrIndicator.style.cssText = [
    "position:fixed","top:0","left:0","right:0","z-index:9999",
    "display:flex","align-items:center","justify-content:center","gap:8px",
    "background:#f0fdf0","color:#3d9e32","font-size:13px","font-weight:700",
    "height:0","overflow:hidden","transition:height 0.15s ease",
    "border-bottom:1px solid #a0d8a0","pointer-events:none"
  ].join(";");
  ptrIndicator.innerHTML = "<span id='ptr-icon'>↓</span><span id='ptr-text'>下拉更新</span>";
  document.body.appendChild(ptrIndicator);

  document.addEventListener("touchstart", function(e){
    if (window.scrollY === 0 || document.documentElement.scrollTop === 0) {
      ptrStartY = e.touches[0].clientY;
      ptrActive = true;
    }
  }, {passive: true});

  document.addEventListener("touchmove", function(e){
    if (!ptrActive) return;
    ptrDist = e.touches[0].clientY - ptrStartY;
    if (ptrDist < 0) { ptrActive = false; return; }
    var h = Math.min(ptrDist * 0.4, 56);
    ptrIndicator.style.height = h + "px";
    var icon = document.getElementById("ptr-icon");
    var text = document.getElementById("ptr-text");
    if (ptrDist > 80) {
      if (icon) icon.textContent = "↑";
      if (text) text.textContent = "放開即更新";
      ptrIndicator.style.background = "#e8f5e0";
    } else {
      if (icon) icon.textContent = "↓";
      if (text) text.textContent = "下拉更新";
      ptrIndicator.style.background = "#f0fdf0";
    }
  }, {passive: true});

  document.addEventListener("touchend", function(){
    if (!ptrActive) return;
    ptrActive = false;
    if (ptrDist > 80) {
      var icon = document.getElementById("ptr-icon");
      var text = document.getElementById("ptr-text");
      ptrIndicator.style.height = "44px";
      if (icon) icon.textContent = "⬇";
      if (text) text.textContent = "從雲端載入...";
      ptrIndicator.style.color = "#2a7080";
      fbToken = null;
      // 只從 Firebase 拉取（不推送，避免本機舊資料覆蓋雲端較新資料）
      // 本機未推送的資料會在 fetchAllFromFirebase 的 mergeByUpdatedAt 中保留並補推
      fetchAllFromFirebase(function(ok){
        if (icon) icon.textContent = ok ? "✓" : "⚠";
        if (text) text.textContent = ok ? "已更新" : "更新失敗";
        ptrIndicator.style.color = ok ? "#3d9e32" : "#d0552f";
        setTimeout(function(){
          ptrIndicator.style.height = "0";
          ptrDist = 0;
        }, 1200);
      });
    } else {
      ptrIndicator.style.height = "0";
      ptrDist = 0;
    }
  });
  </script>

function renderPayBadge(payment, showAmount) {
  if (!payment) return null;
  // 混合付款（含「+」或「、」）→ 顯示完整文字（含金額）
  if (payment.indexOf("+") !== -1 || payment.indexOf("、") !== -1) {
    return React.createElement("span", {style:{fontSize:11,fontWeight:700,padding:"3px 9px",borderRadius:12,background:"#f0ede8",color:"#5a5048",whiteSpace:"nowrap"}}, payment);
  }
  // 單一付款別：只顯示付款方式，不顯示金額
  // payment 可能是 "現金:$580" 或 "現金"，要切出純付款方式名稱
  var pureMethod = payment.indexOf(":") !== -1 ? payment.split(":")[0] : payment;
  var c = PAY_COLORS[pureMethod] || {bg:"#f0ede8", color:"#5a5048"};
  return React.createElement("span", {style:{fontSize:12,fontWeight:700,padding:"3px 10px",borderRadius:12,background:c.bg,color:c.color,whiteSpace:"nowrap"}}, pureMethod);
}

// ── Barcode visual ──
function BarcodeViz(props) {
  var code = props.code, w = props.w || 130, h = props.h || 36;
  var d = String(code).split("").filter(function(c){return c>="0"&&c<="9";}).join("").padStart(9,"0");
  var bars = [];
  for (var i=0; i<d.length; i++) {
    var n = parseInt(d[i]);
    bars.push({w:1.5, black: n%2===0});
    bars.push({w:2.5, black: (n+1)%2===0});
    bars.push({w:1,   black: (n+2)%2===0});
  }
  bars.push({w:2,black:true},{w:1,black:false},{w:2,black:true});
  var total = bars.reduce(function(s,b){return s+b.w;}, 0);
  var sc = w / total;
  var x = 0;
  var rects = bars.map(function(b, i) {
    var bx = x; x += b.w * sc;
    if (!b.black) return null;
    return <rect key={i} x={bx} y={0} width={b.w*sc} height={h-10} fill="#111"/>;
  });
  return (
    <svg width={w} height={h} style={{display:"block",background:"white"}}>
      {rects}
      <text x={w/2} y={h-1} textAnchor="middle" fontSize={8} fill="#333" fontFamily="monospace">{code}</text>
    </svg>
  );
}

  // ── 匯出標籤檔（給精臣/微打等藍牙標籤機 App 匯入用）──
  function exportLabelCSV() {
    var rows = [];
    // 表頭（精臣雲打印 App 支援的欄位名稱）
    rows.push(["商品名稱","貨號","售價","條碼","份數"]);
    items.forEach(function(p) {
      var n = copies[p.id] || 1;
      rows.push([
        p.name,
        p.sku,
        "NT$" + p.price,           // 不用 toLocaleString，避免千分位逗號破壞 CSV 欄位
        "\t" + (p.barcode || ""),   // 條碼前加 Tab，強制當文字（避免前導零消失/科學記號）
        n
      ]);
    });
    // 加上 BOM 讓 Excel/App 正確識別 UTF-8
    var csv = "\uFEFF" + rows.map(function(r){
      return r.map(function(c){
        var s = String(c);
        // 含有逗號、雙引號或換行的欄位要加雙引號
        var hasComma = s.indexOf(",")>=0;
        var hasQuote = s.indexOf('"')>=0;
        var hasNewline = s.indexOf("\n")>=0;
        if (hasComma || hasQuote || hasNewline) {
          return '"' + s.split('"').join('""') + '"';
        }
        return s;
      }).join(",");
    }).join("\r\n");

    var blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement("a");
    a.href = url;
    a.download = "標籤檔_"+new Date().toISOString().slice(0,10)+".csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  var total = items.reduce(function(s,p){ return s+(copies[p.id]||1); }, 0);

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center"}}
      onClick={function(e){ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{background:"#ffffff",border:"1px solid #3a3530",borderRadius:14,padding:20,width:500,maxWidth:"95vw",maxHeight:"80vh",display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:14,fontWeight:700,color:"#2a2520"}}>批次列印條碼</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#9a968e",cursor:"pointer",fontSize:20}}>×</button>
        </div>
        <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
          {items.map(function(p) {
            return (
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #2e2a22"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:"#2a2520",fontWeight:600}}>{p.name}</div>
                  <div style={{fontSize:10,color:"#9a968e",fontFamily:"monospace"}}>{p.sku} · NT${p.price}</div>
                </div>
                <BarcodeViz code={p.barcode} w={90} h={30}/>
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  <button onClick={function(){ setCopies(function(c){ var n={}; Object.assign(n,c); n[p.id]=Math.max(1,(c[p.id]||1)-1); return n; }); }}
                    style={{width:20,height:20,borderRadius:"50%",background:"#d8d4cc",border:"none",color:"#2a2520",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>−</button>
                  <span style={{fontSize:12,fontWeight:700,minWidth:22,textAlign:"center",color:"#b8910a"}}>{copies[p.id]||1}</span>
                  <button onClick={function(){ setCopies(function(c){ var n={}; Object.assign(n,c); n[p.id]=(c[p.id]||1)+1; return n; }); }}
                    style={{width:20,height:20,borderRadius:"50%",background:"#d8d4cc",border:"none",color:"#b8910a",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>+</button>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:10,color:"#9a968e"}}>
            💡 匯出 CSV 可上傳到精臣/微打 App 用藍牙列印
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onClose} style={{background:"none",border:"1px solid #2e2a22",borderRadius:7,padding:"8px 16px",color:"#7a7068",fontSize:12,cursor:"pointer"}}>取消</button>
            <button onClick={exportLabelCSV} style={{background:"#4a8ec0",border:"none",borderRadius:7,padding:"8px 18px",color:"#ffffff",fontSize:12,fontWeight:700,cursor:"pointer"}}>📋 匯出標籤檔</button>
            <button onClick={handlePrint} style={{background:"#b8910a",border:"none",borderRadius:7,padding:"8px 20px",color:"#f5f4f0",fontSize:12,fontWeight:700,cursor:"pointer"}}>🖨 列印 {total} 張</button>
          </div>
        </div>
      </div>
    </div>
  );
}

  // ── 圖片上傳處理（縮成 120x120 + 60% 品質，每張約 5-10KB）──
  var iup = useState(false); var imgUploading = iup[0], setImgUploading = iup[1];
  function handleImageUpload(e, setForm) {
    var file = e.target.files[0];
    if (!file) return;
    if (!file.type.startsWith("image/")) { alert("請選擇圖片檔"); return; }
    e.target.value = "";
    setImgUploading(true);

    // 用 createImageBitmap（比 FileReader+Image 快 2-3 倍，且不卡 UI）
    if (window.createImageBitmap) {
      createImageBitmap(file).then(function(bitmap){
        var canvas = document.createElement("canvas");
        var max = 250;
        var w = bitmap.width, h = bitmap.height;
        if (w > h) { if (w>max){ h=Math.round(h*(max/w)); w=max; } }
        else { if (h>max){ w=Math.round(w*(max/h)); h=max; } }
        canvas.width = w; canvas.height = h;
        var ctx = canvas.getContext("2d");
        ctx.drawImage(bitmap, 0, 0, w, h);
        bitmap.close && bitmap.close();
        var dataUrl = canvas.toDataURL("image/jpeg", 0.65);
        setForm("image", dataUrl);
        setImgUploading(false);
      }).catch(function(){
        // 失敗 fallback 用舊方法
        fallbackUpload(file, setForm);
      });
    } else {
      fallbackUpload(file, setForm);
    }

    function fallbackUpload(file, setForm) {
      var reader = new FileReader();
      reader.onload = function(ev) {
        var img = new Image();
        img.onload = function() {
          var canvas = document.createElement("canvas");
          var max = 250;
          var w = img.width, h = img.height;
          if (w > h) { if (w>max){ h=Math.round(h*(max/w)); w=max; } }
          else { if (h>max){ w=Math.round(w*(max/h)); h=max; } }
          canvas.width = w; canvas.height = h;
          var ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, w, h);
          var dataUrl = canvas.toDataURL("image/jpeg", 0.65);
          setForm("image", dataUrl);
          setImgUploading(false);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }
  }

  var dcs = useState(false); var showDeleteConfirm = dcs[0], setShowDeleteConfirm = dcs[1];

  // ── 庫存調整 inline ──
  function openAdjust(p){ setAdjustId(p.id); setDelta(0); setEditId(null); setEditForm(null); }
  function doAdjust(){
    var prod = products.find(function(p){ return p.id===adjustId; });
    var before = stocks[adjustId]!==undefined ? stocks[adjustId] : (prod?prod.stock:0);
    var after;
    if (adjustMode === "set") {
      // 直接設為：delta 就是目標值
      after = Math.max(0, Number(delta));
      if (after === before) { setAdjustId(null); setDelta(0); return; }
    } else {
      // 增減模式
      var d = Number(delta);
      if (!d) { setAdjustId(null); setDelta(0); return; }
      after = Math.max(0, before + d);
    }
    var now = new Date();
    var dateStr = now.toISOString().slice(0,10);
    var timeStr = now.toTimeString().slice(0,5);
    // 「直接設為」模式用「盤點調整」當原因（除非使用者另選原因）；增減模式用所選原因
    var logReason = adjustMode === "set" ? "盤點調整" : reason;
    setStocks(function(s){ var n=Object.assign({},s); n[adjustId]=after; return n; });
    if (prod) {
      addLog([{
        id: Date.now(), date: dateStr, time: timeStr,
        productId: prod.id, sku: prod.sku, name: prod.name,
        main: prod.main, sub: prod.sub,
        reason: logReason, change: after - before, before: before, after: after,
        operator: currentStaff ? currentStaff.name : "—"
      }]);
    }
    setAdjustId(null); setDelta(0);
  }

      var url=URL.createObjectURL(blob);
      var a=document.createElement("a");
      a.href=url;
      a.download="盤點表_"+today+".xlsx";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

  function handleImportFile(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var wb=XLSX.read(ev.target.result,{type:"array"});
      var skuMap={};allProducts.forEach(function(p){skuMap[p.sku]=p;});
      var results=[];
      wb.SheetNames.forEach(function(name){
        var ws=wb.Sheets[name];
        var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        var hIdx=-1,skuCol=-1,actualCol=-1;
        rows.forEach(function(row,ri){
          var cols=row.map(function(c){return String(c).trim();});
          var si=cols.indexOf("貨號"),ai=cols.indexOf("實際盤點");
          if(si>=0&&ai>=0){hIdx=ri;skuCol=si;actualCol=ai;}
        });
        if(hIdx<0)return;
        for(var ri=hIdx+1;ri<rows.length;ri++){
          var row=rows[ri];
          var sku=String(row[skuCol]||"").trim();
          var actual=row[actualCol];
          if(!sku||actual===""||actual===null||actual===undefined)continue;
          var an=Number(actual);if(isNaN(an)||an<0)continue;
          var prod=skuMap[sku];if(!prod)continue;
          var sysSt=stocks[prod.id]!==undefined?stocks[prod.id]:prod.stock;
          if(an===sysSt)continue;
          if(results.find(function(r){return r.sku===sku;}))return;
          results.push({id:prod.id,sku:prod.sku,name:prod.name,main:prod.main,sub:prod.sub,sysSt:sysSt,actualSt:an,diff:an-sysSt});
        }
      });
      if(results.length===0){alert("找不到有差異的盤點資料");return;}
      setImportPreview(results);
    };
    reader.readAsArrayBuffer(file);
    e.target.value="";
  }

  // 自動產生貨號（同分類下找空缺號碼，保留前導零）
  function autoGenSku() {
    var mainCat = newForm.main, subCat = newForm.sub;
    if (!subCat) { alert("請先選擇小分類"); return; }

    // 全店所有貨號（用於最終唯一性檢查）
    var allSkuGlobal = {};
    products.forEach(function(p){ if(p && p.sku) allSkuGlobal[p.sku] = true; });

    // 同分類的貨號（用於找格式與號碼）
    var sameCat = products.filter(function(p){
      return p.main === mainCat && p.sub === subCat;
    }).map(function(p){ return p.sku; });

    function parseSku(s) {
      s = String(s);
      var startNum = -1, endNum = -1;
      for (var i = 0; i < s.length; i++) {
        var ch = s.charCodeAt(i);
        var isDigit = ch >= 48 && ch <= 57;
        if (isDigit && startNum === -1) startNum = i;
        if (isDigit) endNum = i;
        else if (startNum !== -1) break;
      }
      if (startNum === -1) return null;
      var numLen = endNum - startNum + 1;
      return {
        prefix: s.slice(0, startNum),
        num: parseInt(s.slice(startNum, endNum+1)),
        width: numLen,
        suffix: s.slice(endNum+1)
      };
    }

    // 統計同分類各種「前綴+後綴」格式，取最常見的那組
    var formatGroups = {};
    sameCat.forEach(function(s){
      var p = parseSku(s);
      if (!p) return;
      var fkey = p.prefix + "|" + p.suffix + "|" + p.width;
      if (!formatGroups[fkey]) formatGroups[fkey] = {prefix:p.prefix, suffix:p.suffix, width:p.width, nums:[]};
      formatGroups[fkey].nums.push(p.num);
    });

    // 選用「最多商品在用」的格式
    var bestFmt = null, bestCount = 0;
    Object.keys(formatGroups).forEach(function(k){
      if (formatGroups[k].nums.length > bestCount) {
        bestCount = formatGroups[k].nums.length;
        bestFmt = formatGroups[k];
      }
    });

    function makeSku(fmt, n) {
      var s = String(n);
      while (s.length < fmt.width) s = "0" + s;
      return fmt.prefix + s + fmt.suffix;
    }

    var newSku = "";
    if (bestFmt) {
      // 用該格式找下一個沒被用的號碼（同分類 + 全店都要避開）
      bestFmt.nums.sort(function(a,b){ return a-b; });
      var candidate = bestFmt.nums[0];
      var safety = 0;
      while (safety < 9999) {
        var trySku = makeSku(bestFmt, candidate);
        // 同分類沒用過 且 全店沒用過
        if (bestFmt.nums.indexOf(candidate) === -1 && !allSkuGlobal[trySku]) {
          newSku = trySku;
          break;
        }
        candidate++;
        safety++;
      }
    }

    // 無法用格式推算（分類沒有可解析的貨號）→ 用時間戳，並確保全店唯一
    if (!newSku) {
      do {
        newSku = "NEW" + String(Date.now()).slice(-6) + Math.floor(Math.random()*10);
      } while (allSkuGlobal[newSku]);
    }

    setNF("sku", newSku);
  }

  function addProduct(){

    var newP = Object.assign({},newForm,{
      id:Date.now(), price:Number(newForm.price)||0, cost:Number(newForm.cost)||0,
      stock:Number(newForm.stock)||0,
      barcode:newForm.barcode||String(products.length+1001).padStart(9,"0"),
      updatedAt: new Date().toISOString()
    });
    // 新商品的 updatedAt 是現在時間，會自動比刪除時間新而顯示
    // 為保險，也從黑名單 map 移除此貨號
    try {

      if (dmap[newP.sku]) {
        delete dmap[newP.sku];
        saveData("deletedskus", JSON.stringify(dmap));
      }

    setProducts(function(prev){

      });
      return next;
    });
    setStocks(function(prev){var n=Object.assign({},prev);n[newP.id]=newP.stock;return n;});
    if(newP.stock>0){

      addLog([{id:Date.now(),date:now.toISOString().slice(0,10),time:now.toTimeString().slice(0,5),

                  <button onClick={function(){setNF("image","");}}

            </div>

            <span style={{fontSize:12,fontWeight:700,color:"#2a2520"}}>✎ 編輯商品</span>
            <button onClick={function(){setEditId(null);setEditForm(null);}} style={{background:"none",border:"none",color:"#9a968e",cursor:"pointer",fontSize:18}}>×</button>
          </div>

                    <label style={{cursor:"pointer"}}>
                      <span style={{fontSize:11,color:"#4a8ec0",padding:"4px 10px",border:"1px solid #4a8ec0",borderRadius:6,whiteSpace:"nowrap",display:"block"}}>🖼 換圖</span>
                      <input type="file" accept="image/*" onChange={function(e){handleImageUpload(e,setEF);}} style={{display:"none"}}/>
                    </label>
                  )}
                  <label style={{cursor:"pointer"}}>
                    <span style={{fontSize:11,color:"#3d9e32",padding:"4px 10px",border:"1px solid #3d9e32",borderRadius:6,whiteSpace:"nowrap",display:"block"}}>📷 拍照</span>
                    <input type="file" accept="image/*" capture="environment" onChange={function(e){handleImageUpload(e,setEF);}} style={{display:"none"}}/>
                  </label>
                </div>

                    style={{background:"none",border:"none",color:"#d0552f",fontSize:10,cursor:"pointer"}}>移除圖片</button>

            </div>

              <div><label style={lbl}>貨號</label><input value={editForm.sku} onChange={function(e){setEF("sku",e.target.value);}} style={inp}/></div>
              <div><label style={lbl}>售價 (NT$)</label><input type="number" value={editForm.price} onChange={function(e){setEF("price",e.target.value);}} style={inp}/></div>
              {isManager && <div><label style={lbl}>成本 (NT$) 🔒</label><input type="number" value={editForm.cost||""} onChange={function(e){setEF("cost",e.target.value);}} style={inp}/></div>}
              <div><label style={lbl}>大分類</label>
                <select value={editForm.main} onChange={function(e){setEF("main",e.target.value);setEF("sub","");}} style={inp}>
                  {MAIN_CATS.map(function(m){return <option key={m} value={m}>{m}</option>;})}
                </select>
              </div>
              <div><label style={lbl}>小分類</label>
                <select value={editForm.sub||""} onChange={function(e){setEF("sub",e.target.value);}} style={inp}>
                  <option value="">—</option>
                  {editSubOpts.map(function(s){return <option key={s} value={s}>{s}</option>;})}

              </div>
              <div><label style={lbl}>條碼</label><input value={editForm.barcode||""} onChange={function(e){setEF("barcode",e.target.value);}} style={inp}/></div>

          <div style={{display:"flex",gap:6,justifyContent:"space-between",alignItems:"center"}}>

            <button onClick={saveEdit} style={{background:"#4a8ec0",border:"none",borderRadius:6,padding:"5px 18px",color:"#ffffff",fontSize:12,fontWeight:700,cursor:"pointer"}}>儲存</button>
          </div>
        </div>
      )}

                      setSelected(function(prev){
                        var s=new Set(prev);
                        pageData.forEach(function(p){s.add(p.id);});
                        return s;
                      });

                      setSelected(function(prev){

                        return s;

            {pageData.map(function(p,idx){
              var st     = stocks[p.id]!==undefined ? stocks[p.id] : p.stock;
              var cost   = Number(p.cost)||Math.round(p.price*0.6);
              var margin = p.price - cost;
              var mRate  = p.price>0 ? (margin/p.price*100) : 0;
              var mColor = mRate>=40?"#3d9e32":mRate>=25?"#b8910a":"#d0552f";
              var low    = st<=5;
              var isEditing  = editId===p.id;
              var isAdjusting= adjustId===p.id;
              return (
                <tr key={p.id} style={{
                  background:selected.has(p.id)?"#fffef0":isEditing?"#f0f8ff":isAdjusting?"#fffef8":idx%2===0?"#ffffff":"#faf9f7",

                      {p.image ? (
                        <img src={p.image} alt="" onClick={function(){openEdit(p);}} title="點擊編輯商品"

                        <div onClick={function(){openEdit(p);}} title="點擊編輯商品"

                  {isManager && <td style={{padding:"7px 8px 7px 0",textAlign:"right",color:mColor,fontWeight:600,borderBottom:"1px solid #f0ede8"}}>${margin.toLocaleString()}</td>}
                  {isManager && (

                      <span style={{fontSize:11,fontWeight:700,padding:"1px 7px",borderRadius:20,

                      </span>
                    </td>

                    <span style={{fontSize:13,fontWeight:800,color:low?"#d0552f":"#3d9e32"}}>{st}</span>
                    {low&&<span style={{fontSize:9,color:"#d0552f",display:"block"}}>低庫存</span>}

                      style={{display:"block",margin:"2px auto 0",background:"none",border:"1px solid #d8d4cc",borderRadius:4,padding:"1px 7px",color:"#b8910a",fontSize:9,cursor:"pointer"}}>

function LedgerContent(props) {
  var stockLog = props.stockLog;
  var ledgerFilter = props.ledgerFilter;
  var logs = stockLog.filter(function(l){
    var mD = (!ledgerFilter.dateFrom || l.date>=ledgerFilter.dateFrom) && (!ledgerFilter.dateTo || l.date<=ledgerFilter.dateTo);
    var mM = !ledgerFilter.main || l.main===ledgerFilter.main;
    var mS = !ledgerFilter.sub  || l.sub===ledgerFilter.sub;
    return mD && mM && mS;
  }).sort(function(a,b){ return (a.date+a.time)<(b.date+b.time)?1:-1; });

  if (logs.length===0) {
    return (
      <div style={{textAlign:"center",color:"#c8c4bc",padding:"40px 0",fontSize:13}}>
        <div style={{fontSize:28,marginBottom:8}}>📋</div>
        {stockLog.length===0 ? "尚無庫存異動記錄" : "此條件查無異動記錄"}
        {stockLog.length===0 && <div style={{fontSize:11,marginTop:4}}>透過「調整」按鈕或「匯入盤點」後記錄將自動寫入</div>}
      </div>
    );
  }

  var totalIn  = logs.filter(function(l){return l.change>0;}).reduce(function(s,l){return s+l.change;},0);
  var totalOut = logs.filter(function(l){return l.change<0;}).reduce(function(s,l){return s+l.change;},0);

  // 判斷是否為銷售類記錄
  function isSaleLog(l){ return l.reason && l.reason.indexOf("銷售")===0; }
  // 銷售總數量（負數，取絕對值）
  var totalSold = logs.filter(isSaleLog).reduce(function(s,l){return s+Math.abs(l.change);},0);

  // 品項銷售彙總（依貨號，只算銷售類）
  var salesByProduct = {};
  logs.forEach(function(l){
    if (!isSaleLog(l)) return;
    var k = l.sku || l.name;
    if (!salesByProduct[k]) salesByProduct[k] = {sku:l.sku, name:l.name, qty:0};
    salesByProduct[k].qty += Math.abs(l.change);
  });
  var salesList = Object.keys(salesByProduct).map(function(k){ return salesByProduct[k]; })
    .sort(function(a,b){ return b.qty - a.qty; });

  var sps = useState(false); var showSalesSummary = sps[0], setShowSalesSummary = sps[1];

  function exportExcel() {
    var wb = XLSX.utils.book_new();
    var rows = [["日期","時間","貨號","商品名稱","分類","原因","操作人員","異動前","異動量","結餘"]];
    logs.forEach(function(l){
      rows.push([l.date,l.time||"",l.sku,l.name,(l.main||"")+(l.sub?"/"+l.sub:""),l.reason||"",l.operator||"",l.before,l.change,l.after]);
    });
    var ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"]=[{wch:12},{wch:8},{wch:8},{wch:24},{wch:16},{wch:10},{wch:10},{wch:8},{wch:8},{wch:8}];
    XLSX.utils.book_append_sheet(wb, ws, "庫存異動");
    XLSX.writeFile(wb, "庫存異動明細_"+new Date().toISOString().slice(0,10)+".xlsx");
  }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      {/* 摘要 + 匯出 */}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"8px 16px",borderBottom:"1px solid #f0ede8",flexShrink:0,background:"#faf9f7",flexWrap:"wrap"}}>
        <span style={{fontSize:12,color:"#9a968e"}}>共 <b style={{color:"#2a2520"}}>{logs.length}</b> 筆</span>
        <span style={{fontSize:12,color:"#3d9e32",fontWeight:700}}>入庫 +{totalIn} 件</span>
        <span style={{fontSize:12,color:"#d0552f",fontWeight:700}}>出庫 {totalOut} 件</span>
        <span style={{fontSize:12,color:"#c06a1a",fontWeight:700}}>銷售 {totalSold} 件</span>
        <button onClick={function(){setShowSalesSummary(function(v){return !v;});}}
          style={{background:showSalesSummary?"#c06a1a":"none",border:"1px solid #c06a1a",borderRadius:6,padding:"4px 10px",color:showSalesSummary?"#fff":"#c06a1a",fontSize:11,cursor:"pointer",fontWeight:600}}>
          {showSalesSummary?"看明細":"品項銷售統計"}
        </button>
        <div style={{marginLeft:"auto"}}>
          <button onClick={exportExcel}
            style={{background:"#1a7a3a",border:"none",borderRadius:7,padding:"6px 14px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>
            ↓ 匯出 Excel
          </button>
        </div>
      </div>
      {/* 表格 — 獨立捲動 */}
      <div style={{overflowY:"auto",overflowX:"auto",flexShrink:1,flexGrow:1}}>
        {showSalesSummary ? (
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:400}}>
            <thead>
              <tr style={{background:"#fff0e0",position:"sticky",top:0,zIndex:1}}>
                <th style={{padding:"8px 10px",textAlign:"left",borderBottom:"2px solid #f0d8c0",fontSize:11,color:"#c06a1a",fontWeight:700}}>貨號</th>
                <th style={{padding:"8px 10px",textAlign:"left",borderBottom:"2px solid #f0d8c0",fontSize:11,color:"#c06a1a",fontWeight:700}}>商品名稱</th>
                <th style={{padding:"8px 10px",textAlign:"center",borderBottom:"2px solid #f0d8c0",fontSize:11,color:"#c06a1a",fontWeight:700}}>銷售數量</th>
              </tr>
            </thead>
            <tbody>
              {salesList.length===0 ? (
                <tr><td colSpan={3} style={{textAlign:"center",color:"#c8c4bc",padding:"30px 0"}}>此時段查無銷售記錄</td></tr>
              ) : salesList.map(function(s,i){
                return (
                  <tr key={s.sku||i} style={{background:i%2===0?"#ffffff":"#fffaf5"}}>
                    <td style={{padding:"7px 10px",fontFamily:"monospace",fontSize:11,color:"#9a968e",borderBottom:"1px solid #f5ece2"}}>{s.sku}</td>
                    <td style={{padding:"7px 10px",color:"#2a2520",fontWeight:500,borderBottom:"1px solid #f5ece2"}}>{s.name}</td>
                    <td style={{padding:"7px 10px",textAlign:"center",fontWeight:800,fontSize:14,color:"#c06a1a",borderBottom:"1px solid #f5ece2"}}>{s.qty}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        ) : (
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:680}}>
          <thead>
            <tr style={{background:"#f5f4f0",position:"sticky",top:0,zIndex:1}}>
              {["日期","時間","貨號","商品名稱","分類","原因","異動前","異動量","結餘","操作人員"].map(function(h,i){
                return <th key={h} style={{padding:"8px 10px",textAlign:i>=6?"center":"left",borderBottom:"2px solid #e8e4de",fontSize:11,color:"#9a968e",fontWeight:700,whiteSpace:"nowrap"}}>{h}</th>;
              })}
            </tr>
          </thead>
          <tbody>
            {logs.map(function(l,i){
              var isIn = l.change>0;
              var cc = CAT_COLORS[l.main]||"#b8910a";
              return (
                <tr key={l.id||i} style={{background:i%2===0?"#ffffff":"#faf9f7"}}>
                  <td style={{padding:"7px 10px",color:"#7a7068",borderBottom:"1px solid #f0ede8",whiteSpace:"nowrap"}}>{l.date}</td>
                  <td style={{padding:"7px 10px",color:"#aaa69e",borderBottom:"1px solid #f0ede8",whiteSpace:"nowrap"}}>{l.time||"—"}</td>
                  <td style={{padding:"7px 10px",fontFamily:"monospace",fontSize:11,color:"#9a968e",borderBottom:"1px solid #f0ede8"}}>{l.sku}</td>
                  <td style={{padding:"7px 10px",color:"#2a2520",fontWeight:500,borderBottom:"1px solid #f0ede8",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.name}</td>
                  <td style={{padding:"7px 10px",borderBottom:"1px solid #f0ede8",whiteSpace:"nowrap"}}>
                    <span style={{color:cc,fontSize:11}}>{l.main}</span>
                    {l.sub && <span style={{color:"#aaa69e",fontSize:10}}> / {l.sub}</span>}
                  </td>
                  <td style={{padding:"7px 10px",borderBottom:"1px solid #f0ede8"}}>
                    <span style={{padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:600,
                      background:isSaleLog(l)?"#fff0e0":isIn?"#e8f8e8":l.change===0?"#f5f4f0":"#fdecea",
                      color:isSaleLog(l)?"#c06a1a":isIn?"#2a7a2a":l.change===0?"#9a968e":"#c0302a",whiteSpace:"nowrap"}}>
                      {l.reason||"—"}
                    </span>
                  </td>
                  <td style={{padding:"7px 10px",textAlign:"center",color:"#9a968e",borderBottom:"1px solid #f0ede8"}}>{l.before}</td>
                  <td style={{padding:"7px 10px",textAlign:"center",fontWeight:800,fontSize:13,
                    color:isIn?"#3d9e32":l.change===0?"#9a968e":"#d0552f",borderBottom:"1px solid #f0ede8"}}>
                    {l.change>0?"+":""}{l.change}
                  </td>
                  <td style={{padding:"7px 10px",textAlign:"center",fontWeight:700,color:"#b8910a",borderBottom:"1px solid #f0ede8"}}>{l.after}</td>
                  <td style={{padding:"7px 10px",color:"#aaa69e",fontSize:11,borderBottom:"1px solid #f0ede8",whiteSpace:"nowrap"}}>{l.operator||"—"}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        )}
      </div>
    </div>
  );
}





// ── Orders Drawer ──
function CatSalesBreakdown(props) {
  var dayPaid = props.dayPaid;
  var catRevMap = {};
  MAIN_CATS.forEach(function(m){ catRevMap[m] = 0; });
  dayPaid.forEach(function(o){
    if (!o.cartSnapshot) return;
    o.cartSnapshot.forEach(function(item){
      var cat = item.main||"其他";
      if (catRevMap[cat]===undefined) catRevMap[cat]=0;
      catRevMap[cat] += item.price * item.qty;
    });
  });
  var catEntries = MAIN_CATS
    .map(function(m){ return {main:m, rev:catRevMap[m]||0}; })
    .filter(function(c){ return c.rev>0; })
    .sort(function(a,b){ return b.rev-a.rev; });
  if (catEntries.length===0) return null;
  var catTotal = catEntries.reduce(function(s,c){return s+c.rev;},0);
  var maxRev   = catEntries[0].rev;
  return (
    <div style={{background:"#ffffff",border:"1px solid #e8e4de",borderRadius:9,padding:"10px 13px"}}>
      <div style={{fontSize:10,color:"#9a968e",marginBottom:8,letterSpacing:"0.06em",fontWeight:600}}>大分類銷售金額與佔比</div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {catEntries.map(function(c){
          var pct    = catTotal>0 ? c.rev/catTotal : 0;
          var barPct = maxRev>0   ? c.rev/maxRev   : 0;
          var col    = CAT_COLORS[c.main]||"#b8910a";
          return (
            <div key={c.main}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <span style={{fontSize:12,color:col,fontWeight:700}}>{CAT_ICONS[c.main]||"◆"} {c.main}</span>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:10,color:"#9a968e",minWidth:34,textAlign:"right"}}>{(pct*100).toFixed(1)}%</span>
                  <span style={{fontSize:13,fontWeight:700,color:"#2a2520",minWidth:72,textAlign:"right"}}>${c.rev.toLocaleString()}</span>
                </div>
              </div>
              <div style={{background:"#f0ede8",borderRadius:4,height:7,overflow:"hidden"}}>
                <div style={{height:"100%",width:(barPct*100)+"%",background:col,borderRadius:4}}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

var MOCK_ORDERS = [
  {no:"ORD-20260505-0001",member:"陳小美",payment:"信用卡",total:1872,status:"paid"},

  {no:"ORD-20260504-0008",member:"王大明",payment:"Line Pay",total:1187,status:"paid"},

];

function OrdersDrawer(props) {

  var orders = props.orders;
  var setOrders = props.setOrders;
  var setSharedStocks = props.setSharedStocks;
  var stocks = props.sharedStocks || {};
  var sharedAddLog = props.sharedAddLog;
  var today = new Date().toISOString().slice(0,10);

  var ds = useState(today); var viewDate = ds[0], setViewDate = ds[1];
  var exs = useState(null); var expandNo = exs[0], setExpandNo = exs[1];
  var cms = useState(null); var confirmOp = cms[0], setConfirmOp = cms[1];
  // confirmOp = { no, type: "cancel"|"return" }

  var inp = {background:"#ffffff",border:"1px solid #2e2a22",borderRadius:6,padding:"6px 9px",color:"#2a2520",fontSize:12,outline:"none"};

  function doCancel(no, type) {
    // 取消或退貨：把該訂單 status 改為 cancelled/refunded
    if (!setOrders) return;
    // 找到該訂單，退回庫存
    var theOrder = orders.find(function(o){ return o.no === no; });
    if (theOrder && theOrder.cartSnapshot && setSharedStocks) {
      setSharedStocks(function(prev){
        var next = Object.assign({}, prev);
        theOrder.cartSnapshot.forEach(function(it){
          if (it.main === "業外收入") return;
          var cur = next[it.id] !== undefined ? next[it.id] : 0;
          next[it.id] = cur + it.qty; // 退回
        });
        return next;
      });
      // 記錄退回 log（用 reason 欄位，跟其他異動統一）
      if (sharedAddLog) {
        var nowT = new Date();
        var restoreLogs = [];
        var curStocks = stocks || {};
        theOrder.cartSnapshot.forEach(function(it){
          if (it.main === "業外收入") return;
          var cur = curStocks[it.id] !== undefined ? curStocks[it.id] : 0;
          restoreLogs.push({
            id: Date.now() + Math.random(),
            date: nowT.toISOString().slice(0,10), time: nowT.toTimeString().slice(0,5),
            productId: it.id, sku: it.sku, name: it.name,
            main: it.main, sub: it.sub,
            reason: (type==="cancel"?"取消退回":"退貨退回") + "（訂單 " + no + "）",
            change: it.qty, before: cur, after: cur + it.qty,
            operator: "—"
          });
        });
        if (restoreLogs.length) sharedAddLog(restoreLogs);
      }
    }
    setOrders(function(prev){
      return prev.map(function(o){
        if (o.no !== no) return o;
        return Object.assign({},o,{
          status: type==="cancel" ? "cancelled" : "refunded",
          cancelDate: today,
          cancelType: type,
          updatedAt: new Date().toISOString()
        });
      });
    });
    setConfirmOp(null);
    setExpandNo(null);
  }

  // All unique dates in orders (for history picker)
  var allDates = [];
  var seen = {};
  orders.forEach(function(o){ if (!seen[o.date]){ seen[o.date]=1; allDates.push(o.date); } });
  if (allDates.indexOf(today) < 0) allDates.unshift(today);
  allDates.sort(function(a,b){ return b>a?1:-1; });

  var dayOrders = orders.filter(function(o){ return o.date === viewDate; });
  // 取消/退貨：只列出當天結帳、當天取消的（用於明細顯示）
  var dayCancelOrders = orders.filter(function(o){
    return o.cancelDate === viewDate &&
           o.date === viewDate &&
           (o.status==="cancelled" || o.status==="refunded");
  });
  var cancelTotal = dayCancelOrders.reduce(function(s,o){return s+o.total;},0);
  var dayPaid   = dayOrders.filter(function(o){ return o.status==="paid"; });
  // 業績 = 已付款訂單 o.total 加總（取消的訂單 status 已非 paid，自動排除，不需再扣）
  var dayTotal  = dayPaid.reduce(function(s,o){return s+o.total;},0);
  var dayDisc   = dayPaid.reduce(function(s,o){return s+o.discAmt;},0);
  var dayQty    = dayPaid.reduce(function(s,o){return s+(o.qty||0);},0);
  var isToday   = viewDate === today;

  // 各付款別合計：以 o.total 為基準正規化（只算 dayPaid，取消的已排除）
  var payBreakdown = {};
  PAYMENTS.forEach(function(m){ payBreakdown[m] = 0; });
  dayPaid.forEach(function(o) {
    if (o.payBreakdown) {
      var bdSum = PAYMENTS.reduce(function(s,m){return s+(Number(o.payBreakdown[m])||0);},0);
      if (bdSum > 0) {
        // 按比例正規化，讓每筆訂單的付款別加總等於 o.total
        var allocated = 0;
        var lastMethod = null;
        PAYMENTS.forEach(function(m){
          var raw = Number(o.payBreakdown[m]) || 0;
          if (raw > 0) {
            var portion = Math.round(raw / bdSum * o.total);
            payBreakdown[m] += portion;
            allocated += portion;
            lastMethod = m;
          }
        });
        // 補四捨五入誤差到最後一個付款別
        if (lastMethod && allocated !== o.total) {
          payBreakdown[lastMethod] += (o.total - allocated);
        }
      } else {
        payBreakdown["現金"] += o.total;
      }
    } else if (o.payment) {
      var matched = false;
      PAYMENTS.forEach(function(m){
        if (o.payment === m) { payBreakdown[m] += o.total; matched = true; }
      });
      if (!matched) payBreakdown["現金"] += o.total;
    } else {
      payBreakdown["現金"] += o.total;
    }
  });

  function printDailyReport() {

      return '<tr>'
        +'<td style="padding:4px 6px;border-bottom:1px solid #f0f0f0;font-size:10px;color:#666">'+(i+1)+'</td>'

        +'</tr>';
    }).join("");

    var html = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>當日對帳單 '+dateLabel+'</title>'
      +'<style>'

      +'.total-row{background:#fffbeb;font-weight:700}'
      +'.sig-area{margin-top:30px;display:flex;justify-content:space-between;gap:16px}'

      +'@media print{body{padding:12px}}'
      +'</style></head><body>'
      +'<h1>巧克莉莉選物店．員林店</h1>'
      +'<div class="sub">當日對帳單 ｜ '+dateLabel+' ｜ 列印時間 '+printTime+'</div>'

      +'<div class="kpi">'
      +'<div class="kpi-box"><div class="kpi-label">訂單筆數</div><div class="kpi-val" style="color:#2a2520">'+dayPaid.length+'</div></div>'
      +'<div class="kpi-box"><div class="kpi-label">售出件數</div><div class="kpi-val" style="color:#3d9e32">'+dayQty+'</div></div>'

      +'</div>'

      +'<div class="section-title">付款方式明細</div>'
      +'<table>'

      +'<tbody>'+payRows+'</tbody>'
      +'<tfoot><tr class="total-row"><td style="padding:8px;font-weight:700">合計</td>'
      +'<td style="padding:8px;text-align:right;font-weight:800;color:#b8910a">$'+dayTotal.toLocaleString()+'</td>'
      +'<td style="padding:8px;text-align:right">100%</td></tr></tfoot>'
      +'</table>'

      +(dayPaid.length>0 ? (
        '<div class="section-title">訂單明細（共 '+dayPaid.length+' 筆）</div>'
        +'<table>'
        +'<thead><tr><th>#</th><th>訂單編號</th><th>時間</th><th>收銀員</th><th>付款</th><th style="text-align:right">金額</th></tr></thead>'
        +'<tbody>'+orderRows+'</tbody>'
        +'</table>'
      ) : '<div style="padding:20px;text-align:center;color:#aaa;font-size:11px">本日無訂單</div>')

      +'<div class="sig-area">'
      +'<div class="sig-box">收銀員簽名</div>'
      +'<div class="sig-box">店長確認</div>'
      +'</div>'

      +'<div class="footer">CHOCOOLEE POS · 巧克莉莉選物店．員林店</div>'
      +'<div class="noprint" style="margin-top:16px;display:flex;gap:8px;">'

      +'</div>'
      +'</body></html>';

    win.document.write(html);
    win.document.close();
    setTimeout(function(){ win.print(); }, 400);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:8,height:"100%",overflow:"hidden"}}>

      {/* ── 日期切換列：固定不捲動 ── */}
      <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>

        </select>
        {!isToday && (

        <button onClick={printDailyReport} disabled={dayPaid.length===0}
