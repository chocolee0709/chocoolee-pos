                style={{background:!activeMain?"#b8910a":"transparent",border:!activeMain?"none":"1px solid #2e2a22",
                  borderRadius:9,padding:"10px 4px",cursor:"pointer",display:"flex",flexDirection:"column",
                  alignItems:"center",gap:4,color:!activeMain?"#ffffff":"#9a968e",flexShrink:0}}>
                <span style={{fontSize:19}}>◈</span>
                <span style={{fontSize:12,fontWeight:600,textAlign:"center",lineHeight:1.2}}>全部</span>
              </button>
              {MAIN_CATS.map(function(mc) {
                var isA = activeMain===mc;
                var color = CAT_COLORS[mc]||"#b8910a";
                return (
                  <button key={mc} onClick={function(){setActiveMain(mc);setActiveSub(null);}}
                    style={{background:isA?color:"transparent",border:isA?"none":"1px solid #2e2a22",
                      borderRadius:9,padding:"10px 4px",cursor:"pointer",display:"flex",flexDirection:"column",
                      alignItems:"center",gap:4,color:isA?"#ffffff":"#9a968e",flexShrink:0}}>
                    <span style={{fontSize:19}}>{CAT_ICONS[mc]||"◆"}</span>
                    <span style={{fontSize:12,fontWeight:600,textAlign:"center",lineHeight:1.2}}>
                      {mc.length>5 ? mc.substring(0,5)+"…" : mc}
                    </span>
                  </button>
                );
              })}
            </div>

        {/* MIDDLE */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>

          {/* Row 1: Search */}
          <div style={{padding:"10px 12px 0",flexShrink:0}}>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#aaA69e",fontSize:14}}>⌕</span>
              <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="搜尋商品名稱 / 貨號..."
                style={Object.assign({},inp,{width:"100%",paddingLeft:30,boxSizing:"border-box"})}/>
            </div>
          </div>

          {/* Row 2: 小分類 pills */}
          <div style={{padding:"7px 12px 0",flexShrink:0}}>
            {activeMain ? (
              <div style={{display:"flex",flexWrap:wrapAt?"wrap":"nowrap",gap:5,overflowX:wrapAt?"visible":"auto",paddingBottom:4,scrollbarWidth:"none"}}>
                <button onClick={function(){setActiveSub(null);}}
                  style={{padding:"4px 13px",borderRadius:20,border:!activeSub?"none":"1px solid #2e2a22",
                    background:!activeSub?mainColor:"#ffffff",color:!activeSub?"#ffffff":"#7a7068",
                    cursor:"pointer",fontSize:13,fontWeight:!activeSub?700:500,flexShrink:0}}>
                  全部
                </button>
                {subCats.map(function(sc, idx) {
                  var breakBefore = wrapAt>0 && idx>0 && idx%wrapAt===0;
                  var isA = activeSub===sc;
                  return (
                    <span key={sc} style={{display:"contents"}}>
                      {breakBefore && <div style={{flexBasis:"100%",height:0}}></div>}
                      <button onClick={function(){setActiveSub(isA?null:sc);}}
                        style={{padding:"4px 13px",borderRadius:20,border:isA?"none":"1px solid #2e2a22",
                          background:isA?mainColor:"#ffffff",color:isA?"#ffffff":"#9a968e",
                          cursor:"pointer",fontSize:13,fontWeight:isA?700:500,flexShrink:0}}>
                        {sc}
                      </button>
                    </span>
                  );
                })}
              </div>
            ) : (
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:11,color:"#b8910a",fontWeight:700}}>◈ 全部商品</span>
                <div style={{flex:1,height:1,background:"#d8d4cc"}}></div>
                <span style={{fontSize:10,color:"#aaA69e"}}>{filtered.length} 項</span>
              </div>
            )}
          </div>

          {/* Breadcrumb */}
          {activeMain && (
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"5px 12px 0",flexShrink:0}}>
              <span style={{fontSize:11,color:mainColor,fontWeight:700,letterSpacing:"0.06em"}}>
                {CAT_ICONS[activeMain]} {activeMain}{activeSub ? " › "+activeSub : ""}
              </span>
              <div style={{flex:1,height:1,background:"#d8d4cc"}}></div>
              <span style={{fontSize:10,color:"#aaA69e"}}>{filtered.length} 項</span>
            </div>
          )}

          {/* Product Grid */}
          <div style={{padding:"8px 12px",flex:1,overflowY:"auto"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:7}}>
              {filtered.slice(0,120).map(function(p) {
                var inCart = cart.find(function(i){return i.id===p.id;});
                var cc = CAT_COLORS[p.main]||"#b8910a";
                return (
                  <button key={p.id} onClick={function(){addToCart(p);}}
                    style={{background:inCart?"#f0ede8":"#f8f7f4",
                      border:inCart?"1px solid "+cc:"1px solid #e0dcd6",
                      borderRadius:9,padding:"10px",cursor:"pointer",textAlign:"left",
                      display:"flex",flexDirection:"column",gap:4,position:"relative",minHeight:95}}>
                    {inCart && (
                      <div style={{position:"absolute",top:6,right:6,background:cc,color:"#ffffff",borderRadius:"50%",width:19,height:19,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,zIndex:1}}>{inCart.qty}</div>
                    )}
                    {p.image && (
                      <div style={{width:"100%",height:90,marginBottom:2,borderRadius:6,overflow:"hidden",background:"#ffffff"}}>
                        <img src={p.image} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                      </div>
                    )}
                    <div style={{fontSize:10,color:"#aaA69e",fontFamily:"monospace"}}>{p.sku}</div>
                    <div style={{fontSize:p.image?16:22,fontWeight:700,color:"#2a2520",lineHeight:1.25,flex:1}}>{p.name}</div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <div style={{fontSize:13,fontWeight:700,color:cc}}>${p.price.toLocaleString()}</div>
                          <div style={{fontSize:10,color:(sharedStocks[p.id]!==undefined?sharedStocks[p.id]:p.stock)<=5?"#d0552f":"#3a7a30"}}>庫存 {sharedStocks[p.id]!==undefined?sharedStocks[p.id]:p.stock}</div>
                        </div>
                  </button>
                );
              })}
              {filtered.length > 120 && (
                <div style={{gridColumn:"1/-1",textAlign:"center",padding:"10px",fontSize:11,color:"#aaA69e"}}>
                  尚有 {filtered.length-120} 筆，請縮小搜尋範圍
                </div>
              )}
            </div>
          </div>
        </div>

        {/* RIGHT: Cart — responsive width, two independent scroll zones */}
        <div style={{width:"clamp(300px, 24vw, 420px)",background:"#eeece8",borderLeft:"1px solid #d8d4cc",display:"flex",flexDirection:"column",flexShrink:0}}>

          {/* Cart header */}
          <div style={{padding:"12px 13px",borderBottom:"1px solid #d8d4cc",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
            <div>
              <span style={{fontWeight:700,fontSize:13,letterSpacing:"0.1em"}}>購物車</span>
              {cartCount>0 && <span style={{marginLeft:8,background:"#b8910a",color:"#ffffff",borderRadius:20,padding:"1px 8px",fontSize:10,fontWeight:700}}>{cartCount}</span>}
            </div>
            {cart.length>0 && <button onClick={function(){setCart([]);}} style={{background:"none",border:"none",color:"#9a968e",cursor:"pointer",fontSize:11}}>清空</button>}
          </div>

          {/* Member phone lookup */}
          <div style={{padding:"8px 13px",borderBottom:"1px solid #d8d4cc",flexShrink:0}}>
            <input value={memberPhone} onChange={function(e){setMemberPhone(e.target.value);}} placeholder="會員手機（選填）"
              style={Object.assign({},inp,{width:"100%",fontSize:11,padding:"6px 10px",boxSizing:"border-box",
                borderColor:foundMember?"#b8910a":"#d8d4cc"})}/>
            {foundMember && (
              <div style={{marginTop:6,background:"#f0ede8",borderRadius:7,padding:"8px 10px",border:"1px solid #e0dcd6"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                  <span style={{fontSize:12,fontWeight:700,color:"#2a2520"}}>{foundMember.name}</span>
                  <span style={{fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:20,background:"#eeece8",color:LVL_COLOR[foundMember.level||calcLevel(foundMember.spent,foundMember.highCount||0)]}}>{LVL_LABEL[foundMember.level||calcLevel(foundMember.spent,foundMember.highCount||0)]}</span>
                </div>
                <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  <div><span style={{fontSize:9,color:"#9a968e"}}>累積點數 </span><span style={{fontSize:11,color:"#b8910a",fontWeight:700}}>{(foundMember.points||0).toLocaleString()}</span></div>
                  <div><span style={{fontSize:9,color:"#9a968e"}}>累積消費 </span><span style={{fontSize:11,color:"#2a2520",fontWeight:600}}>${foundMember.spent.toLocaleString()}</span></div>
                  {foundMember.lastVisit && <div><span style={{fontSize:9,color:"#9a968e"}}>上次來店 </span><span style={{fontSize:11,color:"#7a7068"}}>{foundMember.lastVisit}</span></div>}
                </div>
              </div>
            )}
            {memberPhone.length >= 8 && !foundMember && (
              <div style={{marginTop:4,fontSize:10,color:"#9a968e",paddingLeft:2}}>查無此會員</div>
            )}
          </div>

          {/* ── 商品清單（可捲動，flex:1 佔剩餘空間）── */}
          <div style={{flex:1,overflowY:"auto",padding:"8px 13px",display:"flex",flexDirection:"column",gap:5,minHeight:0}}>
            {cart.length===0 ? (
              <div style={{textAlign:"center",color:"#c8c4bc",marginTop:40,fontSize:12}}>
                <div style={{fontSize:28,marginBottom:8}}>◈</div>尚未加入商品
              </div>
            ) : cart.map(function(item) {
              var cc = CAT_COLORS[item.main]||"#b8910a";
              var isConsign = item.main==="寄售";
              return (
                <div key={item.id} style={{background:"#ffffff",borderRadius:7,padding:"9px 11px",display:"flex",alignItems:"center",gap:8,
                  border:isConsign?"1px solid #c8b898":"1px solid #e8e4de",boxShadow:"0 1px 2px rgba(0,0,0,0.04)"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}>
                      <div style={{fontSize:13,fontWeight:600,color:"#2a2520",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",flex:1}}>{item.name}</div>
                      {isConsign && <span style={{fontSize:9,color:"#7a7068",background:"#e2dfd9",borderRadius:4,padding:"1px 5px",flexShrink:0}}>不折扣</span>}
                    </div>
                    <div style={{fontSize:11,color:cc,fontWeight:600}}>${(item.price*item.qty).toLocaleString()} <span style={{color:"#aaA69e",fontWeight:400,fontSize:10}}>· {item.sku}</span></div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <button onClick={function(){updateQty(item.id,-1);}} style={{width:22,height:22,borderRadius:"50%",background:"#e8e4de",border:"none",color:"#2a2520",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                    <span style={{fontSize:13,fontWeight:700,minWidth:18,textAlign:"center"}}>{item.qty}</span>
                    <button onClick={function(){updateQty(item.id,1);}} style={{width:22,height:22,borderRadius:"50%",background:"#e8e4de",border:"none",color:"#b8910a",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                  </div>
                </div>
              );
            })}
          </div>

          {/* ── 折扣 + 金額小計 + 付款（固定底部，內部可捲動）── */}
          <div style={{flexShrink:0,borderTop:"1px solid #d8d4cc",display:"flex",flexDirection:"column",maxHeight:"52vh",overflowY:"auto"}}>

            {/* 折扣 */}
            <div style={{padding:"8px 13px",borderBottom:"1px solid #e8e4de"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:11,color:"#7a7068",flexShrink:0}}>折扣</span>
                {[0,5].map(function(d) {
                  return (
                    <button key={d} onClick={function(){setDiscount(d);}}
                      style={{padding:"3px 10px",borderRadius:20,border:discount===d?"none":"1px solid #d8d4cc",
                        background:discount===d?"#b8910a":"transparent",color:discount===d?"#ffffff":"#7a7068",
                        cursor:"pointer",fontSize:11,fontWeight:600}}>
                      {d===0?"無":d+"%"}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* 金額小計 */}
            <div style={{padding:"8px 13px",borderBottom:"1px solid #e8e4de"}}>
              {(hasConsign && discount>0) ? (
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#9a968e",marginBottom:2}}>
                    <span>一般商品</span><span>${discountableTotal.toLocaleString()}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#9a968e",marginBottom:2}}>
                    <span>寄售（不折扣）</span><span>${consignTotal.toLocaleString()}</span>
                  </div>
                </div>
              ) : (
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#9a968e",marginBottom:2}}>
                  <span>小計</span><span>${subtotal.toLocaleString()}</span>
                </div>
              )}
              {discount>0 && (
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#d0552f",marginBottom:2}}>
                  <span>折扣 -{discount}%{hasConsign?" (一般)":""}</span>
                  <span>-${discAmt.toLocaleString()}</span>
                </div>
              )}
              <div style={{display:"flex",justifyContent:"space-between",fontSize:17,fontWeight:800,color:"#b8910a",marginTop:6}}>
                <span>合計</span><span>${total.toLocaleString()}</span>
              </div>
            </div>
            {/* ── 付款方式（智慧合併付款） ── */}
            <div style={{padding:"8px 13px 6px",borderTop:"1px solid #e0dcd6"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontSize:11,color:"#7a7068",fontWeight:600}}>付款方式</span>
                {splitTotal > 0 && (
                  <button onClick={resetSplit}
                    style={{background:"none",border:"none",color:"#aaA69e",fontSize:10,cursor:"pointer",padding:0}}>
                    清除
                  </button>
                )}
              </div>

              {/* 快速整付按鈕列 */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:4,marginBottom:8}}>
                {PAYMENTS.map(function(m) {
                  var isActive = (Number(splitPay[m])||0) > 0;
                  return (
                    <button key={m} onClick={function(){quickPayAll(m);}}
                      style={{padding:"5px 0",borderRadius:6,fontSize:11,fontWeight:isActive?700:500,cursor:"pointer",
                        border:isActive?"none":"1px solid #d8d4cc",
                        background:isActive?"#b8910a":"#f5f4f0",
                        color:isActive?"#ffffff":"#7a7068",
                        transition:"all 0.12s"}}>
                      {m}
                    </button>
                  );
                })}
              </div>

              {/* 各付款方式輸入列 */}
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {PAYMENTS.map(function(m) {
                  var val = splitPay[m];
                  var isUsed = (Number(val)||0) > 0;
                  var remaining = total - splitTotal + (Number(val)||0);

                  function handleChange(e) {
                    var raw = e.target.value;
                    var v = raw === "" ? 0 : Number(raw);
                    setSplitPay(function(prev) {
                      var n = Object.assign({}, prev);
                      n[m] = v;
                      return n;
                    });
                  }

                  // Auto-fill remaining when clicking the label
                  function handleLabelClick() {
                    var otherTotal = PAYMENTS.reduce(function(s, pm) {
                      return pm===m ? s : s+(Number(splitPay[pm])||0);
                    }, 0);
                    var remain = total - otherTotal;
                    if (remain > 0) {
                      setSplitPay(function(prev) {
                        var n = Object.assign({}, prev);
                        n[m] = remain;
                        return n;
                      });
                    }
                  }

                  return (
                    <div key={m} style={{display:"flex",alignItems:"center",gap:6}}>
                      <button onClick={handleLabelClick}
                        style={{fontSize:11,width:56,flexShrink:0,textAlign:"left",background:"none",border:"none",
                          color:isUsed?"#2a2520":"#9a968e",cursor:"pointer",padding:0,fontWeight:isUsed?600:400}}>
                        {m}
                      </button>
                      <div style={{flex:1,position:"relative"}}>
                        <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:11,color:"#aaA69e"}}>$</span>
                        <input type="number" min="0" placeholder="0"
                          value={val===0?"":val}
                          onChange={handleChange}
                          style={{width:"100%",background:isUsed?"#fffef8":"#f5f4f0",
                            border:isUsed?"1px solid #b8910a":"1px solid #d8d4cc",
                            borderRadius:6,padding:"5px 8px 5px 20px",color:"#2a2520",fontSize:12,
                            outline:"none",boxSizing:"border-box",transition:"all 0.12s"}}/>
                      </div>
                      {isUsed && (
                        <button onClick={function(){setSplitPay(function(prev){var n=Object.assign({},prev);n[m]=0;return n;});}}
                          style={{background:"none",border:"none",color:"#aaA69e",cursor:"pointer",fontSize:16,lineHeight:1,padding:"0 2px",flexShrink:0}}>×</button>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* ── 智慧狀態列 ── */}
              {cart.length > 0 && (
                <div style={{marginTop:8}}>
                  {splitTotal === 0 && (
                    <div style={{fontSize:10,color:"#aaA69e",textAlign:"center",padding:"4px 0"}}>
                      點擊付款方式快速整付，或點方式名稱自動帶入剩餘金額
                    </div>
                  )}

                  {/* 不足：顯示剩餘金額 + 其他付款方式快捷 */}
                  {splitTotal > 0 && splitTotal < total && (
                    <div style={{background:"#fff8f5",border:"1px solid #f0d0c0",borderRadius:8,padding:"8px 10px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                        <span style={{fontSize:11,color:"#d0552f",fontWeight:600}}>
                          尚差 ${(total-splitTotal).toLocaleString()}
                        </span>
                        <span style={{fontSize:10,color:"#9a968e"}}>選擇補足方式</span>
                      </div>
                      <div style={{display:"flex",gap:5}}>
                        {PAYMENTS.filter(function(m){ return (Number(splitPay[m])||0)===0; }).map(function(m) {
                          var remain = total - splitTotal;
                          return (
                            <button key={m}
                              onClick={function(){
                                setSplitPay(function(prev){var n=Object.assign({},prev);n[m]=remain;return n;});
                              }}
                              style={{flex:1,padding:"5px 0",borderRadius:6,border:"1px solid #d0552f",
                                background:"#ffffff",color:"#d0552f",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                              {m}<br/>
                              <span style={{fontSize:10,fontWeight:400}}>${remain.toLocaleString()}</span>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {/* 找零 */}
                  {splitChange > 0 && (
                    <div style={{background:"#f0fdf0",border:"1px solid #a0d8a0",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:12,color:"#2a7a2a",fontWeight:600}}>找零</span>
                      <span style={{fontSize:20,fontWeight:800,color:"#2a7a2a"}}>${splitChange.toLocaleString()}</span>
                    </div>
                  )}

                  {/* 剛好 */}
                  {splitTotal > 0 && splitTotal === total && (
                    <div style={{background:"#f0fdf0",border:"1px solid #a0d8a0",borderRadius:8,padding:"6px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:11,color:"#3d9e32",fontWeight:600}}>✓ 金額剛好</span>
                      <span style={{fontSize:11,color:"#3d9e32"}}>${total.toLocaleString()}</span>
                    </div>
                  )}
                </div>
              )}
            </div>
            {/* 結帳按鈕 — 黏在付款區底部 */}
            <div style={{padding:"8px 13px 12px",background:"#eeece8"}}>
              <button onClick={handleCheckout} disabled={!cart.length || !splitOk}
                style={{width:"100%",padding:"13px 0",borderRadius:9,border:"none",
                  background:!cart.length?"#e0dcd6":!splitOk?"#e8e4de":orderPlaced?"#3a7a30":"#b8910a",
                  color:(!cart.length||!splitOk)?"#b8b0a4":"#ffffff",
                  fontSize:14,fontWeight:800,cursor:(!cart.length||!splitOk)?"default":"pointer",
                  letterSpacing:"0.08em",transition:"all 0.2s",
                  boxShadow:splitOk&&!orderPlaced?"0 2px 8px rgba(184,145,10,0.25)":"none"}}>
                {orderPlaced ? ("✓ 結帳完成" + (foundMember ? "  +"+calcPoints(total)+"點" : ""))
                  : !cart.length ? "確認結帳"
                  : !splitOk ? "請先填寫付款金額"
                  : splitChange > 0 ? "確認結帳（找零 $"+splitChange.toLocaleString()+"）"
                  : trainingMode ? "🎓 模擬結帳"
                  : "確認結帳"}
              </button>
            </div>

          </div>{/* end 底部付款區 */}
        </div>{/* end RIGHT cart panel */}
        {/* end 收銀台 3-col */}
        </div>
        )}

        {/* ════ 商品 / 庫存 / 訂單 / 會員 ════ */}
        {activeTab !== "pos" && (
          <div style={{flex:1,overflow:"hidden",padding:"16px 20px",display:"flex",flexDirection:"column"}}>
            {activeTab==="catalog"   && <CatalogPanel products={sharedProducts} setSharedProducts={saveProducts} currentStaff={currentStaff} sharedStocks={sharedStocks} setSharedStocks={saveStocks} sharedStockLog={sharedStockLog} sharedAddLog={sharedAddLog}/>}
            {activeTab==="orders"    && <OrdersDrawer orders={orders} setOrders={saveOrders}/>}
            {activeTab==="members"   && <MembersDrawer members={members} setMembers={saveMembers}/>}
            {activeTab==="analytics" && isManager && <AnalyticsDrawer orders={orders}/>}
            {activeTab==="smart"     && isManager && <SmartAnalysisDrawer orders={orders} products={sharedProducts} stocks={sharedStocks}/>}
            {activeTab==="consign"   && isManager && <ConsignSettlement orders={orders} products={sharedProducts} stocks={sharedStocks} stockLog={sharedStockLog}/>}
            {activeTab==="attendance"&& isManager && <AttendanceReport shiftLog={shiftLog} staffRates={staffRates} setStaffRates={setStaffRates} schedule={schedule} setSchedule={setSchedule}/>}
            {(activeTab==="analytics"||activeTab==="smart"||activeTab==="consign"||activeTab==="attendance") && !isManager && (
              <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,color:"#c8c4bc"}}>
                <div style={{fontSize:40}}>🔒</div>
                <div style={{fontSize:15,fontWeight:600,color:"#9a968e"}}>此頁面需店長權限</div>
                <div style={{fontSize:12,color:"#c8c4bc"}}>請由左上角選單切換至店長帳號</div>
              </div>
            )}
          </div>
        )}

      </div>

      {/* ── 匯出資料 Modal ── */}
      {showExport && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:800,display:"flex",alignItems:"center",justifyContent:"center"}}
          onClick={function(e){if(e.target===e.currentTarget)setShowExport(false);}}>
          <div style={{background:"#ffffff",borderRadius:16,width:560,maxWidth:"95vw",maxHeight:"80vh",display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 12px 48px rgba(0,0,0,0.3)"}}>
            <div style={{padding:"14px 18px",borderBottom:"1px solid #f0ede8",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:"#2a2520"}}>⬇️ 匯出資料備份</div>
                <div style={{fontSize:11,color:"#9a968e",marginTop:2}}>請全選複製後，貼到記事本儲存為 .json 檔案</div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={function(){
                  if(navigator.clipboard){
                    navigator.clipboard.writeText(exportJson).then(function(){ alert("✓ 已複製到剪貼簿！\n請開啟記事本貼上，存為 chocoolee-backup.json"); });
                  } else {
                    var ta=document.getElementById("export-ta");
                    ta.select(); document.execCommand("copy");
                    alert("✓ 已複製！請開啟記事本貼上，存為 chocoolee-backup.json");
                  }
                }} style={{background:"#b8910a",border:"none",borderRadius:8,padding:"7px 14px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                  📋 複製全部
                </button>
                <button onClick={function(){setShowExport(false);}} style={{background:"none",border:"1px solid #d8d4cc",borderRadius:8,padding:"7px 12px",color:"#9a968e",fontSize:12,cursor:"pointer"}}>關閉</button>
              </div>
            </div>
            <textarea id="export-ta" readOnly value={exportJson}
              style={{flex:1,padding:14,font:"12px/1.5 monospace",background:"#f8f7f4",border:"none",outline:"none",resize:"none",color:"#2a2520"}}
              onClick={function(e){e.target.select();}}/>
          </div>
        </div>
      )}

      {/* ── 換班登入 ── */}
      {showLogin && (
        <ShiftLogin
          onLogin={handleLogin}
          onClockOut={handleClockOut}
          onClose={function(){setShowLogin(false);}}
          onlineStaff={onlineStaff}
          orders={orders}
        />
      )}

      {/* ── 螢幕鎖定 ── */}
      {isLocked && (
        <LockScreen
          onUnlock={function(staff){setIsLocked(false);setCurrentOperator(staff);}}
          onlineStaff={onlineStaff}
        />
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(POSSystem));
  </script>
</body>
</html>
